id: P78
name: One-shot Single-File Execution
weight: 4
confidence: medium
risk: medium
status: done
objective: >
  Provide a bounded, single-file, one-shot execution path for code-pact tasks.
  An

  external executor receives the task goal and source file content via JSON
  stdin,

  emits either a replace_exact payload or a blocked reason, and the runtime
  applies

  the edit atomically, re-runs verification, and records done only on a clean,

  scoped working tree. This pass hardens rollback, execution scope, executor
  file

  validation, exact replacement contract, agent propagation, and public error

  documentation.
definition_of_done:
  - |
    One-shot lifecycle is formally registered in design/ and tracked through T4.
  - >
    Rollback uses compare-and-swap semantics with appliedContent, surfacing
    ROLLBACK_STALE_FILE when the source changes concurrently.
  - >
    Execution scope is fail-closed: a clean git working tree is required before
    invocation, executor mutations outside the source file are rejected, and
    verification-time scope violations roll back the source file.
  - >
    Executor files are validated before spawn: regular file, non-symlink,
    executable, inside the project.
  - >
    --agent is propagated through runTaskExecuteOnce into runTaskComplete and
    rejects unknown/disabled agents before edits are recorded.
  - >
    Exact replacement contract allows empty new_text, counts lines correctly
    (120 with trailing newline allowed, 121 rejected), and keeps executor
    failure reasons and output payloads bounded.
  - >
    Public error codes, i18n, CLI help, agent-contract, per-task-loop, and
    troubleshooting documentation are updated for the new surface.
  - >
    Regression tests cover CAS rollback, mutation/scope detection, agent
    propagation, empty new_text, line boundaries, and bounded stderr.
  - |
    Full verification suite is green and the corrective pass is committed.
verification:
  commands:
    - pnpm typecheck
    - pnpm build
    - pnpm test:unit
    - pnpm test:integration:smoke
    - pnpm vitest --config vitest.integration.config.ts run
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
    - git diff --check
