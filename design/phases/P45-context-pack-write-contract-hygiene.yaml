id: P45
name: Context-pack write contract hygiene — align the pack write with the public
  atomic-write contract and correct the docs that blur which command writes it
weight: 3
confidence: high
risk: low
status: done
objective: |
  The context pack is part of code-pact's deterministic agent-facing artifact
  surface, but its disk write did not match the published contract. `docs/cli-
  contract.md` § "State file write guarantees" asserts every disk write goes
  through `atomicWriteText` so an interrupted process cannot leave a half-written
  file — yet `writeContextPack()` used a raw `writeFile`, and the context pack
  was absent from the write-guarantees table (the `<adapter-owned files>` row
  even listed `.context/<agent>/*` as adapter-written, though the adapter only
  mkdirs the directory; the per-task packs are written by `task prepare` / `pack`).

  Separately, `docs/positioning.md` described `task context` as writing the pack
  file. In the code, `task context` only builds and returns/prints the content;
  the writers are `task prepare` (unless `--dry-run`) and the low-level `pack`.

  This is a patch-level (v1.29.1) contract-hygiene phase. It makes the existing
  contract true and easier to reason about. It adds no command, flag, schema
  field, JSON field, error code, adapter behavior, or user workflow, and does not
  change the bytes any pack command produces.

  Design recorded in design/decisions/context-pack-write-contract-hygiene-rfc.md.
non_goals:
  - No new CLI command, flag, JSON field, or public error code
  - No change to the bytes produced by `task context`, `task prepare`, or `pack`
  - No change to context-pack path-resolution semantics
  - No promotion of the evidence harness to public CLI surface
  - No broad README / getting-started rewrite
  - No broad non-goals / command-surface regex policy in the doc invariants
definition_of_done:
  - writeContextPack() writes the context pack through `atomicWriteText` instead
    of raw `writeFile`; the redundant explicit mkdir is removed; output path and
    pack bytes are unchanged
  - the existing pack side-effect tests still pass and a narrow regression test
    proves the atomic write creates a missing parent dir and leaves no temp file
  - docs/cli-contract.md § "State file write guarantees" lists the context pack
    as a write performed by `task prepare` / `pack`, and the `<adapter-owned
    files>` row no longer claims the adapter writes the per-task packs — so the
    "every write goes through atomicWriteText" sentence is true
  - docs/positioning.md, docs/glossary.md, and docs/agent-contract.md distinguish
    `task context` (builds / returns / prints) from `task prepare` / `pack` (write)
  - scripts/check-doc-invariants.mjs gains one narrow rule preventing the false
    "task context writes the pack" claim and asserting the contract↔code
    atomic-write pairing
  - CHANGELOG records the patch; release checks pass
verification:
  commands:
    - pnpm typecheck
    - pnpm test:unit
    - pnpm build
    - pnpm test:integration
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
    - node dist/cli.js plan analyze --strict --json
tasks:
  - id: P45-T0
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: >
      RFC + phase registration (close-out bootstrap). Lands
      design/decisions/context-pack-write-contract-hygiene-rfc.md (status
      accepted) recording the patch-level decision that the context pack is part
      of the deterministic agent-facing artifact surface, so `task prepare` /
      `pack` writes use the existing atomic primitive, while `task context`
      stays read-only / stdout-oriented and is not described as a file writer.


      Bootstraps the P45 phase and roadmap entry (weight 3) following the P41-P44
      close-out precedent: the phase YAML is a protected-path bootstrap write
      (it is in acceptance_refs) and design/roadmap.yaml is a plan-lint --strict
      protected path, so neither is listed in writes.
    decision_refs:
      - design/decisions/context-pack-write-contract-hygiene-rfc.md
    reads:
      - docs/cli-contract.md
      - docs/positioning.md
      - docs/glossary.md
      - docs/agent-contract.md
      - src/core/pack/index.ts
      - src/io/atomic-text.ts
    writes:
      - design/decisions/context-pack-write-contract-hygiene-rfc.md
      - design/decisions/README.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P45-context-pack-write-contract-hygiene.yaml
  - id: P45-T1
    type: feature
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Replace the raw `writeFile(outputPath, pack.content, "utf8")` in
      src/core/pack/index.ts writeContextPack() with
      `atomicWriteText(outputPath, pack.content)`, and drop the now-redundant
      explicit mkdir (atomicWriteText recursively creates the parent dir).


      Output path computation, pack content, outputDir behavior, profile
      context_dir behavior, and task prepare --dry-run behavior are unchanged.
      buildContextPack() is not touched — only the write primitive. A narrow
      regression test proves the atomic write creates a missing parent dir and
      leaves no temp file behind.
    decision_refs:
      - design/decisions/context-pack-write-contract-hygiene-rfc.md
    depends_on:
      - P45-T0
    reads:
      - src/core/pack/index.ts
      - src/io/atomic-text.ts
      - tests/unit/core/pack-core.test.ts
    writes:
      - src/core/pack/index.ts
      - tests/unit/core/pack-core.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P45-context-pack-write-contract-hygiene.yaml
  - id: P45-T2
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Correct the docs that blur `task context` and context-pack file writing.
      docs/cli-contract.md § "State file write guarantees" gains an explicit
      context-pack row (written by `task prepare` / `pack`, regenerable,
      gitignored, not in the adapter manifest) and the `<adapter-owned files>`
      row drops the `.context/<agent>/*` claim (clarified to "creates the
      directory"). docs/positioning.md describes `task context` as building and
      returning/printing the pack while `task prepare` writes it.
      docs/glossary.md says the pack is deterministic Markdown content that
      `task prepare` / `pack` write to `.context/<agent>/<task-id>.md`.
      docs/agent-contract.md changes "task context would write" to "produces".
    decision_refs:
      - design/decisions/context-pack-write-contract-hygiene-rfc.md
    depends_on:
      - P45-T0
    reads:
      - docs/cli-contract.md
      - docs/positioning.md
      - docs/glossary.md
      - docs/agent-contract.md
    writes:
      - docs/cli-contract.md
      - docs/positioning.md
      - docs/glossary.md
      - docs/agent-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P45-context-pack-write-contract-hygiene.yaml
  - id: P45-T3
    type: test
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Add one narrow rule to scripts/check-doc-invariants.mjs with two scoped
      parts: (a) the `task context` bullet in docs/positioning.md must not
      describe the command as writing `.context/<agent>/<task-id>.md`; and (b)
      when docs/cli-contract.md lists the context pack among the atomic-write
      guarantees, writeContextPack() must use `atomicWriteText` (not raw
      writeFile). Both parts derive their obligation from the doc's own claim.
      No broad non-goal scanning or command-surface policing.
    decision_refs:
      - design/decisions/context-pack-write-contract-hygiene-rfc.md
    depends_on:
      - P45-T1
      - P45-T2
    reads:
      - scripts/check-doc-invariants.mjs
      - docs/positioning.md
      - docs/cli-contract.md
      - src/core/pack/index.ts
    writes:
      - scripts/check-doc-invariants.mjs
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P45-context-pack-write-contract-hygiene.yaml
  - id: P45-T4
    type: other
    ambiguity: low
