id: P64
name: Deterministic Resolution Aggregation
weight: 5
confidence: medium
risk: medium
status: planned
objective: >
  Derive bounded local fingerprint aggregates from episode order and task
  identity so repeated failures and observed resolutions can be summarized
  without storing model-generated learning or changing correctness gates.
non_goals:
  - Infer causality between a repair and a later success.
  - Store raw commands, stdout, stderr, source, diffs, prompts, responses, or reasoning.
  - Treat aggregate success as proof that a current repair is correct.
  - Change verification, progress, Evidence, Failure Capsule, repairPolicy, or context packs.
  - Add semantic search, embeddings, contributor sharing, remote sync, or a new backend.
definition_of_done:
  - Aggregates are derived only from episode order, task identity, fingerprints, and verification outcomes.
  - Each aggregate reports failure_count, resolved_count, unresolved_count, last_observed_at, last_resolved_at, and task_count.
  - P64 is the only phase that defines and derives resolved_count,
    unresolved_count, last_resolved_at, and task_count for loop-memory
    fingerprints.
  - "`resolved_count` means a same-task `verification_failed` episode is followed
    by that task's next terminal verification episode being `passed`; it does
    not infer that a repair caused the success."
  - If another failure appears before a pass, the earlier failure is not counted
    as resolved; a later pass is not assigned to every intervening fingerprint.
  - The contract covers retention-truncated history, incomplete sequences,
    same-timestamp tie-breaks, and corrupt episode exclusion.
  - Missing, empty, or corrupt local memory leaves normal command behavior unchanged.
  - Aggregates are advisory and never participate in correctness gates.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
