id: P55
name: Stable Core and Task Delta
weight: 7
confidence: low
risk: high
status: planned
requires_decision: true
objective: >
  Split context output into stable-core, task-delta, and failure-delta artifacts
  so repeated attempts can avoid resending unchanged rules and decisions.
non_goals:
  - Move active design authoring out of `design/`.
  - Trust a digest as a substitute for validating the referenced local files.
  - Require agents to cache content across unrelated repositories.
  - Replace the default combined Markdown context pack.
  - Create a second failure schema that duplicates the Failure Capsule.
definition_of_done:
  - Split artifacts are experimental and explicit opt-in; the default combined pack remains unchanged.
  - Context output publishes stable-core and task-delta artifact references plus a manifest only in split mode.
  - Stable core contains constitution, applicable rules, accepted decisions, and phase conventions.
  - Task delta contains the task definition, dependencies, reads, writes, acceptance refs, and recent progress.
  - Failure delta reuses the existing Failure Capsule by reference; it is not a new schema and is not part of task prepare output.
  - Stable-core, task-delta, and failure-delta byte counts and digests are reported.
  - Agent guidance explains that a stable-core digest alone is insufficient unless the agent has the matching content; otherwise a retrieval command is returned.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P55-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P54-T4
    description: Define the stable-core, task-delta, and failure-delta artifact boundary and manifest contract.
    reads:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
    writes:
      - docs/agent-contract.md
      - docs/cli-contract.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
  - id: P55-T2
    type: feature
    ambiguity: medium
    risk: medium
    context_size: large
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P55-T1
    description: Generate stable-core and task-delta artifacts with manifest references during context pack generation.
    reads:
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
      - src/core/pack/explain.ts
