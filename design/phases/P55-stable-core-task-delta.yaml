id: P55
name: Stable Core and Task Delta
weight: 7
confidence: low
risk: high
status: planned
requires_decision: true
objective: >
  Decide whether split context output should exist after reversible deferral,
  recommended budgets, structural projection, local failure recall, and
  task-level cycle-cost accounting have produced measurement evidence.
non_goals:
  - Move active design authoring out of `design/`.
  - Trust a digest as a substitute for validating the referenced local files.
  - Require agents to cache content across unrelated repositories.
  - Replace the default combined Markdown context pack.
  - Create a second failure schema that duplicates the Failure Capsule.
  - Implement split output before the decision is accepted.
definition_of_done:
  - The decision evaluates P52-P54 context evidence and P63-P66 local recall, retrieval, and whole-cycle cost evidence before approving any implementation.
  - "The task creates `design/decisions/P55-T1-stable-core-task-delta-rfc.md` with `Status: accepted` and a decision outcome of accepted, rejected, or deferred."
  - The ADR records natural bytes, final budgeted bytes, deferred bytes, projection before and after bytes, retrieval bytes, default combined-pack bytes, and artifact or command count changes.
  - If approved, split artifacts must be explicit opt-in and the default combined pack must remain unchanged.
  - If approved, the public contract must define `task context <task-id> --context-output split` and `task prepare <task-id> --context-output split` or an equivalent non-conflicting flag.
  - If approved, split JSON must include context output mode, manifest reference, stable-core reference, stable-core digest and bytes, task-delta reference, task-delta digest and bytes, and retrieval commands for both parts.
  - Failure delta must reuse the existing Failure Capsule fingerprint, evidence reference, and compact envelope by reference; no new failure schema or failure-delta byte count is introduced.
  - Stable-core digest alone is insufficient unless the agent has the matching content; otherwise a retrieval command must be returned.
  - The decision compares context resend cost against failure investigation, verification repetition, and memory retrieval cost.
  - The decision compares initial context savings, task-level total input bytes,
    retry count, retrieval bytes, verification repetition, and cases where the
    agent did or did not retain Stable Core.
  - Split context is not accepted when cycle evidence shows that retries and retrieval dominate total task input bytes.
  - Stable Core retention by an agent must be demonstrated rather than assumed.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P55-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P66-T3
    description: Evaluate P52-P54 and P63-P66 measurement evidence and decide whether split context output should be accepted, rejected, or deferred.
    reads:
      - design/decisions/P63-T1-token-reduction-memory-roadmap-rfc.md
      - design/decisions/*.md
      - design/phases/P66-cycle-cost-accounting.yaml
      - design/phases/P69-token-reduction-roadmap-execution-hardening.yaml
      - docs/agent-contract.md
      - docs/cli-contract.md
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
      - tests/integration/task-context-budget.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
      - tests/integration/pack-byte-identical.test.ts
      - tests/fixtures/**
    writes:
      - design/decisions/P55-T1-stable-core-task-delta-rfc.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
