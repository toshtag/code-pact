id: P55
name: Stable Core and Task Delta
weight: 7
confidence: low
risk: high
status: planned
requires_decision: true
objective: >
  Decide whether split context output should exist after reversible deferral,
  recommended budgets, and projection have produced measurement evidence.
non_goals:
  - Move active design authoring out of `design/`.
  - Trust a digest as a substitute for validating the referenced local files.
  - Require agents to cache content across unrelated repositories.
  - Replace the default combined Markdown context pack.
  - Create a second failure schema that duplicates the Failure Capsule.
  - Implement split output before the decision is accepted.
definition_of_done:
  - The decision evaluates P52-P54 measurement evidence before approving any implementation.
  - The task creates `design/decisions/P55-stable-core-task-delta-rfc.md` with an accepted, rejected, or deferred outcome.
  - If approved, split artifacts must be explicit opt-in and the default combined pack must remain unchanged.
  - If approved, the public contract must define `task context <task-id> --context-output split` and `task prepare <task-id> --context-output split` or an equivalent non-conflicting flag.
  - If approved, split JSON must include context output mode, manifest reference, stable-core reference, stable-core digest and bytes, task-delta reference, task-delta digest and bytes, and retrieval commands for both parts.
  - Failure delta must reuse the existing Failure Capsule fingerprint, evidence reference, and compact envelope by reference; no new failure schema or failure-delta byte count is introduced.
  - Stable-core digest alone is insufficient unless the agent has the matching content; otherwise a retrieval command must be returned.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P55-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P54-T4
    description: Define the stable-core, task-delta, and failure-delta artifact boundary and manifest contract.
    reads:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
    writes:
      - design/decisions/P55-stable-core-task-delta-rfc.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
