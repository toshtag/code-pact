id: P55
name: Stable Core and Task Delta
weight: 7
confidence: medium
risk: medium
status: planned
objective: >
  Split context packs into a stable project core and a task-specific delta so
  repeated attempts can avoid resending unchanged rules and decisions.
non_goals:
  - Move active design authoring out of `design/`.
  - Trust a digest as a substitute for validating the referenced local files.
  - Require agents to cache content across unrelated repositories.
definition_of_done:
  - Context output records stable-core and task-delta byte counts and digests.
  - Stable core contains constitution, applicable rules, accepted decisions, and phase conventions.
  - Task delta contains the task definition, dependencies, reads, writes, acceptance refs, recent progress, and failure capsule.
  - Agent guidance explains when unchanged stable-core digests may be reused.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P55-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P52-T1
    description: Define the stable core and task delta boundary for context packs.
    reads:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
    writes:
      - docs/agent-contract.md
      - docs/cli-contract.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
  - id: P55-T2
    type: feature
    ambiguity: medium
    risk: medium
    context_size: large
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P55-T1
    description: Compute stable-core and task-delta digests and byte metrics during context pack generation.
    reads:
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
      - src/core/pack/explain.ts
      - src/core/pack/formatters/markdown.ts
    writes:
      - src/core/pack/index.ts
      - src/core/pack/front-matter.ts
      - src/core/pack/explain.ts
      - src/core/pack/formatters/markdown.ts
      - tests/unit/core/pack-core.test.ts
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
    acceptance_refs:
      - tests/unit/core/pack-core.test.ts
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
  - id: P55-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P55-T2
    description: Document stable-core reuse guidance and the retry contract interaction.
    reads:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - CHANGELOG.md
    writes:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
      - CHANGELOG.md
