id: P54
name: Structural Context Projection
weight: 7
confidence: medium
risk: medium
status: planned
objective: >
  Add deterministic, content-type-aware context projections that reduce context
  size only where the structure is safe to preserve mechanically.
non_goals:
  - Summarize natural-language requirements.
  - Compress source code.
  - Keep lines only because they contain imperative keywords.
  - Delegate projection quality to a model.
definition_of_done:
  - Projection is enabled only on explicit budgeted context paths; default
    no-budget packs stay byte-identical.
  - "`task context --explain` does not enable projection by itself."
  - Read glob output can be grouped while the complete list remains retrievable.
  - Read-glob and decision projections preserve an exact content reference for
    omitted original material.
  - Completed task projection is excluded unless measurement proves a reduction
    beyond the current minimal rendering.
  - Decision rendering prefers explicit implementation commitments when present
    and falls back to the original on parse failure.
  - JSON projection is out of scope until a concrete context-pack JSON section
    exists.
  - Projected output falls back to the original or normal rendering when it
    would be larger.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:full
tasks:
  - id: P54-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: Define safe projection rules by content type and document the
      non-summarization boundary.
    depends_on:
