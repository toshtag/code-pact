id: P54
name: Structural Context Projection
weight: 7
confidence: medium
risk: medium
status: planned
objective: >
  Add deterministic, content-type-aware context projections that reduce context
  size only where the structure is safe to preserve mechanically.
non_goals:
  - Summarize natural-language requirements.
  - Compress source code.
  - Keep lines only because they contain imperative keywords.
  - Delegate projection quality to a model.
definition_of_done:
  - Read glob output can be grouped while the complete list remains retrievable.
  - Completed task, decision, and JSON projections preserve an exact content reference for omitted original material.
  - Completed tasks render only stable identifiers, state, and minimal evidence when the projection is smaller than the original.
  - Decision rendering prefers explicit implementation commitments when present and falls back to the original on parse failure.
  - JSON projection keeps only named agent-facing fields and falls back to the original on unknown schemas or recipes.
  - Projected output falls back to the original or normal rendering when it would be larger.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
