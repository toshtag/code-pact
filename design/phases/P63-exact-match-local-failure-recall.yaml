id: P63
name: Exact-Match Local Failure Recall
weight: 5
confidence: medium
risk: medium
status: in_progress
objective: >
  Use bounded local episodes to surface a minimal advisory signal only when the
  current verification failure has an exact matching fingerprint, reducing
  repeated failure investigation without changing correctness decisions.
non_goals:
  - Inject memory into the initial task context.
  - Return raw prior episodes, logs, prompts, responses, source, or diffs.
  - Perform semantic, fuzzy, natural-language, or embedding search.
  - Change verification, progress, Evidence, Failure Capsule, or repairPolicy.
  - Treat prior success as proof that the same repair remains correct.
  - Add contributor sharing, remote sync, SQLite, or project-level memory config.
definition_of_done:
  - Exact-match recall is limited to the current failure fingerprint.
  - Lookup runs against the pre-current-failure episode snapshot; the current
    failure episode must never contribute to exact_match_count.
  - exact_match_count is the number of matching valid episodes currently
    retained in the bounded local store, not a lifetime occurrence count.
  - First observation of a fingerprint emits no prior-local signal.
  - The advisory signal is a closed `prior_local_signal` object with
    schema_version, exact_match_count, and last_observed_at only; it is emitted
    only in `--detail agent` failure JSON, canonical JSON <= 1 KiB, and never a
    correctness gate.
  - P63 does not compute observed resolution counts, last_resolved_at,
    resolved_count, unresolved_count, or task_count.
  - Missing or corrupt local memory keeps normal verification behavior unchanged.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
