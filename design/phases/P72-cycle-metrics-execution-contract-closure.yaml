id: P72
name: Cycle Metrics Execution Contract Closure
weight: 3
confidence: high
risk: low
status: done
objective: >
  Close cycle-report self-observation, lifecycle coverage, active-cycle
  capacity, automatic correlation, and runtime task-size gaps before exact
  failure recall and cycle metrics implementation begin.
non_goals:
  - Implement exact-match runtime recall.
  - Implement aggregation runtime behavior.
  - Implement retrieval CLI runtime behavior.
  - Implement cycle metrics runtime behavior.
  - Add SQLite, JSONL, embeddings, semantic search, Git-tracked metrics,
    contributor sharing, or remote sync.
  - Change production source, test code, package metadata, CHANGELOG, context
    packs, Evidence, Failure Capsule, repairPolicy, adapters, CI, release, or
    phase archives.
  - Rewrite completed P70 or P71 events or statuses.
definition_of_done:
  - Cycle reports and maintenance commands never update the target cycle they
    observe.
  - Summable categories include standalone verify and task-control lifecycle
    stdout, and exclude cycle reports.
  - Tracking mode generated commands automatically propagate the cycle ref while
    default mode remains byte-identical.
  - Active cycles have admission control, stale abandonment, and hard-limit
    convergence.
  - P70-T2 is marked superseded by P71/P72 without hiding historical content.
  - exact_match_count is defined as a bounded retained local count, not a
    lifetime count.
  - P66 runtime work is split into bounded implementation tasks and downstream
    dependencies wait for the final P66 task.
  - P72-T4 finalization audit declares every design file it changes; the
    completed dogfood phase does not keep protected design YAML writes listed
    solely to prove the advisory.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
