id: P31
name: Deterministic roadmap-generation stabilization — make AI-assisted
  planning elicit the signals the tool runs on, and surface uncertainty
  deterministically
weight: 8
confidence: high
risk: medium
status: planned
objective: |
  The AI-assisted planning loop (`plan prompt` → `phase import` →
  `plan lint` → runbook) underuses the schema in two ways:

    1. The planning prompt's YAML example only shows id/description/type
       for tasks, so AI output omits ambiguity/risk/context_size/
       write_surface/verification_strength/requires_decision and
       `phase import` defaults them to `medium`. Attribute-driven
       `recommend` (tier/effort/budget) and context-pack rule selection
       therefore barely fire on AI-authored roadmaps.
    2. `plan lint` never surfaces uncertainty (unresolved decisions,
       low-confidence phases), so the deterministic control plane that is
       code-pact's value does not absorb the place AI is least reliable.

  This phase closes both with zero schema additions: the prompt elicits
  six task attributes plus uncertainty markers, and `plan lint` gains
  three advisory checks that surface uncertainty without failing CI
  (`affects_exit: false`). The decision-resolution predicate is shared
  with `verify` so lint and verify can never diverge.

  Scope discipline (deliberately small, 5 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — extract the ADR-resolution predicate into a shared helper and
      refactor `verify` onto it (behaviour-preserving infrastructure).
    - T2 — three lint advisories + output contract (affects_exit /
      advisories) + tests + docs.
    - T3 — prompt: six task attributes + uncertainty-marker guidelines.
    - T4 — wire the loop: next-steps + greenfield docs.

  Design recorded in design/decisions/deterministic-roadmap-stabilization-rfc.md.
non_goals:
  - a hard `--clarify-strict` gate (deferred; add only if a real need appears)
  - any new schema fields (every attribute already exists as optional)
  - changing how `verify` enforces decisions at task completion
  - eliciting expected_duration in the prompt (AI estimates it poorly; the
    medium default is acceptable)
definition_of_done:
  - plan lint --include-quality surfaces TASK_DECISION_UNRESOLVED,
    PHASE_CONFIDENCE_LOW, and TASK_DESCRIPTION_MISSING as advisories
    (affects_exit false; they do not fail --strict)
  - the ADR-resolution predicate is a single shared helper used by both
    verify and lint, pinned by a characterization test
  - plan lint --json emits affects_exit on advisory issues and a top-level
    advisories count; human output renders advisory lines as [advisory]
  - plan prompt asks for ambiguity, risk, context_size, write_surface,
    verification_strength, and requires_decision per task, plus
    uncertainty-marker guidance
  - greenfield docs and the prompt agree on phase-shape guidance
  - new diagnostic codes appear in docs/cli-contract.md and the
    error-code-surface test
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --strict --json
tasks:
  - id: P31-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      RFC + phase registration (bootstrap).

      Lands design/decisions/deterministic-roadmap-stabilization-rfc.md
      (status: accepted) and bootstraps the phase (phase YAML + roadmap
      entry, weight 8) as protected-path bootstrap writes NOT listed in
      `writes:`, per the P28/P29/P30 precedent.
    decision_refs:
      - design/decisions/deterministic-roadmap-stabilization-rfc.md
    reads:
      - src/commands/plan-prompt.ts
      - src/core/plan/lint.ts
      - src/commands/verify.ts
    writes:
      - design/decisions/deterministic-roadmap-stabilization-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P31-deterministic-roadmap-stabilization.yaml
  - id: P31-T1
    type: refactor
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Extract the ADR-resolution predicate into a shared helper and
      refactor verify onto it (behaviour-preserving).

      - New src/core/decisions/adr.ts with readDecisionAdrFiles(cwd)
        (returns [] only on ENOENT/ENOTDIR; rethrows other errors) and the
        pure predicate hasDecisionAdrForTaskId(entries, taskId) that keeps
        verify's f.includes(taskId) substring match.
      - Refactor verify.ts checkDecision to use the shared predicate while
        keeping its two distinct reason messages ("design/decisions/ does
        not exist" vs "no ADR found"). No behaviour change.
      - Characterization test pinning the substring-collision compatibility
        (hasDecisionAdrForTaskId(["P1-T10-decision.md"], "P1-T1") === true)
        and the readDecisionAdrFiles error policy.
    reads:
      - src/commands/verify.ts
    writes:
      - src/core/decisions/adr.ts
      - src/commands/verify.ts
      - tests/unit/core/decisions/adr.test.ts
  - id: P31-T2
    type: feature
    ambiguity: low
    risk: medium
    context_size: large
    write_surface: high
    verification_strength: strong
    expected_duration: long
    status: planned
    description: |
      Three lint advisories + output contract.

      - detectUnresolvedDecision (async; reads design/decisions/ once via
        the shared helper; fires when requires_decision is true at task or
        phase level and no ADR resolves it; code TASK_DECISION_UNRESOLVED;
        details.source = "task" | "phase").
      - detectLowConfidencePhase (PHASE_CONFIDENCE_LOW).
      - detectMissingTaskDescription (TASK_DESCRIPTION_MISSING; empty/unset
        only, no length floor).
      - All three affects_exit:false, registered in the includeQuality
        block.
      - Output contract: serializePlanLintData emits affects_exit; add an
        `advisories` count to PlanLintResult / JSON / summary; render
        advisory lines as [advisory].
      - Tests (firing/non-firing, phase-level requires_decision, strict-ok,
        JSON affects_exit + advisories, human summary), error-code-surface,
        cli-contract (--strict semantics, codes table, JSON shape,
        --include-quality description).
    reads:
      - src/core/plan/lint.ts
      - src/commands/plan-lint.ts
      - src/core/plan/shared.ts
    writes:
      - src/core/plan/lint.ts
      - src/commands/plan-lint.ts
      - tests/unit/core/plan/lint.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
  - id: P31-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Prompt elicits six task attributes + uncertainty markers.

      - plan-prompt.ts YAML_FORMAT_EXAMPLE: add ambiguity, risk,
        context_size, write_surface, verification_strength,
        requires_decision to the task block.
      - en-US / ja-JP planPrompt.guidelines: add four lines (annotate
        attributes; mark uncertainty via confidence: low / requires_decision
        instead of guessing medium; foundations → capabilities →
        stabilization ordering; one task = one PR, weight 5–30) keeping
        "Output ONLY the YAML" last.
      - plan-prompt tests assert the new attributes and uncertainty phrase.
    reads:
      - src/commands/plan-prompt.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
    writes:
      - src/commands/plan-prompt.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/unit/commands/plan-prompt.test.ts
  - id: P31-T4
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Wire the loop: next-steps + greenfield docs.

      - plan-prompt + phase-import buildSuggestedNextSteps: run lint with
        --include-quality and review/resolve clarify advisories before
        relying on runbooks (advisory wording, no "gate").
      - greenfield.md (en) + docs/ja/workflows/greenfield.md (ja mirror):
        note the prompt now asks for per-task attributes and uncertainty
        markers, and that plan lint --include-quality surfaces clarify
        advisories.
    reads:
      - src/commands/plan-prompt.ts
      - src/commands/phase-import.ts
      - docs/workflows/greenfield.md
    writes:
      - src/commands/plan-prompt.ts
      - src/commands/phase-import.ts
      - docs/workflows/greenfield.md
      - docs/ja/workflows/greenfield.md
      - tests/unit/commands/phase-import.test.ts
