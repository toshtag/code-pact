id: P16
name: Agent Contract Adapter Hardening
weight: 25
confidence: medium
risk: medium
status: in_progress
objective: |
  Elevate the three stable adapters (claude-code, codex,
  generic) from "instruction templates that generate per-agent
  files" to "agent contracts that lock the canonical
  code-pact workflow shape into the instruction file every
  conforming agent reads on day one". The current templates
  (v0.6 + cumulative additions through v1.5) describe the
  per-task loop (recommend → task context → implement →
  task complete → finalize) but predate the v1.6 surfaces
  (--from-file / --stdin / flag-driven plan brief & plan
  constitution; configurable protected paths; write_audit;
  --base-ref; --audit-strict; the three new advisory warning
  codes). More importantly, the templates lack a formal
  "agent contract" — a load-bearing section that names the
  workflow's three axes (when to invoke code-pact, what to
  verify first, what to do on failure) so the contract is
  legible to conformance tests AND to agents reading the
  instruction file.

  P16 formalizes the contract spec (T1 RFC), wires the
  spec into each stable adapter's instruction template
  (T2 claude-code, T3 codex + generic), extends the
  conformance test to assert section presence + 3-axis
  coverage (T4), and adds `ADAPTER_CONTRACT_DRIFT` to
  `adapter doctor` so subsequent template updates surface
  the drift programmatically (T5). Every change is additive
  on the v1.0 stable CLI contract: the new diagnostic code
  is the only public surface addition; the templates' textual
  body is the substantive change.
non_goals:
  - cursor / gemini-cli (experimental adapters) — left untouched in P16;
    they remain experimental until a separate phase reviews their
    conformance readiness
  - changing the per-agent file output shape (CLAUDE.md / codex
    instruction file / generic file all keep the same path + role +
    manifest entry; only the body text changes)
  - LLM API integration of any kind
  - changes to `adapter install` / `adapter upgrade` flag surface
    (only the diagnostic emission set in `adapter doctor` is extended)
  - per-locale customization of the new contract section (en-US +
    ja-JP only, mirroring the existing localisation surface)
  - retroactive forcing of the new contract section on projects that
    have hand-edited their instruction file; the existing
    `ADAPTER_FILE_DRIFT` flow continues to govern modify-without-
    force conflicts
definition_of_done:
  - design/phases/P16-agent-contract-adapter-hardening.yaml exists
    with this objective and tasks list
  - design/roadmap.yaml lists P16
  - "design/decisions/agent-contract-rfc.md exists with `Status:
    accepted` lock (P16-T1)"
  - "stable claude-code adapter's instruction file body emits the
    new \"## Agent contract\" section with the three axes
    (when-to-invoke, first-verify, failure-handling) plus the
    v1.6 surfaces inline (--audit-strict, --from-file, etc.)
    (P16-T2)"
  - codex + generic adapters emit functionally-identical contract
    sections (P16-T3)
  - "`tests/integration/adapter-conformance.test.ts` extends to
    assert (a) every stable adapter's instruction file contains the
    `## Agent contract` heading, (b) the three axes are each
    mentioned by name, (c) the v1.6 audit surfaces are each
    referenced at least once (P16-T4)"
  - "`ADAPTER_CONTRACT_DRIFT` ships in `KNOWN_CODES.adapter` and
    `docs/cli-contract.md`; emitted by `adapter doctor` when a
    managed instruction file is present but its contract section
    is missing or out-of-shape (P16-T5)"
  - "`tests/integration/json-stdout.test.ts` continues to pass"
  - non-stable adapters (cursor / gemini-cli) are unchanged
  - docs/cli-contract.md gains the new diagnostic code; docs/
    migration.md gains a v1.6.x → v1.7.0 section once P16 ships
  - CHANGELOG.md gains entries under `[Unreleased]` covering each
    P16 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
tasks:
  - id: P16-T1
    type: architecture
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: in_progress
    description: |
      RFC acceptance. Land design/decisions/agent-contract-rfc.md
      with `Status: proposed` in this PR; the status line flips
      to `accepted` in a follow-up commit before merge (per the
      P11/P12/P13/P14 RFC lifecycle precedent). No src/ change
      in this task — the purpose is to lock the agent-contract
      design decisions (the three axes, the section
      structure, the per-adapter scope, the diagnostic strategy,
      the deferred fallback for cursor / gemini-cli, the
      drift-handling story with the existing
      `ADAPTER_FILE_DRIFT` flow) before any adapter template
      is edited in P16-T2 / T3.

      Register P16 in design/roadmap.yaml (weight 25, this file's
      objective + non-goals + DoD + tasks). The phase status
      line stays `in_progress` until P16-T5 lands.
    decision_refs:
      - design/decisions/agent-contract-rfc.md
    reads:
      - src/core/adapters/claude.ts
      - src/core/adapters/codex.ts
      - src/core/adapters/generic.ts
      - src/core/adapters/types.ts
      - tests/integration/adapter-conformance.test.ts
      - docs/cli-contract.md
    writes:
      - design/decisions/agent-contract-rfc.md
      - design/phases/P16-agent-contract-adapter-hardening.yaml
      - design/roadmap.yaml
      - CHANGELOG.md
    acceptance_refs:
      - design/decisions/agent-contract-rfc.md
  - id: P16-T2
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      claude-code adapter's instruction template gains the
      `## Agent contract` section per the P16-T1 RFC. The
      section names the three axes (when-to-invoke,
      first-verify, failure-handling), references the v1.6
      surfaces (--audit-strict / --from-file / --stdin /
      flag-driven plan brief & constitution / configurable
      protected paths / write_audit / --base-ref), and links
      back to docs/cli-contract.md for the full envelope
      reference. The existing skill files, hook directory,
      model selection, project conventions sections are
      preserved verbatim. en-US + ja-JP locale variants both
      get the section in their localised text.

      Adapter manifest schema is unchanged. The contract
      section is a textual addition inside the existing
      instruction file (`CLAUDE.md`); no new file or directory
      is created. Existing user customisations that override
      the body trip the existing `ADAPTER_FILE_DRIFT` flow
      (managed file with sha256 mismatch); `--accept-modified`
      preserves user edits. The P16-T5 `ADAPTER_CONTRACT_DRIFT`
      diagnostic is the soft signal for "contract section
      missing" — orthogonal to the file-level drift signal.
    depends_on:
      - P16-T1
    decision_refs:
      - design/decisions/agent-contract-rfc.md
    reads:
      - src/core/adapters/claude.ts
      - src/core/adapters/types.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/integration/adapter-conformance.test.ts
    writes:
      - src/core/adapters/claude.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/fixtures/adapters/claude-code/expected-files.txt
      - tests/integration/adapter-conformance.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/decisions/agent-contract-rfc.md
  - id: P16-T3
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      codex and generic adapters gain functionally-identical
      contract sections — same three axes, same v1.6 surface
      references — adapted for each adapter's instruction file
      shape (codex: AGENTS.md; generic: a simpler text body).
      en-US + ja-JP variants for both. Tests: extend conformance
      coverage to assert the section in each adapter's output.
    depends_on:
      - P16-T1
    decision_refs:
      - design/decisions/agent-contract-rfc.md
    reads:
      - src/core/adapters/codex.ts
      - src/core/adapters/generic.ts
      - src/core/adapters/claude.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
    writes:
      - src/core/adapters/codex.ts
      - src/core/adapters/generic.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/fixtures/adapters/codex/expected-files.txt
      - tests/fixtures/adapters/generic/expected-files.txt
      - tests/integration/adapter-conformance.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/decisions/agent-contract-rfc.md
  - id: P16-T4
    type: feature
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: planned
    description: |
      Extend `tests/integration/adapter-conformance.test.ts`
      to assert, for every stable adapter (claude-code, codex,
      generic), that the emitted instruction file contains:
      (a) the literal `## Agent contract` heading,
      (b) named mentions of the three axes
      (when-to-invoke, first-verify, failure-handling),
      (c) at least one reference to each new v1.6 audit
      surface (`--audit-strict`, `--from-file`, `--stdin`,
      `write_audit`).
      Tests run on the same fixtures the P14 conformance
      suite uses; cursor / gemini-cli stay excluded.
    depends_on:
      - P16-T2
      - P16-T3
    decision_refs:
      - design/decisions/agent-contract-rfc.md
    reads:
      - tests/integration/adapter-conformance.test.ts
      - tests/fixtures/adapters/claude-code/expected-files.txt
      - tests/fixtures/adapters/codex/expected-files.txt
      - tests/fixtures/adapters/generic/expected-files.txt
      - src/core/adapters/claude.ts
      - src/core/adapters/codex.ts
      - src/core/adapters/generic.ts
    writes:
      - tests/integration/adapter-conformance.test.ts
    acceptance_refs:
      - design/decisions/agent-contract-rfc.md
  - id: P16-T5
    type: feature
    ambiguity: medium
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: planned
    description: |
      Add `ADAPTER_CONTRACT_DRIFT` to `KNOWN_CODES.adapter`.
      Emitted by `adapter doctor` (single agent) and global
      `doctor` (every installed agent) when a managed
      instruction file is present but its `## Agent contract`
      section is missing or its three-axis content is
      out-of-shape. Soft signal — does not gate
      `adapter doctor` exit code (the file-level
      `ADAPTER_FILE_DRIFT` still does that). Tests: fixture
      with a hand-edited instruction file that deletes the
      contract section → `ADAPTER_CONTRACT_DRIFT` fires;
      pristine fixture → no fire.
    depends_on:
      - P16-T2
      - P16-T3
    decision_refs:
      - design/decisions/agent-contract-rfc.md
    reads:
      - src/commands/adapter.ts
      - src/core/adapters/file-state.ts
      - src/core/adapters/manifest.ts
      - tests/unit/error-code-surface.test.ts
    writes:
      - src/commands/adapter.ts
      - src/core/adapters/file-state.ts
      - tests/unit/commands/adapter-doctor.test.ts
      - tests/integration/adapter-cli.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/decisions/agent-contract-rfc.md
