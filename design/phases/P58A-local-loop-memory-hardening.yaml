id: P58A
name: Local Loop Memory Hardening
weight: 4
confidence: high
risk: medium
status: planned
objective: >
  Harden the local loop-memory cache introduced by P58 so scanning, retention,
  warnings, doctor checks, and CLI failures are bounded, accurate, and stable
  without adding recall or context injection.
non_goals:
  - Add exact-match recall, semantic search, embeddings, SQLite, JSONL, or
    remote sync.
  - Read loop memory from task prepare, task context, recommend, or standalone
    verify.
  - Share loop-memory records through Git, CI, contributors, or project rules.
  - Change Evidence, Context, Failure Capsule, repair policy, or progress event
    schemas.
  - Change retention limits, storage root, release version, CI required jobs, or
    archive state.
definition_of_done:
  - Oversized episode files are rejected before body read.
  - Episode filename identity must match canonical episode content.
  - Retention apply preflights the whole batch and treats concurrent deletion
    idempotently.
  - Memory write and prune warnings distinguish unrecorded episodes from skipped
    maintenance.
  - Memory CLI operational failures return stable JSON envelopes under --json.
  - Doctor uses Git ignore semantics for the local cache probe.
  - Root help, ADR, public docs, and regression tests match the hardened
    contract.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P58A-T1
    type: bugfix
    ambiguity: medium
    risk: medium
    context_size: large
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: Bound episode scanning, validate filename identity, tighten
      timestamp and path safety, and remove the unused evidence_ref field.
    reads:
