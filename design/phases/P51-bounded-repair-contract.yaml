id: P51
name: Bounded Repair Contract
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Turn the compact failure capsule and normalized failure fingerprint into a
  deterministic agent contract for one bounded repair attempt before any model
  escalation is considered.
non_goals:
  - Restart or orchestrate an agent process from code-pact.
  - Apply a wider context pack automatically.
  - Retry timeout, abort, decision, unsafe write, or invalid-state failures.
definition_of_done:
  - The agent contract documents when a repair attempt is allowed, skipped, or stopped.
  - The contract requires the same model, effort, and context for the bounded repair attempt.
  - Same-fingerprint recurrence stops instead of retrying again.
  - Existing escalation guidance is used only after the bounded repair budget is exhausted.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
tasks:
  - id: P51-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: Define the bounded repair state machine and terminal stop reasons.
    reads:
      - docs/agent-contract.md
      - src/core/evidence/failure-capsule.ts
      - src/core/evidence/failure-fingerprint.ts
      - src/core/recommend/escalation.ts
    writes:
      - docs/agent-contract.md
      - docs/cli-contract.md
    acceptance_refs:
      - docs/agent-contract.md
      - docs/cli-contract.md
  - id: P51-T2
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P51-T1
    description: Surface repair eligibility and stop reasons in recommendation and task-prepare output.
    reads:
      - src/core/recommend/index.ts
      - src/core/schemas/recommend-result.ts
      - src/commands/recommend.ts
      - src/commands/task-prepare.ts
    writes:
      - src/core/recommend/index.ts
      - src/core/schemas/recommend-result.ts
      - src/commands/recommend.ts
      - src/commands/task-prepare.ts
      - tests/unit/core/recommend/resolve.test.ts
      - tests/unit/commands/recommend.test.ts
      - tests/unit/commands/task-prepare.test.ts
    acceptance_refs:
      - tests/unit/core/recommend/resolve.test.ts
      - tests/unit/commands/recommend.test.ts
      - tests/unit/commands/task-prepare.test.ts
  - id: P51-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P51-T2
    description: Add migration and changelog notes for the bounded repair contract.
    reads:
      - docs/upgrading.md
      - CHANGELOG.md
    writes:
      - docs/upgrading.md
      - CHANGELOG.md
    acceptance_refs:
      - docs/upgrading.md
      - CHANGELOG.md
