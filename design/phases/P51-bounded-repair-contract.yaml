id: P51
name: Bounded Repair Contract
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Turn the compact failure capsule and normalized failure fingerprint into a
  deterministic agent contract for one bounded repair attempt before any model
  escalation is considered.
non_goals:
  - Restart or orchestrate an agent process from code-pact.
  - Apply a wider context pack automatically.
  - Retry timeout, abort, decision, unsafe write, or invalid-state failures.
definition_of_done:
  - The agent contract documents when a repair attempt is allowed, skipped, or stopped.
  - The contract requires the same model, effort, and context for the bounded repair attempt.
  - The repair policy is a pure total function with a priority-stable decision table and exhaustive branch tests.
  - Eligibility priority is fixed as decision loop, record-only, architecture, high ambiguity, high risk, high write surface, weak verification, then bounded repair.
  - Decision-loop, record-only, architecture, high-ambiguity, high-risk, high-write-surface, and weak-verification tasks are repair-disabled.
  - Only command failures are repair-eligible, and only for one attempt before escalation guidance can apply.
  - Same-fingerprint recurrence stops instead of retrying again.
  - Generated adapter guidance and adapter conformance invariants carry the same repair contract.
  - Full evidence retrieval is recommended only when excerpts are insufficient.
  - Existing escalation guidance is used only after the bounded repair budget is exhausted.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm build
    - pnpm test:integration:smoke
