id: P30
name: Adapter contract hardening — make the post-P29 `task prepare` primary
  contract mechanically enforceable in adapter conformance
weight: 8
confidence: high
risk: medium
status: done
objective: |
  Continuation of P29, not new product work. P29's root cause was
  not the `--agent` typo — it was that the contract surface handed
  to agents (commands dictionary, adapter guidance, generated
  instructions) was not mechanically checked. P29 closed the
  commands-dictionary gap with a parser roundtrip test. P30 closes
  the adjacent gap: `adapter conformance` today checks only that
  required CLI surfaces are *mentioned* (substring), not that the
  guidance actually presents `task prepare` as primary or that it
  is free of the anti-patterns P29 removed.

  Scope discipline (this is deliberately small):

    1. T1 — conformance asserts `task prepare` is the PRIMARY
       per-task entrypoint (positioned ahead of recommend / task
       context) AND fails on the P29 anti-pattern classes
       (`task finalize ... --agent`; `recommend` framed as primary).
    2. T2 — conformance asserts the P29-T3 activation rules are
       DOCUMENTED. Precision: PRESENCE, never runtime OBEDIENCE.
    3. T3 — hybrid version-gated severity + docs: the new checks are
       required for adapters whose manifest generator_version is
       >= the P30 release, advisory below.
    4. T4 — (cheap, optional) measurement honesty for the adherence
       metric label.

  Severity model (accepted in the RFC): each conformance check
  carries `severity` (required | advisory). `compliant` is false
  only when a REQUIRED check fails; advisory failures are surfaced
  with an `adapter upgrade` remediation but keep `compliant: true`.
  The version threshold is release-coupled
  (ADAPTER_CONTRACT_HARDENING_FROM_VERSION = "1.14.0", confirmed at
  release prep) so "required" never applies to installs that
  predate the P29-aligned templates. The package version is NOT
  bumped in this phase (that belongs to release prep), so in-tree /
  CI installs run the new checks at advisory; template *content*
  conformance is asserted directly, independent of severity.

  Honesty note: P29's own non_goals introduced phantom phase ids
  (`P30 idea`, `P32 idea`) for unnumbered future work — the same
  class P29-T5 cleaned up. T0 corrects them.
non_goals:
  - adapter architecture rewrite or a new adapter schema version
  - new agent support (cursor / gemini-cli stay as-is)
  - evidence harness reproducibility (an unnumbered future capability, not part
    of this phase)
  - read_refs / line-range context (an unnumbered future capability)
  - Spec Kit Bridge v2
  - README positioning changes that name external OSS projects
  - no `task prepare --record` and no change that makes `task prepare` write
    progress — its read-only nature is a design virtue (deferred future
    consideration)
  - asserting runtime OBEDIENCE of behavioural rules in conformance (static
    checks verify documentation presence only)
  - bumping the package version (release-prep concern)
definition_of_done:
  - "design/decisions/adapter-contract-hardening-rfc.md exists (status:
    accepted) recording the hybrid version-gated severity decision (P30-T0)"
  - design/phases/P30-adapter-contract-hardening.yaml + design/roadmap.yaml list
    P30 (P30-T0, bootstrap writes)
  - P29's non_goals phantom phase-id labels (`P30 idea` / `P32 idea`) are
    reworded to `unnumbered future capability` (P30-T0)
  - ConformanceCheck carries an explicit `severity` (required | advisory);
    `compliant` is false only when a required check fails (P30-T1)
  - "`adapter conformance` checks `task prepare` is presented as primary (in the
    workflow section and ahead of the first `recommend` / `task context`
    mention) and fails when generated instructions / examples contain `task
    finalize ... --agent` or present `recommend` as primary (P30-T1)"
  - "`adapter conformance` checks the P29-T3 activation rules are present; the
    check id and docs state it verifies documentation presence, not runtime
    obedience (P30-T2)"
  - severity resolves from manifest generator_version vs
    ADAPTER_CONTRACT_HARDENING_FROM_VERSION; advisory failures name the violated
    rule and the `adapter upgrade` remediation (P30-T3)
  - docs/agent-contract.md (and cli-contract.md if needed) document the new
    checks, the severity model, and the version gating (P30-T3)
  - new checks are pinned by tests — a violating instruction fixture fails at
    required severity and is advisory below the threshold; the claude / codex /
    generic templates pass the content checks by construction (P30-T1..T3)
  - (if cheap) docs that say `Agent command adherence` are reworded to name
    state-machine / lifecycle adherence and note prepare-adherence is unmeasured
    (P30-T4)
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P30 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --strict --json
    - node dist/cli.js adapter conformance --agent claude-code --json
tasks:
  - id: P30-T0
    type: architecture
    ambiguity: medium
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      RFC + phase registration.

      design/decisions/adapter-contract-hardening-rfc.md is landed
      (status: accepted — it records the hybrid version-gated
      severity decision and the release-coupled FROM_VERSION).

      Bootstraps the phase (phase YAML + roadmap entry, weight 8) as
      protected-path bootstrap writes NOT listed in `writes:`, per
      the P21/P24/P26/P27/P28 precedent. The correction of P29's
      non_goals phantom phase-id labels (`P30 idea` / `P32 idea` →
      `unnumbered future capability`) edits
      design/phases/P29-contract-truth.yaml, also a protected path —
      a bootstrap-class edit likewise NOT listed in `writes:` (this
      task runs without `--audit-strict`; deviation noted in
      CHANGELOG).
    decision_refs:
      - design/decisions/adapter-contract-hardening-rfc.md
    reads:
      - design/phases/P29-contract-truth.yaml
      - src/core/adapters/conformance-spec.ts
      - src/commands/adapter-conformance.ts
    writes:
      - design/decisions/adapter-contract-hardening-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P30-adapter-contract-hardening.yaml
  - id: P30-T1
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Severity-aware result model + `task prepare` primary +
      anti-pattern rejection.

      - Add `severity: "required" | "advisory"` to ConformanceCheck.
        Existing checks are `required`. `compliant` becomes
        `checks.every(c => c.status === "pass" || c.severity ===
        "advisory")` — i.e. only a required failure breaks
        compliance.
      - New check `task_prepare_is_primary`: `code-pact task prepare`
        appears in the per-task workflow section AND ahead of the
        first `code-pact recommend` / `code-pact task context`
        mention (positional check on the instruction body, not NLP).
      - New check `no_contract_antipatterns`: fails if the
        instruction / its fenced examples contain
        `task finalize` followed by `--agent`, or present `recommend`
        as the primary entrypoint (e.g. as workflow step `0.` /
        "start with `recommend`"). The conformance-layer analogue of
        P29's parser roundtrip test.
      - These two checks are introduced at `advisory` severity here;
        T3 adds the version gating that promotes them to `required`
        for post-threshold installs. (Advisory-by-default keeps T1
        non-breaking; conformant templates pass regardless.)
      - conformance-spec.ts gains the anti-pattern constants and the
        primary-ordering surfaces with the existing RFC-governance
        comment.

      Tests: a fixture instruction that leads with `recommend` or
      contains `task finalize ... --agent` fails the relevant check;
      the claude/codex/generic templates pass both content checks.
    depends_on:
      - P30-T0
    decision_refs:
      - design/decisions/adapter-contract-hardening-rfc.md
    reads:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - tests/integration/adapter-conformance.test.ts
    writes:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - tests/integration/adapter-conformance.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P30-adapter-contract-hardening.yaml
  - id: P30-T2
    type: feature
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: medium
    status: done
    description: |
      Conformance: activation rules are DOCUMENTED.

      New check `activation_rules_documented`: the P29-T3 rules are
      present in the guidance:
        - `task finalize --write` only after `task complete`
        - `wait_for_dependencies` → do not implement
        - `CONTEXT_OVER_BUDGET` → report, do not widen unasked
      Implemented as keyword presence (localised prose; presence is
      the contract). Introduced at `advisory` severity (T3 gates it).

      PRECISION (load-bearing): the check id, details, and docs state
      it verifies the rule is DOCUMENTED, NOT that an agent OBEYS it
      at runtime — a static file check cannot observe behaviour, and
      claiming otherwise re-introduces the contract-overstatement
      P28/P29 corrected.

      Tests: a fixture missing a rule keyword fails; the post-P29
      templates pass.
    depends_on:
      - P30-T1
    decision_refs:
      - design/decisions/adapter-contract-hardening-rfc.md
    reads:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - src/i18n/en-US.ts
      - tests/integration/adapter-conformance.test.ts
    writes:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - tests/integration/adapter-conformance.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P30-adapter-contract-hardening.yaml
  - id: P30-T3
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Hybrid version-gated severity + docs.

      - Add `ADAPTER_CONTRACT_HARDENING_FROM_VERSION = "1.14.0"` to
        conformance-spec.ts with the release-coupled comment.
      - Resolve the severity of the three P30 checks
        (task_prepare_is_primary, no_contract_antipatterns,
        activation_rules_documented) from the manifest
        `generator_version`: semver >= FROM_VERSION → required;
        missing / unparseable / below → advisory.
      - An advisory failure's `details` names the violated rule and
        the remediation (`adapter upgrade <agent> --write`).
      - docs/agent-contract.md documents the new checks, the
        severity model, and the version gating; cli-contract.md is
        updated if the conformance envelope shape (new `severity`
        field) is documented there.

      Tests: a violating fixture with generator_version >=
      FROM_VERSION yields a required failure (compliant: false); the
      same violation below the threshold yields an advisory failure
      (compliant: true) whose details carry the upgrade remediation.
    depends_on:
      - P30-T2
    decision_refs:
      - design/decisions/adapter-contract-hardening-rfc.md
    reads:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - src/core/schemas/adapter-manifest.ts
      - docs/agent-contract.md
      - docs/cli-contract.md
      - tests/integration/adapter-conformance.test.ts
    writes:
      - src/commands/adapter-conformance.ts
      - src/core/adapters/conformance-spec.ts
      - docs/agent-contract.md
      - docs/cli-contract.md
      - tests/integration/adapter-conformance.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P30-adapter-contract-hardening.yaml
  - id: P30-T4
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      (Cheap, optional) measurement honesty.

      If docs still say "Agent command adherence" while the metric
      only measures started→done state-machine adherence (no
      `started` shortcut), reword to "task lifecycle (state-machine)
      adherence" and note prepare-adherence is NOT measured
      (`task prepare` is read-only by design and leaves no event).
      `task prepare --record` stays a deferred future consideration,
      explicitly out of scope.

      Touch only docs/positioning.md and docs/agent-contract.md
      where the metric is named. If the reword needs more than a
      label/clarification change, record it as a follow-up rather
      than expanding this phase.
    depends_on:
      - P30-T3
    reads:
      - docs/positioning.md
      - docs/agent-contract.md
    writes:
      - docs/positioning.md
      - docs/agent-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P30-adapter-contract-hardening.yaml
