id: P44
name: CI / adoption page — a single findable home for running code-pact in CI
  (docs/workflows/ci.md + ja mirror); move the runnable Actions template out of
  cli-contract into ci.md so there is one canonical CI home
weight: 4
confidence: high
risk: low
status: done
objective: |
  Running code-pact in CI is documented, but scattered across six+ docs with no
  single home and no docs-hub entry. The one copy-pasteable GitHub Actions
  example (in cli-contract.md) runs only validate --strict --base-ref, so a
  consumer who copies it ships a CI that misses plan-integrity and write-audit
  regressions. The preconditions that cause the most common CI failures (untracked
  progress.yaml silently skips the gate; missing --base-ref fires DECLARED_UNUSED;
  merge-base needs full git history) are scattered footnotes, not one checklist.

  The detectors already exist (P33/P34 — CONTROL_PLANE_*, branch-drift). The gap
  is a findable adoption home, not new machinery. Same theme as P39-P43.

  P44 adds one new usage page, docs/workflows/ci.md, as the single CI adoption
  home, plus its mandatory docs/ja mirror (workflows/* is in the ja-sync list, so
  the mirror is not deferrable). It is a thin orchestration page: it sequences and
  links the existing facts rather than restating them. Contributor-DX safe — the
  page splits a before-a-PR contributor loop from a maintainer/release full loop,
  ships only a minimal pull_request Actions example (project-local pinned binary
  per P42, never npx @latest), explains that some plan lint --include-quality
  diagnostics are advisory (affects_exit false) review guidance not hard blockers,
  and consolidates the preconditions into one checklist linking canonical homes.
  The one real content move is taking cli-contract.md's Actions YAML out (it now
  holds only the --base-ref contract + a link to ci.md) and making ci.md's
  example the full recommended gate — one canonical template, no duplication.

  Design recorded in design/decisions/ci-adoption-page-rfc.md.
non_goals:
  - No new CLI command, flag, detector, or schema — the detectors exist (P33/P34)
  - No init-scaffolded workflow file or .code-pact/templates artifact
  - No matrix, caching, release, or npm-publish automation in the example
  - No non-GitHub CI provider pages — provider-neutral requirements may be stated
    in prose, but only the GitHub Actions example ships
  - No restatement of the Actions YAML, envelope shapes, or detector specs that
    cli-contract.md owns — ci.md links to them (anti-duplication rule)
  - No external-tool name-drops in public docs
definition_of_done:
  - docs/workflows/ci.md exists with a contributor loop vs maintainer/release loop
    split, a minimal pull_request Actions example using the project-local pinned
    binary (no npx @latest), the plan lint --include-quality --strict advisory
    nuance explained, and a consolidated preconditions checklist linking canonical
    homes — no duplicated YAML or detector spec
  - docs/ja/workflows/ci.md mirror ships in the same change, with reciprocal
    language-switcher lines on both pages
  - docs/README.md and docs/ja/README.md each gain one Workflows row linking it
  - cli-contract.md no longer holds a runnable Actions YAML — its CI section is
    the --base-ref contract + diagnostics plus a link to ci.md; ci.md's example
    is the full recommended gate (validate --strict --base-ref + plan lint
    --include-quality --strict + plan analyze --strict)
  - docs/maintainers/docs-maintenance.md registers the CI page in the ownership
    map / ja-sync list
  - docs/ja/getting-started.md install-facing guidance (Prerequisites + Install)
    is synced to the exact-pin path the ja CI page links to (P42 ja follow-up)
  - pnpm check:docs passes; validate and plan lint --include-quality --strict and
    plan analyze --strict stay green
verification:
  commands:
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
    - node dist/cli.js plan analyze --strict --json
