id: P4
name: Stabilize & Dogfood
weight: 25
confidence: medium
risk: low
status: in_progress
objective: >
  Make code-pact stable enough to dogfood its own development. Update all documentation
  to reflect the v0.5/v0.6 command surface, ship the v0.6 task execution-state commands
  (start / status / block / resume), promote recommend into the agent-facing loop, and
  validate the full plan → import → context → start → block/resume → status → complete
  loop against real tasks.
definition_of_done:
  - design/brief.md and design/constitution.md reflect real project intent
  - design/roadmap.yaml references actual phase files
  - docs/dogfood.md covers v0.5 adapter, context quality, doctor, and the v0.6 task state loop
  - docs/cli-contract.md documents all v0.5 additions and the v0.6 state-machine contract
  - task start/status/block/resume implemented, tested, and documented
  - recommend promoted into the README / dogfood agent-facing narrative
  - doctor reports no errors on the repo itself
  - v0.5.0 released
verification:
  commands:
    - pnpm test
    - pnpm typecheck
    - pnpm build
    - code-pact doctor
