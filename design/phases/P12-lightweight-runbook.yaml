id: P12
name: Lightweight Runbook
weight: 20
confidence: medium
risk: low
status: planned
objective: |
  Add two read-only commands — `task runbook <task-id>` and `phase
  runbook <phase-id>` — that return a deterministic list of next
  recommended steps for a task or a phase. The runbook never
  executes anything: every step is a command string the user (or
  an agent) runs separately, or a manual_action describing a
  human checkpoint. P12 ships the commands as Stable (v1.3+) from
  day one because they introduce no new mutation surface, no new
  schema fields, and no new error codes. The runbook integrates
  P10 (task readiness fields) and P11 (finalize / reconcile)
  declarations: `depends_on` produces blocking dependency-check
  steps; `done` events without design `done` produce a `task
  finalize` step; phase-level reconcile candidates produce a
  single `phase reconcile --write` step. The existing Stable
  contracts for `task complete`, `task finalize`, `phase
  reconcile`, `task context`, `task start/block/resume/status`,
  and `plan analyze` are preserved unchanged.
non_goals:
  - any change to `task complete` / `task finalize` / `phase reconcile` semantics
  - any change to `progress.yaml` append-only contract
  - any change to existing STATUS_DRIFT kinds, severity, or hidden_by_default values
  - any new public error code (existing TASK_NOT_FOUND / AMBIGUOUS_TASK_ID / PHASE_NOT_FOUND / CONFIG_ERROR are reused)
  - any new task or phase schema field (the `human_gate` concept is expressed inside a RunbookStep, not on the Task schema)
  - any mutation by `task runbook` / `phase runbook` (no `--write` flag exists; both commands are read-only)
  - agent adapter invocation from runbook (no `--agent` flag; runbook never calls an adapter)
  - automatic phase status flip (advisory only via reconcile candidate; phase status remains a manual release-prep step until P14)
  - design/roadmap.yaml mutation (P14 governance candidate)
  - multi-phase runbook (`--all` / `--every`) (future extension)
  - init / wizard / task add UX polish (P13 scope — explicitly deferred per RFC § Open questions)
  - planning prompt / phase import / plan brief / plan constitution UX changes (P13 scope)
  - LLM / RAG / MCP / multi-agent orchestration / scheduler / issue-tracker integration (excluded from the v1.x window)
  - runbook step execution / `task runbook --execute` style flag (a future RFC may revisit; v1.3 ships proposal-only semantics)
  - extraction of the duplicated task→phase resolver across 7+ commands (P14 candidate; runbook uses PlanState.taskIndex directly)
definition_of_done:
  - design/decisions/lightweight-runbook-rfc.md exists and is marked accepted
  - design/roadmap.yaml lists P12
  - design/phases/P12-lightweight-runbook.yaml exists with this objective and tasks list
  - "`task runbook <task-id>` ships as Stable (v1.3+) with default JSON envelope `data.kind: \"runbook\"`, per-state recommended steps, depends_on blocking steps, and acceptance_refs / declared_writes / decision_refs surface display"
  - "`phase runbook <phase-id>` ships as Stable (v1.3+) with phase-level task histogram, reconcile candidate integration, and per-priority step generation"
  - shared helpers in `src/core/runbook/` provide `RunbookStep` / `RunbookContext` types and the `buildTaskRunbook` / `buildPhaseRunbook` core; `classifyTaskDrift` is exported from `src/core/plan/analyze.ts` (same-module export — analyze.ts is already core layer); the reconcile classifier currently private in `src/commands/phase-reconcile.ts` is extracted to `src/core/finalize/reconcile-classifier.ts` so both `phase-reconcile.ts` and `src/core/runbook/` import from a core module (preserves `command → core` dependency direction)
  - new commands appear in `tests/integration/json-stdout.test.ts` so the Stable (v1.3+) JSON-only stdout regression net covers them
  - "`KNOWN_CODES.public` is unchanged (no new error codes added)"
  - "`tests/integration/pack-byte-identical.test.ts` continues to pass (no `task context` pack change in P12)"
  - "`docs/migration.md` gains a v1.2.x → v1.3.0 section explaining when to reach for `task runbook` vs `phase runbook`, and explicitly listing init / planning UX polish as deferred to P13"
  - "`docs/concepts/runbook.md` walkthrough exists (mirrors `docs/concepts/finalization-reconciliation.md` shape)"
