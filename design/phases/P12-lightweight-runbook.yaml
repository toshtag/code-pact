    description: |
      `task runbook` command. Single PR landing the read-only
      guidance command for a single task. Resolves task id via
      PlanState.taskIndex (no extra duplication of task→phase
      logic). Loads progress log once, derives state, calls
      `buildTaskRunbook` from T2. Returns JSON `{ ok: true, data:
      { kind: "runbook", task_id, phase_id, state_summary,
      next_steps: RunbookStep[] } }`. Reuses existing
      TASK_NOT_FOUND / AMBIGUOUS_TASK_ID / CONFIG_ERROR. No new
      error codes. Adds the command to tests/integration/json-
      stdout.test.ts. Updates docs/cli-contract.md § `task` with
      the new command section annotated `Stable (v1.3+)`.
