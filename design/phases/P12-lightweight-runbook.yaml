      - tests/unit/core/runbook/build-phase-runbook.test.ts
      - tests/unit/core/runbook/depends-on.test.ts
    acceptance_refs:
      - design/decisions/lightweight-runbook-rfc.md
    description: |
      Shared runbook helpers. Lands BEFORE the command surfaces
      (T3 and T4 depend on it). Owns:
      (a) export of `classifyTaskDrift` from
      `src/core/plan/analyze.ts` so the runbook can label a task
      with its drift kind (analyze.ts is already core layer, so
      same-module export preserves layering);
      (b) extraction of the reconcile classifier currently
      private inside `src/commands/phase-reconcile.ts` into a new
      `src/core/finalize/reconcile-classifier.ts` module. The
      command file imports the new core helper; the runbook also
      imports it. This keeps the dependency direction
      command → core, never core → command. P11's
      `src/core/finalize/` namespace is the natural home;
      `phase-reconcile.ts` retains only the command wiring (CLI
      argv parsing, JSON envelope) and delegates classification
      to the core helper;
      (c) new `src/core/runbook/` module owning `RunbookStep`
      and `RunbookContext` types, `resolveDependsOnStates(events,
      task)` helper, and pure `buildTaskRunbook(ctx)` /
      `buildPhaseRunbook(ctx)` functions. No I/O in src/core/
      helpers — commands pass already-loaded PlanState / progress
      log. This keeps the helpers fast, deterministic, and unit-
      testable without filesystem fixtures.
      Validation: existing `tests/unit/commands/phase-reconcile
      .test.ts` continues to pass without changes; the
      classifier extraction is a pure refactor with no behaviour
      change.
