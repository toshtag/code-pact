id: P24
name: Context budget enforcement — --budget-bytes on task context / task prepare
weight: 18
confidence: high
risk: low
status: done
objective: |
  Add a `--budget-bytes <N>` flag to `code-pact task context`
  and `code-pact task prepare` that enforces a deterministic
  upper bound on the rendered context pack size by progressively
  eliding sections in a fixed priority order. Activates the
  `budget_reserved_for_later` reason code that P21-T4 reserved
  for this work in `ContextExcludedReasonCode`.

  The elision priority is locked in the RFC:

    1. completed_tasks  (ambiguity:high-only signal)
    2. related_decisions when context_size:large
    3. constitution
    4. rules when write_surface:high
    5. reads (declared globs)

  Sections NOT in this list never elide (header,
  phase_contract, task_definition, depends_on, writes,
  declared_decisions, acceptance_refs, verification_commands,
  progress_event_schema, format_overhead). When maximal
  elision still cannot meet the budget, the command fails
  with the new public error code CONTEXT_OVER_BUDGET, exit
  code 2, with `data.minimum_achievable_bytes` and
  `data.unelidable_sections` in the envelope so the caller
  can adjust.

  Byte-identical contract preserved: when `--budget-bytes` is
  not set, the rendered pack content is byte-for-byte
  identical to v1.12 (the existing pack-byte-identical lock
  test continues to pass without modification). The flag is
  opt-in per invocation.

  In --explain --json mode with --budget-bytes, every elided
  section appears in `excluded[]` with `reason_code:
  budget_reserved_for_later` (the P21-reserved value finally
  activates). Sections excluded by the v1.11 inclusion policy
  keep their v1.11 reason codes; budget elision applies only
  to sections that would otherwise have been included.

  `task prepare` with `--budget-bytes` enforces the same
  budget on the pack it writes (or simulates under
  `--dry-run`). The progress-read-only invariant from P21-T3
  is preserved on every path including the new CONTEXT_OVER_BUDGET
  failure.

  Motivated by the P26 dogfood baseline: `pack_size_max_bytes:
  259650` is a real outlier task (P21-T0 inlining the full
  agent-contract-v2-rfc.md via decision_refs). Budget
  enforcement gives consumers a deterministic lever for
  context-constrained models.
non_goals:
  - automatic budget inference from agent profile (the flag is opt-in per
    invocation; a default-budget RFC is deferred)
  - section-level truncation / summarisation (P24 elides whole sections only)
  - reordering of sections (the renderer's output order is fixed by the v1.11
    contract)
  - "`--budget-tokens` flag (requires per-model-family tokenizer; bytes are the
    model-agnostic proxy)"
  - retroactive harness metric for post-budget pack size (the value depends on
    the chosen budget; would muddy the unconditional pack_size signal)
  - applying budget enforcement to the legacy `code-pact pack` command
    (preferred entry is `task context`)
  - new flag on `adapter conformance` (conformance is about adapter contract
    surface, not pack size)
definition_of_done:
  - design/phases/P24-context-budget.yaml exists with this objective and tasks
    list (P24-T0)
  - design/roadmap.yaml lists P24 (P24-T0)
  - "design/decisions/context-budget-rfc.md exists with `Status: accepted` lock
    (P24-T0)"
  - "`code-pact task context --budget-bytes <N>` and `code-pact task prepare
    --budget-bytes <N>` accept the flag, enforce the elision priority, and emit
    CONTEXT_OVER_BUDGET when the budget is unachievable (P24-T1)"
  - "`task context --explain --json` with `--budget-bytes` emits `reason_code:
    budget_reserved_for_later` for every elided section (P24-T1)"
  - "byte-identical contract: without `--budget-bytes`, pack `content` is
    byte-identical to v1.12 — the existing
    `tests/integration/pack-byte-identical.test.ts` continues to pass without
    modification (P24-T1 verification)"
  - P21 unit test asserting `budget_reserved_for_later` is never emitted
    continues to pass for the no-budget case (P24-T1 verification)
  - "`CONTEXT_OVER_BUDGET` joins `KNOWN_CODES.public` in `docs/cli-contract.md`
    (P24-T2)"
  - "`docs/cli-contract.md` sections for `task context` and `task prepare`
    document the new flag, the elision priority, the `--explain --json`
    interaction, and the error envelope shape (P24-T2)"
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P24 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
