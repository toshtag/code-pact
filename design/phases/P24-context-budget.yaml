  - id: P24-T1
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: high
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Implement budget enforcement.

      Add a `--budget-bytes <N>` flag to `code-pact task
      context` and `code-pact task prepare`. The flag is
      additive and opt-in; the default no-flag path is
      byte-identical to v1.12 (locked by the existing
      pack-byte-identical integration test).

      Implementation outline:
      1. Extend `BuildContextPackOptions` with optional
         `budgetBytes?: number`.
      2. Add an `ELISION_ORDER` constant next to
         `renderSections` in
         `src/core/pack/formatters/markdown.ts` so the
         renderer's section catalogue and the elision
         policy stay one file apart. Locked order:
         completed_tasks → related_decisions(when
         context_size:large) → constitution → rules(when
         write_surface:high) → reads.
      3. In `buildContextPack()`, after rendering sections,
         if `budgetBytes` is set: compute the current
         total, then in elision-order drop sections one at
         a time, recomputing the total after each drop,
         until the budget is met. Track elided sections
         for the explain output.
      4. If maximal elision cannot meet the budget, throw
         a `ContextOverBudgetError` carrying
         `budget_bytes`, `minimum_achievable_bytes`, and
         `unelidable_sections`.
      5. Wire the new error to a `CONTEXT_OVER_BUDGET`
         code in the CLI envelope (exit 2). Add to
         `KNOWN_CODES.public`.
      6. In `--explain --json` mode, elided sections
         appear in `excluded[]` with `reason_code:
         budget_reserved_for_later` and a `details` block
         carrying `elided_for_budget_bytes` and
         `section_bytes`.
      7. `task prepare` wires the same flag through to its
         `buildContextPack` call. The progress-read-only
         invariant is preserved on the new
         CONTEXT_OVER_BUDGET failure path (no
         progress.yaml mutation).

      Tests (unit + integration):
      - Unit: elision order — pick a synthetic pack with
        all elidable sections, set budget tight, assert
        sections drop in the documented priority order.
      - Unit: byte invariant under elision — for any
        budget that triggers k drops, the resulting
        total_bytes equals sum of remaining section bytes
        plus inter-section newlines, and matches
        `Buffer.byteLength(content, "utf8")`.
      - Unit: minimum-achievable computation —
        ContextOverBudgetError's `minimum_achievable_bytes`
        equals the total after maximal elision.
      - Integration: `task context --budget-bytes` writes
        a smaller pack and `--explain --json` emits
        `budget_reserved_for_later`.
      - Integration: `task prepare --budget-bytes` records
        the post-elision `context_pack_bytes` and does NOT
        mutate progress.yaml on either the success path or
        the CONTEXT_OVER_BUDGET path.
      - Regression: the existing
        `tests/integration/pack-byte-identical.test.ts`
        continues to pass (no-flag path byte-identical to
        v1.12).
      - Regression: the existing P21 unit test asserting
        `budget_reserved_for_later` is never emitted
        continues to pass for the no-budget case (the new
        emission path is gated behind --budget-bytes).
    depends_on:
