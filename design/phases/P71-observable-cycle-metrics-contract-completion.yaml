id: P71
name: Observable Cycle Metrics Contract Completion
weight: 3
confidence: high
risk: low
status: planned
objective: >
  Replace unobservable total-agent-input claims with exact Code Pact CLI output
  measurements, complete cycle lifecycle and bounded retention semantics, and
  make future runtime scopes executable before P63-T2 begins.
non_goals:
  - Implement exact-match runtime recall.
  - Implement aggregation runtime behavior.
  - Implement retrieval CLI behavior.
  - Implement cycle metrics runtime behavior.
  - Change production source, test code, package metadata, CHANGELOG, adapters,
    CI, context packs, Evidence, Failure Capsule, or repairPolicy.
  - Archive phases or rewrite completed P70 events.
definition_of_done:
  - Code Pact does not call unobservable values total Agent input.
  - Observable stdout measurement is separated from token usage and external
    Agent context.
  - Summable emission event categories are mutually exclusive.
  - Cycle start, failure, unknown-ref, dry-run, early-return, and store-failure
    contracts are defined.
  - Active cycles remain within hard event and byte limits while preserving
    cumulative totals.
  - P65 does not expose a no-op tracking flag before P66 metrics runtime exists.
  - P66 implementation scope includes the actual CLI stdout serialization layer
    and public flag surfaces.
  - P66 report identity is unambiguous for multiple cycles per task.
  - P68 cold and warm benchmark definitions are portable and do not claim OS
    page-cache control.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P71-T1
    type: architecture
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: Define observable output and non-overlapping emission semantics.
    depends_on:
