id: P60
name: Local Loop Memory Boundary Completion
weight: 3
confidence: high
risk: medium
status: planned
objective: >
  Close remaining local loop-memory boundary gaps around canonical timestamps,
  bounded descriptor reads, protected retention caps, path privacy, and public
  side-effect documentation.
non_goals:
  - Add exact-match recall, memory retrieval, semantic search, embeddings,
    SQLite, JSONL, or remote sync.
  - Read loop memory from task prepare, task context, recommend, or standalone
    verify.
  - Inject memory into context packs, Evidence artifacts, Failure Capsules,
    adapters, or project rules.
  - Change retention limit values, storage root, episode schema version, repair
    policy, progress event schema, CI workflow, release version, tags, or
    archive state.
definition_of_done:
  - Invalid UTC timestamps are rejected without failing whole-cache scans.
  - Every episode read path is bounded at the file-descriptor boundary.
  - Protected episodes cannot make per-task or per-fingerprint retention exceed
    hard caps.
  - Shell syntax containing absolute paths is treated as unsafe and omitted from
    episode commands.
  - "`task complete` public side-effect documentation matches the
    implementation."
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
