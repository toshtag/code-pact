    type: bugfix
    ambiguity: medium
    risk: medium
    context_size: large
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: Enforce canonical timestamps and bounded file-descriptor reads for
      every loop-memory episode read path.
