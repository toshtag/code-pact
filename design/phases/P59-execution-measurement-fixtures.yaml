id: P59
name: Execution Measurement Fixtures
weight: 5
confidence: high
risk: low
status: planned
objective: >
  Add small fixed fixtures for execution and context-size measurements so each
  feature can prove byte and count changes without a broad measurement harness.
non_goals:
  - Reintroduce a generic dogfood measurement harness.
  - Use tokenizers, provider APIs, model scoring, or subjective quality reports.
  - Treat measurement output as a release gate before the fixtures prove useful.
definition_of_done:
  - Fixed fixtures cover natural context bytes, final bytes, deferred bytes, stable-core bytes, and task-delta bytes.
  - Fixed fixtures cover failure capsule bytes, repair count, same-fingerprint stops, escalation count, and full-evidence retrieval.
  - Measurements use UTF-8 bytes and execution counts as stable local proxies.
  - Maintainer docs explain which numbers are diagnostic and which are contractual.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
tasks:
  - id: P59-T1
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P52-T2
      - P55-T2
      - P56-T2
    description: Define the local measurement vocabulary and fixture ownership rules.
    reads:
      - docs/maintainers/evidence/agent-detail-evidence.json
      - docs/maintainers/operations.md
      - scripts/measure-agent-detail.ts
    writes:
      - docs/maintainers/operations.md
      - docs/maintainers/evidence/agent-detail-evidence.json
    acceptance_refs:
      - docs/maintainers/operations.md
      - docs/maintainers/evidence/agent-detail-evidence.json
  - id: P59-T2
    type: test
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P59-T1
    description: Add small deterministic fixtures for context byte metrics.
    reads:
      - tests/fixtures/**
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
    writes:
      - tests/fixtures/execution-measurement/**
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
    acceptance_refs:
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain-metrics.test.ts
  - id: P59-T3
    type: test
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P59-T1
    description: Add small deterministic fixtures for repair and evidence retrieval counts.
    reads:
      - src/core/evidence/failure-capsule.ts
      - src/core/evidence/evidence-store.ts
      - tests/unit/core/evidence.test.ts
    writes:
      - tests/fixtures/execution-measurement/**
      - tests/unit/core/evidence.test.ts
      - tests/unit/recommend/escalation.test.ts
    acceptance_refs:
      - tests/unit/core/evidence.test.ts
      - tests/unit/recommend/escalation.test.ts
  - id: P59-T4
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P59-T2
      - P59-T3
    description: Document the measurement scope and why broad subjective harnesses remain out of scope.
    reads:
      - docs/maintainers/operations.md
      - CHANGELOG.md
    writes:
      - docs/maintainers/operations.md
      - CHANGELOG.md
    acceptance_refs:
      - docs/maintainers/operations.md
      - CHANGELOG.md
