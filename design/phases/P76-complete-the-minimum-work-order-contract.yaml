id: P76
name: Complete the Minimum Work-Order Contract
weight: 4
confidence: medium
risk: medium
status: done
objective: Align runtime, CLI help, generated agent guidance, adapter
  conformance, public docs, and tests for the minimal task prepare contract so
  no consumer references non-existent full-detail fields by default.
definition_of_done:
  - All contract producers and consumers use the same minimal schema; explicit
    budget always implies full detail; manual block is distinguished from
    dependency block; bounded failure/block summaries; dead minimal pack code
    removed; all verification green.
verification:
  commands:
    - pnpm typecheck && pnpm build && pnpm test:unit && pnpm
      test:integration:smoke && pnpm vitest --config
      vitest.integration.config.ts run && pnpm check:docs && node dist/cli.js
      validate --json && node dist/cli.js plan lint --include-quality --strict
      --json && git diff --check
