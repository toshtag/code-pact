id: P68
name: Loop Memory Storage Backend Review
weight: 3
confidence: low
risk: medium
status: planned
objective: >
  Decide, from measured local limits, whether loop memory should keep one-record
  JSON files, add an index sidecar or aggregate file, or move to SQLite in a
  later implementation phase.
non_goals:
  - Implement a backend migration in P68.
  - Add a dependency, package-size increase, or schema migration before the ADR
    is accepted.
  - Change storage roots, Git ignore policy, contributor sharing, or remote sync.
  - Use backend choice to change verification, progress, Evidence, Failure
    Capsule, context, or repairPolicy behavior.
definition_of_done:
  - "The ADR evaluates bounded-store pressure: status/prune/exact-lookup p95
    over 50 ms near hard caps, retention churn over 25% across at least 100
    writes, aggregate store crossing 80% of its byte cap three times in a row,
    writer conflict rate over 1% across at least 100 writes, or accepted need
    for at least two independent index queries or atomic multi-record updates."
  - Migration, locking, corruption recovery, platform behavior, transactions,
    vacuum behavior, filesystem authority, cache deletion/rebuild, dependency
    cost, package size, and contributor burden are covered.
  - Benchmark method fixes 20 warm-up runs, 200 measured runs,
    `process.hrtime.bigint()`, median/p95/max reporting, cold and warm cache
    cases, single-writer and two-writer contention cases, isolated temporary
    directories, and a fixed near-hard-cap fixture digest.
  - Cold means the first measured invocation in a fresh Node process with a
    fresh temporary project/store; warm means 20 warm-up runs followed by 200
    measured runs in the same process and same store.
  - The benchmark does not require OS page-cache clearing and must not claim a
    fully cold filesystem cache unless the harness explicitly proves it.
  - The ADR records Node version, OS, architecture, filesystem type when
    available, CPU model, record count, total bytes, fixture digest, command,
    and p95 calculation method.
  - If measured gates are not met, the outcome is rejected or deferred.
  - Any accepted backend change is scheduled as a later phase.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
requires_decision: true
tasks:
  - id: P68-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: Measure backend limits and record an ADR.
    depends_on:
      - P66-T2
      - P67-T3
    reads:
      - design/decisions/P63-T1-token-reduction-memory-roadmap-rfc.md
      - design/decisions/*.md
