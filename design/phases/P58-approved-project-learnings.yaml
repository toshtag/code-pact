id: P58
name: Approved Project Learnings
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Candidate repeated-failure learnings without mutating project instructions,
  rules, skills, hooks, or model-selection policy until a maintainer approves them.
non_goals:
  - Automatically rewrite agent instructions or design rules.
  - Promote repeated failure patterns directly into enforced policy.
  - Use subjective agent self-reporting as a learning signal.
definition_of_done:
  - Repeated failure families can be proposed with occurrence counts and successful patterns.
  - Proposed learnings have explicit review, approval, rejection, and application states.
  - Applying a learning is a separate maintainer action with a visible diff.
  - The system never mutates instructions, skills, constitution, rules, hooks, or model selection without approval.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P58-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    depends_on:
      - P56-T3
      - P57-T2
    description: Define the candidate learning lifecycle and protected mutation boundary.
    reads:
      - docs/cli-contract.md
      - docs/agent-contract.md
      - design/constitution.md
      - design/rules/protected-paths.md
    writes:
