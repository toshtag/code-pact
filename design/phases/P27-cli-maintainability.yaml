id: P27
name: CLI maintainability hardening — split task and adapter clusters out of
  src/cli.ts
weight: 15
confidence: high
risk: medium
status: done
objective: |
  Pure refactor: split the two most active subcommand
  clusters out of `src/cli.ts` (currently 4559 lines, 36
  cmd functions) into per-cluster files under a new
  `src/cli/commands/` directory.

  P27 ships two extractions:

    1. Task cluster (~1500 lines moved) — cmdTask +
       cmdTaskAdd/Context/Prepare/Complete/Finalize/
       Runbook/Start/Block/Resume/Status →
       `src/cli/commands/task.ts`.
    2. Adapter cluster (~500 lines moved) — cmdAdapter +
       cmdAdapterList/Install/Doctor/Conformance/Upgrade/
       BareForm → `src/cli/commands/adapter.ts`.

  After P27, src/cli.ts shrinks to ~2500 lines. The
  remaining clusters (init, plan, phase, doctor, validate,
  verify, pack, progress, spec, recommend) stay in
  src/cli.ts for v1.14; extracting them is mechanical
  follow-on work and not P27 scope.

  Pure refactor: every command's JSON envelope, exit code,
  error code, and flag surface is byte-identical to v1.13.
  The existing 1262 unit + 333 integration tests are the
  safety net. The refactor passes iff every existing test
  passes without modification.
non_goals:
  - new CLI commands, new flags, new error codes, or envelope adjustments
  - command base class / registry pattern / plugin system
  - extracting init / plan / phase / doctor / verify / pack / progress / spec /
    recommend clusters (deferred to a future RFC if their growth justifies it)
  - test refactoring — existing tests are the safety net; any test that needs
    modification means the refactor is doing more than it claims
  - reorganising shared helpers (strictParse, ConfigError, emitTaskCommonError)
    — they stay in their current locations
  - changes to src/commands/ (the pure-function command implementation layer;
    P27 extracts the CLI wrapper layer only)
  - package.json `exports` map changes (the CLI is still consumed via the `bin`
    entry)
definition_of_done:
  - design/phases/P27-cli-maintainability.yaml exists with this objective and
    tasks list (P27-T0)
  - design/roadmap.yaml lists P27 (P27-T0)
  - "design/decisions/cli-maintainability-rfc.md exists with `Status: accepted`
    lock (P27-T0)"
  - "`src/cli/commands/task.ts` exists with cmdTask + 10 cmdTask* functions;
    src/cli.ts uses a single import for the task cluster (P27-T1)"
  - "`src/cli/commands/adapter.ts` exists with cmdAdapter + 6 cmdAdapter*
    functions; src/cli.ts uses a single import for the adapter cluster (P27-T2)"
  - src/cli.ts shrinks from ~4559 lines to ~2500 lines (P27-T1 + T2 combined)
  - the existing 1262 unit + 333 integration tests pass without modification
    across both T1 and T2 (verified at the end of each task)
  - "`dist/cli.js` runtime behaviour byte-identical to v1.13 for representative
    commands: `task prepare`, `adapter conformance`, `task finalize
    --audit-strict` (P27-T1 + T2 verification)"
  - docs/cli-contract.md notes the new file layout under "Where new commands go"
    or equivalent (P27-T3)
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P27 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
tasks:
  - id: P27-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      RFC acceptance + phase registration.

      Lands design/decisions/cli-maintainability-rfc.md
      with `Status: proposed` in this PR; the status line
      flips to `accepted` in a small follow-up commit
      before merge per the P11–P21 / P26 / P24 lifecycle
      precedent.

      This task also bootstraps the P27 phase itself:
      - design/phases/P27-cli-maintainability.yaml (this file)
      - design/roadmap.yaml gains a P27 entry (weight 15)
      - CHANGELOG.md gains a P27-T0 entry under [Unreleased]

      The phase YAML and roadmap.yaml updates are bootstrap
      writes — they are protected paths under `plan lint
      --strict` and are NOT listed in this task's `writes:`
      block. Same precedent as P21-T0 / P26-T0 / P24-T0.

      The phase status stays `in_progress` until P27-T3
      lands; task statuses transition via the normal
      progress event stream.
    decision_refs:
      - design/decisions/cli-maintainability-rfc.md
    reads:
      - design/decisions/agent-contract-v2-rfc.md
      - design/decisions/context-budget-rfc.md
      - docs/cli-contract.md
    writes:
      - design/decisions/cli-maintainability-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P27-cli-maintainability.yaml
  - id: P27-T1
    type: refactor
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: high
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Extract the task cluster.

      Move cmdTask + cmdTaskAdd / cmdTaskContext /
      cmdTaskPrepare / cmdTaskComplete / cmdTaskFinalize /
      cmdTaskRunbook / cmdTaskStart / cmdTaskBlock /
      cmdTaskResume / cmdTaskStatus from `src/cli.ts` to
      `src/cli/commands/task.ts`. `src/cli.ts` keeps its
      top-level routing (the `task` branch of the main
      dispatcher) and replaces the inline cmd functions
      with a single import.

      Extraction contract:
      - Function signatures are preserved byte-for-byte.
      - Inline JSDoc / comments move with the function.
      - Imports from `../i18n/`, `../core/...`,
        `../commands/...`, `../strict-parse.ts`, etc. are
        updated to point at the new file's relative
        location.
      - cmdTask remains the cluster-entry dispatch;
        cmdTask* are private to task.ts (not re-exported
        from cli.ts).

      Safety nets:
      - `pnpm typecheck` clean.
      - `pnpm test:unit` and `pnpm test:integration` pass
        WITHOUT MODIFICATION. Any test that needs change
        means the refactor is doing more than extraction.
      - Manual: `task prepare <id> --json --budget-bytes
        <N>` produces the same envelope before and after
        the move (`task prepare` accepts `--budget-bytes`
        but not `--explain`; `--explain` is a `task context`
        flag).
      - Manual: `task finalize <id> --audit-strict --write
        --json --base-ref origin/main` produces the same
        envelope.
    depends_on:
      - P27-T0
    decision_refs:
      - design/decisions/cli-maintainability-rfc.md
    reads:
      - src/cli.ts
      - src/i18n/index.ts
      - src/commands/task-context.ts
      - src/commands/task-prepare.ts
      - src/commands/task-complete.ts
      - src/commands/task-finalize.ts
      - src/commands/task-runbook.ts
      - src/commands/task-progress.ts
      - design/decisions/cli-maintainability-rfc.md
    writes:
      - src/cli.ts
      - src/cli/commands/task.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P27-cli-maintainability.yaml
  - id: P27-T2
    type: refactor
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: short
    status: done
    description: |
      Extract the adapter cluster.

      Move cmdAdapter + cmdAdapterList / cmdAdapterInstall
      / cmdAdapterDoctor / cmdAdapterConformance /
      cmdAdapterUpgrade / cmdAdapterBareForm from
      `src/cli.ts` to `src/cli/commands/adapter.ts`. Same
      extraction contract as T1.

      Safety nets:
      - `pnpm typecheck` clean.
      - All existing tests pass WITHOUT MODIFICATION.
      - Manual: `adapter conformance claude-code --json`
        produces the same envelope before and after.
      - Manual: `adapter doctor --json` (the global form)
        produces the same envelope.
    depends_on:
      - P27-T1
    decision_refs:
      - design/decisions/cli-maintainability-rfc.md
    reads:
      - src/cli.ts
      - src/commands/adapter.ts
      - src/commands/adapter-doctor.ts
      - src/commands/adapter-install.ts
      - src/commands/adapter-conformance.ts
      - design/decisions/cli-maintainability-rfc.md
    writes:
      - src/cli.ts
      - src/cli/commands/adapter.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P27-cli-maintainability.yaml
  - id: P27-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      Document the new file layout.

      `docs/cli-contract.md` (or equivalent) gains a
      "Where new commands go" / "Source layout" note
      pointing at `src/cli/commands/` for the task and
      adapter clusters, and explicitly noting which
      clusters remain in `src/cli.ts` (init / plan / phase
      / doctor / validate / verify / pack / progress /
      spec / recommend).

      Also flips the P27 phase YAML status to `done` via
      `code-pact phase reconcile P27 --write` in a second
      commit on this branch (mirrors P21-T6 / P26-T3 /
      P24-T2 closes).
    depends_on:
