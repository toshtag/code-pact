id: P20
name: Evidence Harness
weight: 20
confidence: medium
risk: low
status: in_progress
objective: |
  Add an internal-only measurement harness at
  `scripts/harness/` that captures deterministic-input
  metrics from the dogfood corpus and emits CSV under
  `design/measurements/` for citation in future
  `design/decisions/*.md`. NOT a product feature — never
  registered in `package.json` bin, never invoked by
  users, never surfaces in JSON envelopes or CLI help.

  Initial metric set (4 CSVs):
  - `pack-size-by-task.csv` — per-task context pack size
  - `verify-success-rate.csv` — per-task first-pass vs retry
  - `task-event-density.csv` — progress event histogram per task
  - `lint-issue-histogram.csv` — `plan lint` diagnostic count by phase

  Output is byte-deterministic given the same input git SHA;
  a `measurements.manifest.json` sibling records the SHA + harness
  version + cli version for traceability.

  The harness operates against the dogfood corpus in v1.10;
  external sample repos are deferred to a future phase.
non_goals:
  - shipping the harness as a public `code-pact harness` command
  - streaming metrics to OpenTelemetry / Prometheus / etc.
  - LLM-side metrics (token cost, latency) — requires network + model API
  - metric trends over time (line-graph CSVs that diff against prior runs)
  - an RFC-citation tool that auto-embeds CSV rows into decision documents
  - making `design/measurements/` gitignored (the whole point is to commit the
    CSVs so future RFCs can cite specific row values)
definition_of_done:
  - design/phases/P20-evidence-harness.yaml exists with this objective and tasks
    list
  - design/roadmap.yaml lists P20
  - "design/decisions/evidence-harness-rfc.md exists with `Status: accepted`
    lock (P20-T1)"
  - "`scripts/harness/run.ts` ships and is invokable via `pnpm harness --corpus
    . --write` (P20-T2)"
  - the four CSVs and the manifest land under `design/measurements/` for the
    dogfood corpus (P20-T3)
  - byte-determinism test asserts that two runs against the same git SHA produce
    identical CSVs (P20-T2 includes this test)
  - "`docs/concepts/evidence-harness.md` documents the metric set, the CSV
    column shapes, and how to cite rows in future RFCs (P20-T4)"
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P20 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
tasks:
  - id: P20-T1
    type: architecture
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      RFC acceptance. Land design/decisions/evidence-harness-rfc.md
      with `Status: proposed` in this PR; the status line flips to
      `accepted` in a follow-up commit before merge per the
      P11–P19 lifecycle precedent. No src/ change in this task —
      the purpose is to lock the design decisions before any
      harness code is written:

      - Internal-only stance (NOT a product feature; never in bin)
      - Initial 4-CSV metric set (locked)
      - CSV column shapes per file (locked)
      - Manifest JSON shape (harness_version, input_git_sha, etc.)
      - `pnpm harness` invocation surface; default --check, --write opt-in
      - `design/measurements/` directory (NOT gitignored — CSVs are
        intentionally committable for RFC citation)
      - Byte-determinism contract (no `now()` clock timestamps in CSV cells;
        `generated_at` in manifest is a date only)
      - Backward compatibility (no public surface change; no schema change;
        no KNOWN_CODES change)

      Register P20 in design/roadmap.yaml (weight 20). The phase
      status line stays `in_progress` until P20-T4 lands.
    decision_refs:
      - design/decisions/evidence-harness-rfc.md
    reads:
      - src/commands/pack.ts
      - src/core/plan/lint.ts
      - src/core/progress/io.ts
      - docs/cli-contract.md
    writes:
      - design/decisions/evidence-harness-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/decisions/evidence-harness-rfc.md
  - id: P20-T2
    type: feature
    ambiguity: medium
    risk: low
    context_size: large
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      `scripts/harness/run.ts` implementation. The harness is an
      isolated maintainer tool — runs via `pnpm harness --corpus .
      [--write] [--json]` and writes CSVs to `design/measurements/`
      on `--write` (or prints them to stdout on default --check).

      Implementation outline:
      1. Argv parser using `node:util parseArgs` (no dependency on
         existing strictParse — the harness is standalone).
      2. Load corpus: invoke loadPlanState() to get phases + events.
      3. Compute the four metric sets:
         a. pack-size-by-task: for each task, invoke runPack() and
            measure the result envelope.
         b. verify-success-rate: walk progress events per task and
            count the failed → done sequences.
         c. task-event-density: histogram the events by status,
            compute event_span_days from first/last event timestamps.
         d. lint-issue-histogram: invoke runPlanLint with
            include-quality and bucket the issues by (phase_id, code).
      4. Serialize each CSV with a fixed column order (per RFC).
      5. Sort rows deterministically (phase_id ASC, then task_id /
         code ASC) so two runs against the same SHA produce
         byte-identical output.
      6. Write the manifest JSON; date-only generated_at.

      Tests:
      - Unit tests for each metric-computation helper (mock progress
        events covering first-pass, retry, blocked-then-resumed cases)
      - Integration test: run the harness against tests/fixtures/
        sample-corpus and assert byte-deterministic CSV output across
        two consecutive runs
      - Integration test: --check mode prints all four CSVs to stdout
        WITHOUT writing any file under design/measurements/

      `pnpm harness` script is added to `package.json` `scripts`
      (NOT to `bin`).
    depends_on:
      - P20-T1
    decision_refs:
      - design/decisions/evidence-harness-rfc.md
    reads:
      - design/decisions/evidence-harness-rfc.md
      - src/commands/pack.ts
      - src/core/plan/lint.ts
      - src/core/progress/io.ts
      - src/core/plan/state.ts
    writes:
      - scripts/harness/run.ts
      - scripts/harness/index.ts
      - package.json
      - tests/unit/scripts/harness/metrics.test.ts
      - tests/integration/harness.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P20-evidence-harness.yaml
  - id: P20-T3
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Run the harness against the dogfood corpus and commit the
      baseline CSVs + manifest under `design/measurements/`.
      This task is the first real-world exercise of the harness;
      its output becomes the seed for any future RFC that cites
      "the v1.10 baseline".

      Steps:
      1. `pnpm harness --corpus . --write`
      2. Review the produced CSVs for sanity (no obvious bugs in
         the metric computation that PR review would catch)
      3. Commit `design/measurements/pack-size-by-task.csv`,
         `design/measurements/verify-success-rate.csv`,
         `design/measurements/task-event-density.csv`,
         `design/measurements/lint-issue-histogram.csv`, and
         `design/measurements/measurements.manifest.json`
      4. Update `docs/concepts/evidence-harness.md` (created in
         P20-T4) with a short "Baseline measurements" section
         pointing at the committed CSVs

      No production code changes — this task is corpus-only.
    depends_on:
      - P20-T2
    decision_refs:
      - design/decisions/evidence-harness-rfc.md
    reads:
      - design/decisions/evidence-harness-rfc.md
    writes:
      - design/measurements/pack-size-by-task.csv
      - design/measurements/verify-success-rate.csv
      - design/measurements/task-event-density.csv
      - design/measurements/lint-issue-histogram.csv
      - design/measurements/measurements.manifest.json
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P20-evidence-harness.yaml
  - id: P20-T4
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      `docs/concepts/evidence-harness.md` documents the metric set,
      the CSV column shapes, and how to cite rows in future
      `design/decisions/*.md`. Also updates docs/cli-contract.md
      with a single note clarifying that `scripts/harness/` is NOT
      a product surface (lives alongside the existing "Stability
      taxonomy" section to forestall misreadings).

      Also flips the P20 phase YAML status to `done` since this
      task closes the phase.
    depends_on:
      - P20-T1
      - P20-T2
      - P20-T3
    decision_refs:
      - design/decisions/evidence-harness-rfc.md
    reads:
      - docs/cli-contract.md
      - docs/dogfood.md
    writes:
      - docs/concepts/evidence-harness.md
      - docs/cli-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P20-evidence-harness.yaml
