    status: planned
    description: |
      Expose `write_audit` via `phase reconcile --json` for
      multi-task batch review. Requires solving the "diff
      attribution" problem (a single working-tree diff cannot
      be sharded across tasks deterministically). Initial
      semantics likely: per-task audit using each task's
      declared writes, plus an aggregate `outside_any_declared`
      array highlighting files not covered by any task in the
      phase. Schema and exact field shape to be finalized when
      P15-T1–T4 results are in hand.
