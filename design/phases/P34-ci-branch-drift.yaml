id: P34
name: CI branch-drift detection — catch "real code changed but the control plane
  was not driven on this branch" in PR CI
weight: 8
confidence: high
risk: medium
status: planned
objective: >
  For code-pact to act as a control plane (not just a local ledger), CI needs to

  catch a PR that changed real code but never drove the loop. The existing

  CONTROL_PLANE_NOT_DRIVEN (v1.25) is working-tree based and never fires in PR
  CI

  (clean checkout). This adds a `--base-ref` flag to `doctor` / `validate` and a

  new advisory `CONTROL_PLANE_BRANCH_NOT_DRIVEN` that compares the branch diff

  (merge-base..HEAD, via the existing auditWrites merge-base mode) and fires
  when

  real, non-excluded files changed but no KNOWN non-TUTORIAL task got a

  started/done event on the branch.


  Conservative by construction: warning severity (gate only via

  `validate --strict --base-ref`), team-declared exclude_globs (default empty,

  no hardcoded docs/config exemption), silent skip when progress.yaml is not

  git-tracked, and it fires on a known-task driving event — not merely on

  progress.yaml being touched (closing the bypass). No `ci scaffold` command;

  docs ship a version-pinned GitHub Actions example.


  Design recorded in design/decisions/ci-branch-drift-rfc.md.


  Scope discipline (3 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — `--base-ref` plumbing (doctor + validate) + checkControlPlaneBranchNotDriven
      + doctor.yaml exclude_globs + new error code + tests.
    - T2 — docs (diagnostics table, --base-ref, version-pinned CI example,
      committed-progress precondition) + CHANGELOG.
non_goals:
  - a `code-pact ci scaffold` command (docs ship a GitHub Actions example
    instead)
  - changing the working-tree CONTROL_PLANE_NOT_DRIVEN behavior
  - hardcoded docs/config path classification (team-declared exclude_globs only)
  - task.writes-vs-changed-files matching (keeps P34 light)
  - making the check a hard error by default (advisory; gate via --strict)
definition_of_done:
  - doctor / validate accept `--base-ref <ref>`; CONTROL_PLANE_BRANCH_NOT_DRIVEN
    (severity warning) flows through both and only runs when --base-ref is given
  - the check fires only when ALL hold — a non-TUTORIAL task exists; git +
    merge-base resolve; progress.yaml is git-tracked; the branch diff touches a
    real file not matched by exclude_globs (runtime state already excluded); and
    NO event added on the branch is (started|done) AND non-TUTORIAL AND a
    task_id present in the loaded plan
  - phase-only / unrelated / unknown task_id / empty / TUTORIAL-only progress
    additions do NOT suppress it; a known non-TUTORIAL started OR done does
  - progress.yaml untracked → silent skip; merge-base unresolved → silent skip;
    HEAD progress.yaml unparseable → skip (INVALID_YAML/SCHEMA_ERROR owns it)
  - the doctor.yaml control_plane_branch_not_driven.exclude_globs key is
    honored, default empty (no built-in docs/config exemption); disabled_checks
    suppresses the code
  - validate --strict --base-ref origin/main exits 1 on drift; plain validate /
    doctor exit unchanged
  - CONTROL_PLANE_BRANCH_NOT_DRIVEN registered in the error-code-surface test
    and the cli-contract diagnostics table; docs include a version-pinned GitHub
    Actions example and the committed-progress.yaml precondition
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
tasks:
  - id: P34-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: >
      RFC + phase registration (bootstrap).


      Lands design/decisions/ci-branch-drift-rfc.md (status: accepted) and

      bootstraps the phase (phase YAML + roadmap entry, weight 8) as

      protected-path bootstrap writes NOT listed in `writes:`, per the P28-P33

      precedent (writes carries the RFC + CHANGELOG only; the phase YAML is in

      acceptance_refs and design/roadmap.yaml is excluded as a plan-lint
      --strict

      protected path). The RFC records the gate model (advisory + --strict),

      default-empty team exclude_globs, the committed-progress.yaml
      precondition,

      no-ci-scaffold, version-pin, and the "known non-TUTORIAL started or done

      suppresses (usage detection, not completion guarantee)" rule.
    decision_refs:
      - design/decisions/ci-branch-drift-rfc.md
    reads:
      - src/commands/doctor.ts
      - src/commands/validate.ts
      - src/core/audit/write-audit.ts
    writes:
      - design/decisions/ci-branch-drift-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P34-ci-branch-drift.yaml
  - id: P34-T1
    type: feature
    ambiguity: low
    risk: medium
    context_size: large
    write_surface: high
    verification_strength: strong
    expected_duration: long
    status: planned
    description: >
      --base-ref plumbing + branch-drift check + exclude_globs + tests.


      - cli.ts cmdDoctor / cmdValidate: add `--base-ref <ref>` (string).

      - runDoctor(cwd) -> runDoctor(cwd, opts?: { baseRef?: string }); thread to
        the new check. runValidate passes --base-ref through; its existing strict
        semantics gate the warning (no severity change).
      - checkControlPlaneBranchNotDriven in doctor.ts (only when baseRef set):
        realTasks>0; auditWrites({baseRef}) for the branch diff (merge-base
        resolved, non-runtime files minus exclude_globs non-empty); progress.yaml
        git-tracked; and NO branch-added event that is (started|done) AND
        non-TUTORIAL AND a task_id in the loaded plan. Compare git show
        <merge-base>:progress.yaml vs HEAD:progress.yaml; unparseable HEAD → skip.
        Reuse runGit (export if needed) and the auditWrites glob util.
      - .code-pact/doctor.yaml schema/loader: optional
        control_plane_branch_not_driven.exclude_globs (default empty).
      - Register CONTROL_PLANE_BRANCH_NOT_DRIVEN in error-code-surface
      KNOWN_CODES
        (category doctor).
      - git-fixture tests: fires (no known-task event), skips (known started or
        done added), bypass tests (phase-only / unrelated / unknown / TUTORIAL-only
        / empty → fire), exclude_globs-only diff → skip, untracked progress →
        skip, merge-base unresolved → skip, no --base-ref → no-op.

      PR stays single; commits split logically (① --base-ref plumbing →

      ② doctor.yaml exclude_globs schema/loader → ③ branch-drift core logic →

      ④ git fixture tests + error-code-surface).
    decision_refs:
      - design/decisions/ci-branch-drift-rfc.md
    reads:
      - src/commands/doctor.ts
      - src/commands/validate.ts
      - src/cli.ts
      - src/core/audit/write-audit.ts
      - tests/unit/commands/doctor.test.ts
    writes:
      - src/commands/doctor.ts
      - src/commands/validate.ts
      - src/cli.ts
      - src/core/audit/index.ts
      - src/core/audit/write-audit.ts
      - tests/unit/commands/doctor.test.ts
      - tests/unit/error-code-surface.test.ts
  - id: P34-T2
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: >
      Docs + CHANGELOG.


      - docs/cli-contract.md: add CONTROL_PLANE_BRANCH_NOT_DRIVEN to the doctor
        diagnostics table; document `--base-ref` on doctor/validate; add a
        version-pinned GitHub Actions example (`npx -y code-pact@<pinned>
        validate --strict --base-ref origin/main`) and the committed-progress.yaml
        precondition + the team-declared exclude_globs knob.
      - CHANGELOG [Unreleased] P34 feature entry.
    decision_refs:
      - design/decisions/ci-branch-drift-rfc.md
    reads:
      - docs/cli-contract.md
    writes:
      - docs/cli-contract.md
      - CHANGELOG.md
