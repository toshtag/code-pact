id: P8
name: Stable Control Plane
weight: 15
confidence: high
risk: low
status: planned
objective: |
  Promote code-pact from alpha (0.6-0.9) to v1.0.0 by stabilizing the
  control plane rather than adding new features. Freeze the public CLI
  contract, fill remaining integration-coverage gaps, add an end-to-end
  workflow smoke test that exercises features-between-features, verify
  migration safety from every prior minor, expand state-file safety
  documentation, and ship docs/migration.md so users on any prior alpha
  can upgrade cleanly. No orchestration, no MCP, no remote registry, no
  metrics/eval/cost measurement.
non_goals:
  - multi-agent orchestration / coordinator
  - GitHub / Linear / Jira issue tracker sync
  - MCP server / remote registry / SaaS backend
  - dashboard / web UI / daemon
  - LLM-based validation / eval harness / token & cost measurement
  - automatic task splitting / workflow engine / fan-out
  - adapter marketplace / plugin runtime / external adapter loading
  - bare-form `code-pact adapter` removal (deferred to v1.1)
  - v0.9 adapter platform redesign
  - v0.8 recommend redesign
  - state storage redesign (progress.yaml schema is frozen)
  - path-safety helper expansion outside the adapter layer
  - automatic CI publishing (manual `npm publish` is retained)
definition_of_done:
  - design/phases/P8-stable-control-plane.yaml exists and design/roadmap.yaml lists P8
  - subprocess integration tests cover validate / plan brief / plan prompt / plan constitution / task add --non-interactive
  - tests/helpers/cli.ts shared test helper exists and is used by new tests
  - tests/integration/e2e-workflow.test.ts exercises init -> adapter install -> recommend -> task context -> task start -> task complete -> doctor -> validate against a single temp project
  - e2e fixture uses deterministic verification commands (no host-project package script dependency)
  - tests/integration/migration.test.ts covers v0.6 / v0.8 / v0.9 fixture upgrade paths
  - docs/cli-contract.md introduces Stable (v1.0) / Stable (human-output) / Experimental / Deprecated stability annotation taxonomy
  - docs/cli-contract.md ships a public/diagnostic/internal error code table that matches src/ (asserted by tests/unit/error-code-surface.test.ts)
  - docs/cli-contract.md ships a State file write guarantees section that matches src/io/atomic-text.ts behaviour
  - tests/integration/json-stdout.test.ts asserts that every Stable (v1.0) command emits valid-JSON-only on stdout under --json
  - docs/migration.md exists and covers v0.6 / v0.7 / v0.8 / v0.9 -> v1.0 upgrade paths
  - docs/dogfood.md gains a Troubleshooting section covering MANIFEST_NOT_FOUND / INVALID_TASK_TRANSITION / PLAN_NORMALIZE_REQUIRED / VERIFICATION_FAILED / ADAPTER_GENERATOR_STALE
  - README.md quickstart and Status section reflect the v1.0 surface and the dist-tag decision
  - package.json bumps to 1.0.0
  - scripts/assert-package-metadata.mjs version regex accepts plain semver in addition to prerelease tags
  - "CHANGELOG entry separates `CLI behavior changes: none` and `Release channel changes` (dist-tag) explicitly"
  - git tag v1.0.0 + GitHub Release published from the release prep PR (not as a post-merge commit)
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js plan normalize --check --json
    - node dist/cli.js plan analyze --json
    - node dist/cli.js doctor --json
    - node dist/cli.js validate
    - node dist/cli.js adapter list --json
tasks:
  - id: P8-T1
    type: test
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Coverage backfill plus P8 design registration. Create
      design/phases/P8-stable-control-plane.yaml and append P8 to
      design/roadmap.yaml so subsequent tasks can be dogfooded via
      `task start P8-T<n>` / `task complete P8-T<n>`. Add subprocess
      integration tests for the commands that currently have only unit
      coverage: `validate` (cli.test.ts), `task add --non-interactive`
      (cli.test.ts), and `plan brief` / `plan prompt` / `plan constitution`
      under non-TTY in a new tests/integration/plan-cli.test.ts.
      Assertions branch by command type: `{ok:true,data}` for success
      JSON, `{ok:false,error}` for JSON error cases, human stdout/stderr
      for commands that do not expose --json. No behaviour change.
  - id: P8-T2
    type: test
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      End-to-end workflow smoke + shared test helpers. Extract a
      tests/helpers/cli.ts module exposing createTempProject / run /
      expectJsonOk / expectJsonErr so new tests can stop reimplementing
      mkdtemp + spawnSync + JSON parsing. Add
      tests/integration/e2e-workflow.test.ts that exercises the full
      agent-facing loop (init -> adapter install -> recommend ->
      task context -> task start -> task status -> task complete ->
      task status -> plan lint -> plan analyze -> adapter upgrade --check
      -> doctor -> validate) against a single temp project. Phase
      verification uses a deterministic command (`node --version`); the
      host project's package scripts must not be invoked. Do not assert
      wall-clock thresholds; the goal is seam regression coverage, not
      performance benchmarking. Add a second scenario for the
      pre-v0.9-style migration path (no manifest -> adapter install ->
      adapter upgrade --check expected clean).
  - id: P8-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Public contract freeze. Introduce a Stability taxonomy in
      docs/cli-contract.md (`Stable (v1.0)`, `Stable (human-output)`,
      `Experimental`, `Deprecated`) and annotate every command section.
      Stable (v1.0) requires JSON envelope tests + JSON-only stdout +
      documented exit codes; Stable (human-output) requires documented
      human stdout/stderr + --non-interactive CONFIG_ERROR behaviour
      tested. Do NOT add --json to commands that don't have it just to
      satisfy the taxonomy. Ship a public/diagnostic/internal error
      code table that matches src/ (cross-checked by
      tests/unit/error-code-surface.test.ts). Add
      tests/integration/json-stdout.test.ts asserting every
      Stable (v1.0) command emits valid-JSON-only stdout under --json.
  - id: P8-T4
    type: test
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Migration safety + state file documentation. Add fixtures under
      tests/fixtures/migration/ for v0.6-style (no progress events,
      no manifest), v0.8-style (progress events, no manifest), and
      v0.9-style (manifest with stale generator_version) projects.
      Add tests/integration/migration.test.ts asserting that on each
      fixture, doctor / validate / plan analyze / adapter doctor /
      adapter upgrade --check produce the expected, non-fatal output.
      Add a State file write guarantees section to
      docs/cli-contract.md documenting the temp-file + rename strategy
      and the explicit no-fsync / no-concurrent-write contract.
      Optionally convert src/commands/init.ts:133 to atomicWriteText
      for write-helper consistency (separate commit; if not done,
      CHANGELOG must not list it).
  - id: P8-T5
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Docs and troubleshooting. Add docs/migration.md covering
      v0.6 / v0.7 / v0.8 / v0.9 -> v1.0 upgrade paths and the
      bare-form `adapter` deprecation reminder. Update README quickstart
      and Status section to reflect the v1.0 surface and the
      dist-tag decision. Add a Troubleshooting section to
      docs/dogfood.md covering MANIFEST_NOT_FOUND /
      INVALID_TASK_TRANSITION / PLAN_NORMALIZE_REQUIRED /
      VERIFICATION_FAILED / ADAPTER_GENERATOR_STALE. The substantive
      docs/dogfood.md update lives here; P8-T6 only sanity-checks it.
  - id: P8-T6
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Release prep v1.0.0. Bump package.json to 1.0.0. Widen
      scripts/assert-package-metadata.mjs to accept plain semver
      alongside prerelease tags. Rebuild and regenerate the
      self-dogfood adapter manifest. Write the v1.0.0 CHANGELOG entry
      with explicit `### CLI behavior changes: none` and
      `### Release channel changes` sections. Flip the P8 phase and
      every P8 task to `status: done`. Run the full verification
      command list, tag v1.0.0, and publish the GitHub Release from
      this PR (not as a post-merge commit). Publish to npm with the
      decided dist-tag.
