id: P40
name: task prepare lifecycle-aware — make the existing prepare guidance reflect
  recommendation.lifecycleMode (additive record-done command + mode-aware
  next_action.message), without adding a third "what next" representation
weight: 4
confidence: high
risk: low
status: done
objective: |
  task prepare returns recommendation.lifecycleMode (full_loop / record_only /
  decision_loop) but its guidance surfaces ignore it: the commands dict is built
  with 5 fixed keys regardless of mode (no record-done key), and
  next_action.message is static per task-state and assumes full_loop ("then
  complete"). So an agent on a record_only task is told to complete when it should
  run task record-done, and a decision_loop task is not told to resolve its ADR
  first. P40 (backlog, next remaining) closes that gap.

  This is a contract-shape change with explicit bloat risk, authored as a
  decision_loop phase (P40-T0 is requires_decision, gated on its own RFC).

  Contract-shape decision (maintainer-approved, Option C): commands stays the
  stable mode-agnostic lookup table (all 5 keys unchanged) and gains ONE
  always-present record-done key (additive, in every mode — the same additive
  discipline decision_commitments followed in P43). The single mode-aware
  what-next surface is next_action.message. No recommended_flow, no ordered-key
  array, no new next_action.type value. Filtering commands by mode (breaking) and
  an ordered hint array (the rejected third representation) were both rejected.

  record-done is the one non-runnable template (--evidence is agent-supplied), so
  it is emitted with an angle-bracket token:
  code-pact task record-done <id> --agent <agent> --evidence "<verification you ran>".
  The key is exactly record-done (hyphen), accessed commands["record-done"].

  next_action.message gains a lifecycleMode parameter, branched for the two
  workable pre-completion states only (start_task, continue_implementation); the
  early-return states keep static messages (recommendation is null there). The
  messages restate lifecycle.ts / per-task-loop.md semantics, inventing nothing.

  decision_loop does NOT decide complete-vs-record-done for the agent. Verified in
  lifecycle.ts:34: decision_loop is returned whenever requires_decision is true
  (highest priority, independent of ADR acceptance), so a gated task stays
  decision_loop even after its gate resolves and the mode does not imply the
  post-gate completion path. The decision_loop message states only the gate fact
  and the generic implement/verify step. Advisory only; no new gate; P43's
  decision_commitments + verify/complete remain the enforcers.

  Docs-drift discipline (P39/P41/P43 lesson): T2 writes public docs, so the phase
  verification includes pnpm check:docs (the P43 PHASE_DOCS_WRITE_NO_DOC_CHECK
  guard requires it). T2 must not redefine per-task-loop lifecycle prose (link to
  it) and must grep the docs tree for stale full_loop-only prepare guidance.

  Design recorded in design/decisions/task-prepare-lifecycle-aware-rfc.md.

  Scope discipline (3 tasks):

    - T0 — RFC + phase registration (bootstrap; requires_decision, decision_loop).
    - T1 — record-done command key + mode-aware next_action.message + tests.
    - T2 — docs (cli-contract + agent-contract) + the stale-guidance grep.
non_goals:
  - A new recommended_flow structure, an ordered-key array, or a new
    next_action.type value — all would be the third what-next representation or a
    v1-breaking enum growth the backlog rejects.
  - Filtering the commands dict by mode (a breaking change to a v1-stable,
    additive-only envelope) — commands keeps all 5 keys in every mode plus the
    additive record-done.
  - Any new gate or behavioral change to task complete / task record-done /
    verify — lifecycleMode stays advisory; P40 only makes prepare's existing
    guidance reflect it.
  - Deciding complete-vs-record-done for a decision_loop task — the mode does not
    imply the post-gate completion path (lifecycle.ts:34).
  - A task context echo, a JA rewrite of reference contracts, or any new CLI
    parser/help abstraction.
definition_of_done:
  - task prepare commands includes an always-present record-done key (exactly that
    hyphenated name) in every lifecycle mode, emitted as the template
    code-pact task record-done <id> --agent <agent> --evidence "<verification you ran>"
    (the one non-runnable entry; --evidence is agent-supplied)
  - the existing 5 commands keys (context, start, verify, complete, finalize) are
    unchanged and present in every mode — commands stays a mode-agnostic lookup
    table, not filtered by mode
  - next_action.message is mode-aware for the two workable states start_task and
    continue_implementation — record_only points at task record-done --evidence
    (and says lighter loop not lighter verification), decision_loop says resolve
    the ADR first without deciding complete-vs-record-done, full_loop keeps the
    current wording; early-return states keep static messages
  - next_action.type enum is unchanged; no recommended_flow or ordered array added
  - the record-done template is pinned by tests (includes task record-done,
    --evidence, the placeholder, and produces no Unknown option) and mode-aware
    messages are pinned across full_loop / record_only / decision_loop
  - docs (cli-contract task prepare envelope + agent-contract) reflect the
    record-done key (exact name + not-runnable-verbatim note) and that
    next_action.message is the mode-aware surface; per-task-loop is linked, not
    redefined; no stale full_loop-only prepare guidance remains in the docs tree
  - no behavioral change to task complete / record-done / verify / finalize
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
