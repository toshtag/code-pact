      - src/core/task-registration-spec.ts
      - src/core/contract-lock.ts
      - src/core/review-bundle.ts
      - src/commands/task-add.ts
      - src/commands/task-lock.ts
      - src/cli/spec/task.ts
      - src/cli/commands/task.ts
