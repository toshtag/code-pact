id: P83
name: Lossless Task Registration
weight: 1
confidence: high
risk: medium
status: done
objective: Preserve an explicitly supplied machine-readable task contract from
  task registration through contract locking, preventing readiness-field loss
  caused by manual CLI-flag transcription.
non_goals:
  - Infer dependencies from prose.
  - Infer dependencies from task numbering.
  - Modify phase import.
  - Add bulk task registration.
  - Run model effectiveness trials.
  - Estimate numerical token reduction.
definition_of_done:
  - A strict task spec containing depends_on is stored losslessly in the phase.
  - The same spec is verified again before contract lock creation.
  - Removing depends_on between add and lock causes a side-effect-free failure.
  - A spec-locked task detects registration-field drift after lock.
  - The P80 dependency-omission replay is blocked before implementation.
  - Focused verification, local CI, and review-bundle complete without
    corrective code commits.
verification:
  commands:
    - pnpm typecheck
    - pnpm test:unit
    - pnpm build
    - pnpm test:integration
    - pnpm test:integration:smoke
    - pnpm check:docs
    - pnpm test:ci
tasks:
  - id: P83-T1
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: long
    status: done
    description: >
      Implement lossless task registration from a strict machine-readable spec
      file. Add --spec-file support to task add and task lock, compute and store
      a SHA-256 digest of the canonical registration, and fail side-effect-free
      when the spec does not round-trip or does not match the current phase
      task.
    requires_decision: false
    depends_on:
      - P82-T2
    decision_refs: []
    reads:
      - src/core/**/*.ts
      - src/commands/**/*.ts
      - src/cli/**/*.ts
      - tests/**/*.ts
      - docs/**/*.md
      - design/roadmap.yaml
      - design/phases/P83-lossless-task-registration.yaml
      - design/specs/P83-T1-task-spec.yaml
    writes:
