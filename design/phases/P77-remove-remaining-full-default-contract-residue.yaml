id: P77
name: Remove Remaining Full-Default Contract Residue
weight: 4
confidence: medium
risk: medium
status: done
objective: |
  Remove references to non-existent default full-detail fields from generated
  agent guidance, CLI help, public documentation, and contract tests. Ensure
  the default minimal `task prepare --json` contract and the explicit
  full-detail/budget path are described consistently everywhere, without
  changing the runtime implementation.
definition_of_done:
  - Generated agent guidance in en-US/ja-JP only instructs agents to read
    recommendation/repair/escalation fields from full-detail `task prepare` or
    from `code-pact recommend --json`, not from default minimal output.
  - Default minimal `task prepare --json` is described as returning `data.task`,
    `data.next`, and `data.more.command` only.
  - CLI spec for `task prepare` no longer says it bundles context/recommendation
    in default minimal mode; `--dry-run` is described as full-detail only.
  - Public docs no longer describe default `task prepare` as bundling task
    context, embedding recommendation, returning lifecycleMode, or writing the
    context pack in the default path.
  - Contract tests assert correct minimal-field presence and reject outdated
    full-default phrases.
  - Materialized-byte reduction thresholds are fixed and measured values are
    recorded in the task report.
  - Full verification suite is green.
verification:
  commands:
    - pnpm typecheck
    - pnpm build
    - pnpm test:unit
    - pnpm test:integration:smoke
    - pnpm vitest --config vitest.integration.config.ts run
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
    - git diff --check
