id: P21
name: Agent Contract v2 — task prepare, context explain, adapter conformance
weight: 25
confidence: high
risk: low
status: in_progress
objective: |
  Reduce agent operation errors and make context minimisation
  verifiable by adding three coordinated CLI surfaces:

  1. `code-pact task prepare <task-id>` — a single
     progress-read-only compound command that returns current
     state, recommendation, context pack metadata, a structured
     `next_action`, and a `commands` dictionary so agents have
     one deterministic entry point per task.
  2. `code-pact task context --explain` — adds a per-section
     `bytes` + `reason_code` breakdown to the JSON envelope so
     the reasons each section is included (or excluded) become
     auditable. Pack markdown `content` is byte-identical to
     v1.10 (locked).
  3. `code-pact adapter conformance <agent>` — a focused
     read-only check that the installed adapter satisfies the
     v2 agent contract (axis headings + lifecycle/diagnostic
     surface mentions + failure guidance + checksum).

  A `src/core/recommend/` pure-function extraction precedes the
  prepare work so `task prepare` can call the same recommendation
  logic as the existing `recommend` command without duplication.

  Stable adapter templates (`claude-code`, `codex`, `generic`)
  are refreshed so a freshly-installed adapter passes
  conformance by construction. Doctor's existing contract drift
  check and the new conformance command share a single required-
  surface spec module so the two callers can never disagree.

  Two new docs ship: `docs/positioning.md` (self-contained
  product positioning + success metrics) and
  `docs/agent-contract.md` (the v2 contract definition + the
  recommended lifecycle).

  No new error codes. No adapter schema bump. No budget
  enforcement (deferred to P24).
non_goals:
  - shipping `--budget-bytes` or any context truncation policy (deferred to P24)
  - bumping `adapter_schema_version` from 1 to 2 (deferred)
  - executing the next command on the agent's behalf (`task prepare` returns intent only — no `--execute` flag)
  - splitting `src/cli.ts` into per-command modules (deferred to P27)
  - multi-agent or multi-task orchestration (single task, single agent)
  - automatic remediation in `adapter conformance` (it is read-only; users re-run `adapter install` / `adapter upgrade` to repair)
  - emitting `budget_reserved_for_later` from `task context --explain` in P21 (the enum value is reserved for P24)
definition_of_done:
  - design/phases/P21-agent-contract-v2.yaml exists with this objective and tasks list (P21-T0)
  - design/roadmap.yaml lists P21 (P21-T0)
  - "design/decisions/agent-contract-v2-rfc.md exists with `Status: accepted` lock (P21-T0)"
  - docs/positioning.md exists and is referenced from README's Reference docs table (P21-T1)
  - "`src/core/recommend/` exposes a pure `resolveRecommendation()` and the existing `code-pact recommend` JSON envelope is byte-identical (P21-T2)"
  - "`code-pact task prepare <task-id>` ships, is progress-read-only, supports `--dry-run`, returns a structured `next_action` + `commands` envelope, and writes nothing to progress.yaml in any state (P21-T3)"
  - "`code-pact task context --explain` ships with per-section `bytes` + `reason_code` breakdown; the pack markdown `content` is byte-identical to v1.10 (P21-T4)"
  - "`code-pact adapter conformance <agent>` ships, shares the required-surface spec with `adapter doctor`, and exits 1 on non-compliance (P21-T5)"
  - stable adapter templates (`claude-code`, `codex`, `generic`) embed the v2 lifecycle/diagnostic surface and failure guidance so a fresh `adapter install` passes conformance (P21-T5)
  - docs/agent-contract.md exists and is referenced from README's Reference docs table (P21-T6)
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P21 task
