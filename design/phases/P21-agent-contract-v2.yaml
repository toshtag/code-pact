  - id: P21-T3
    type: feature
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: high
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Add `code-pact task prepare <task-id> [--agent <name>]
      [--json] [--dry-run]` as a Stable (v1.11+) compound
      command.

      The command is **progress-read-only**: it MUST NOT
      mutate `.code-pact/state/progress.yaml`. It MAY write
      the deterministic context pack at
      `.context/<agent>/<task-id>.md` unless `--dry-run` is
      passed.

      Behaviour:
      1. Resolve task to phase (`resolveTaskInRoadmap`).
      2. Validate agent (same pattern as `task context`).
      3. Derive current state from progress events
         (`deriveTaskState`).
      4. Early return when `current_state === "done"`:
         no context pack write, `next_action.type =
         "noop_already_done"`, `recommendation = null`,
         `context_pack_path = null`, `context_pack_bytes = 0`.
      5. Early return when `current_state === "blocked"`
         OR any `depends_on` is unmet: no context pack write,
         `next_action.type = "wait_for_dependencies"`,
         `blocked_by = [...]`, `recommendation = null`,
         `context_pack_path = null`, `context_pack_bytes = 0`.
      6. Call `resolveRecommendation()` from P21-T2.
      7. If `--dry-run`, build context pack but skip write
         (return `would_write_context_pack_path`). Otherwise
         build + write.
      8. Map remaining states to `next_action.type`:
         `planned → start_task`,
         `started`/`resumed → continue_implementation`,
         `failed → investigate_failure`.

      The `commands` dictionary in every envelope contains
      `context`, `start`, `verify`, `complete`, `finalize`
      with fully-formed command strings (no extra whitespace,
      shell-safe ordering).

      Reuses existing error codes only: `TASK_NOT_FOUND`,
      `AMBIGUOUS_TASK_ID`, `PHASE_NOT_FOUND`,
      `AGENT_NOT_FOUND`, `AGENT_NOT_ENABLED`. No new error
      codes ship.

      Tests:
      - progress-read-only invariant (diff progress.yaml
        before/after for all states)
      - --dry-run skips both context pack write
      - blocked state and unmet-dependency state both early-
        return with `wait_for_dependencies` (separate cases)
      - done state early-returns with `noop_already_done`
      - planned / started / resumed / failed mapping
      - JSON envelope shape locked (snapshot test)
    depends_on:
      - P21-T2
    decision_refs:
      - design/decisions/agent-contract-v2-rfc.md
    reads:
      - src/commands/task-context.ts
      - src/commands/task-start.ts
      - src/core/plan/resolve-task.ts
      - src/core/progress/task-state.ts
      - src/core/pack/index.ts
    writes:
      - src/commands/task-prepare.ts
      - src/cli.ts
      - src/i18n/index.ts
      - tests/unit/commands/task-prepare.test.ts
      - docs/cli/task-prepare.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P21-agent-contract-v2.yaml
  - id: P21-T4
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: high
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Add `code-pact task context --explain [--json]` as a
      Stable (v1.11+) flag.

      In `--json --explain` mode, the existing context pack
      envelope gains two arrays:
      - `sections[]` — each `{ name, bytes, reason_code,
        details? }` where `reason_code` is from a closed enum
        `ContextSectionReasonCode` (always_included,
        declared_by_task, referenced_decision, glob_match,
        write_surface_high, context_size_large,
        ambiguity_high, format_overhead).
      - `excluded[]` — each `{ name, reason_code, details? }`
        where `reason_code` is from a closed enum
        `ContextExcludedReasonCode`
        (context_size_small_and_ambiguity_low,
        not_declared_by_task, glob_no_match,
        budget_reserved_for_later).

      Acceptance invariant: `sum(sections[].bytes) ===
      total_bytes === context_pack_bytes`. Any byte not
      attributable to a content section is summed into a
      `format_overhead` section (headings, blank lines,
      separators, generation header). Byte counts use
      `Buffer.byteLength(content, "utf8")`.

      `budget_reserved_for_later` is reserved for P24.
      The P21 implementation MUST NOT emit it. A unit test
      asserts the absence in every P21 output.

      Without `--json`, `--explain` prints a human-readable
      table using existing CLI formatting helpers.

      The pack markdown `content` MUST be byte-identical to
      v1.10. Section metadata is built alongside the pack
      content and never injected into the rendered markdown.
      The existing
      `tests/integration/pack-byte-identical.test.ts` is
      asserted unchanged.

      Harness CSV columns may grow but the existing column
      order is preserved so `tests/integration/harness.test.ts`
      continues to pass.

      Reuses existing error codes only.
    depends_on:
      - P21-T0
    decision_refs:
      - design/decisions/agent-contract-v2-rfc.md
    reads:
      - src/core/pack/index.ts
      - scripts/harness/metrics.ts
      - tests/integration/pack-byte-identical.test.ts
    writes:
      - src/core/pack/index.ts
      - src/commands/task-context.ts
      - src/cli.ts
      - tests/unit/core/pack/explain.test.ts
      - tests/integration/task-context-explain.test.ts
      - docs/cli/task-context.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P21-agent-contract-v2.yaml
  - id: P21-T5
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Add `code-pact adapter conformance <agent> [--json]` as
      a Stable (v1.11+) command.

      Exit code 0 when compliant, 1 when not.

      Checks:
      1. `## Agent contract` section present
      2. Three axis sub-headings present:
         `### When to invoke code-pact`,
         `### What to verify first`,
         `### How to handle failures`
      3. `required_cli_surface_mentions` split into two
         strict lists (ALL members of each list must be
         mentioned in the instruction file; source of truth
         is `src/core/adapters/conformance-spec.ts`, full
         command strings):
         - lifecycle_required: `code-pact task prepare`,
           `code-pact task start`, `code-pact task complete`,
           `code-pact task finalize`
         - diagnostic_required: `code-pact task context`,
           `code-pact verify`, `code-pact validate`
      4. `required_failure_guidance` keyword/heading match:
         `blocked dependency`, `verification failure`,
         `adapter drift`, `missing context pack`
      5. Per-file checksum match against the manifest

      The required-surface lists live in a new module
      `src/core/adapters/conformance-spec.ts` imported by
      both `adapter doctor`'s contract drift check and the
      new `adapter conformance` command. A unit test enforces
      the single-source-of-truth invariant.

      Stable adapter templates (`claude-code`, `codex`,
      `generic`) are refreshed so a fresh `adapter install`
      passes conformance by construction. Experimental
      adapters (`cursor`, `gemini-cli`) SHOULD carry the same
      surface but are not required by conformance.

      Fixtures:
      `tests/fixtures/adapters/{claude-code,codex,generic}/
      expected-files.txt` regenerated.

      Tests:
      - integration: each stable adapter passes conformance
        immediately after `adapter install`
      - integration: removing a lifecycle surface mention
        causes exit code 1 and surfaces the specific missing
        item in `missing_lifecycle`
      - integration: doctor's contract drift check uses the
        same spec (import-source invariant)
      - unit: existing v1.7 contract drift behaviour is
        preserved (no doctor envelope regression)

      Reuses existing `ADAPTER_*` error codes only.
    depends_on:
      - P21-T0
    decision_refs:
      - design/decisions/agent-contract-v2-rfc.md
    reads:
      - src/commands/adapter-doctor.ts
      - src/core/adapters/index.ts
      - src/core/adapters/file-state.ts
      - src/core/schemas/adapter-manifest.ts
      - tests/integration/adapter-conformance.test.ts
    writes:
      - src/commands/adapter-conformance.ts
      - src/commands/adapter-doctor.ts
      - src/cli.ts
      - src/i18n/index.ts
      - src/core/adapters/conformance-spec.ts
      - src/core/adapters/claude.ts
      - src/core/adapters/codex.ts
      - src/core/adapters/generic.ts
      - tests/integration/adapter-conformance.test.ts
      - tests/unit/commands/adapter-conformance.test.ts
      - tests/fixtures/adapters/claude-code/expected-files.txt
      - tests/fixtures/adapters/codex/expected-files.txt
      - tests/fixtures/adapters/generic/expected-files.txt
      - docs/cli/adapter-conformance.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P21-agent-contract-v2.yaml
  - id: P21-T6
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Ship `docs/agent-contract.md` — the formal definition
      of code-pact's v2 agent contract.

      Sections:
      1. The contract — what code-pact guarantees to agents
         (CLI surface stability, JSON envelope shape, exit
         codes, error codes).
      2. What agents must do — the conformance checks
         enforced by `code-pact adapter conformance` (mirrors
         the spec in `src/core/adapters/conformance-spec.ts`).
      3. Lifecycle — the recommended per-task flow,
         visualised as `task prepare ─► ... ─► task finalize`
         with `verify` between `implement` and `task complete`.
      4. Measurement — the success metrics defined in
         docs/positioning.md (numbers TBD, populated by P26).

      Update README's Reference docs table to include
      agent-contract.md.

      Public-doc constraint: same as P21-T1 — no third-party
      tool or competitor name; positioning is expressed
      entirely in code-pact's own terms.

      Phase status is reconciled after all P21 tasks complete
      via `code-pact phase reconcile P21 --write`; this task
      does not edit the phase YAML directly.
    depends_on:
      - P21-T1
      - P21-T3
      - P21-T4
      - P21-T5
    decision_refs:
      - design/decisions/agent-contract-v2-rfc.md
    reads:
      - docs/cli-contract.md
    writes:
      - docs/agent-contract.md
      - README.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P21-agent-contract-v2.yaml
