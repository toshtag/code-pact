  - id: P21-T2
    type: refactor
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: strong
    expected_duration: short
    status: planned
    description: |
      Extract `resolveRecommendation()` as a pure function in
      `src/core/recommend/` so `task prepare` can call the
      same recommendation logic the existing `code-pact
      recommend` command uses, without duplication.

      The existing `code-pact recommend` JSON envelope MUST
      remain byte-identical (snapshot test added in this task
      then verified against the refactored implementation).
      The CLI command becomes a thin wrapper that constructs
      the input options, calls the pure function, and prints
      the envelope.

      Return type captures: `tier`, `model`, `effort`
      (`low`|`medium`|`high`), optional `thinking_enabled`,
      `planning_posture` (`plan_first`|`direct`), optional
      `budget.context_size_hint`.

      Unit tests cover each tier mapping and the effort /
      planning posture derivation rules. The existing
      integration test (if any) for `code-pact recommend`
      continues to pass against the wrapper.
    depends_on:
      - P21-T0
    decision_refs:
      - design/decisions/agent-contract-v2-rfc.md
    reads:
      - src/commands/recommend.ts
      - src/core/schemas/project.ts
      - design/decisions/agent-contract-v2-rfc.md
    writes:
      - src/core/recommend/index.ts
      - src/commands/recommend.ts
      - tests/unit/core/recommend/resolve.test.ts
      - CHANGELOG.md
    acceptance_refs:
