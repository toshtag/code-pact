id: P80
name: Post-P79 One-Pair Effectiveness Trial
weight: 1
confidence: medium
risk: medium
status: done
objective: >
  Run capability-qualified one-pair trials to measure whether P78 one-shot
  execution and P79 immutable contract / review evidence improve first-pass
  verification, token use, and artifact integrity on a single local model
  compared to a minimal baseline. Each trial stops at one pair and does not
  generalize results.
non_goals:
  - Add product features.
  - Start P64, P65, P67, or P68.
  - Generalize results beyond the single qualified pair.
  - Claim token reduction effects without a discriminating pair.
definition_of_done:
  - |
    The capability gate, baseline, and Code Pact conditions are executed
    against one fixed local model with auditable evidence, and the result is
    committed as design/decisions/P80-T2-qualified-one-pair-trial.md.
verification:
  commands:
    - node scripts/experiments/verify-p80-t2-evidence.mjs
      /tmp/code-pact-p80-t2/P80-T2-trial-evidence.zip
tasks:
  - id: P80-T1
    type: test
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Run an unqualified one-pair post-P79 effectiveness trial on the historical
      exact-replacement bug. Both conditions returned the same invalid no-op
      replacement, so the pair is recorded as non_discriminating with
      product_effectiveness unevaluated.
    depends_on: []
    reads:
      - design/decisions/P80-T1-one-pair-effectiveness-trial.md
    writes: []
  - id: P80-T2
    type: test
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Run a capability-qualified one-pair trial using one fixed local model, one
      invocation per comparison condition, no repair, and complete auditable
      evidence. The model must first pass an exact-replacement capability gate
      before the baseline / Code Pact pair is attempted.
    depends_on: []
    reads: []
    writes:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
  - id: P80-T2C
    type: bugfix
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Correct the P80-T2 single-pair classification and strengthen the existing
      trial-evidence verifier without rerunning the model or changing the trial.
    depends_on:
      - P80-T2
    reads:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
    writes:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
  - id: P80-T2D
    type: bugfix
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Converge P80-T2 evidence semantics by aligning nested P79 status,
      validating lifecycle events, separating fixture and main-repository
      failures, preserving negative verifier evidence, and recording issue URLs.
    depends_on:
      - P80-T2C
    reads:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
    writes:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
  - id: P80-T2E
    type: bugfix
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Make P80-T2 evidence authenticity machine-verifiable by enforcing exact
      P79 failure-record equality, matching failure codes to execution logs, and
      executing deterministic semantic negative cases.
    depends_on:
      - P80-T2D
    reads:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
    writes:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
  - id: P80-T2F
    type: bugfix
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Close the remaining P80-T2 negative-verifier authenticity gaps by
      enforcing the exact P79 failure set, bidirectional command-evidence
      matching, semantic self-test success criteria, and complete log evidence.
    depends_on:
      - P80-T2E
    reads:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
    writes:
      - design/decisions/P80-T2-qualified-one-pair-trial.md
      - scripts/experiments/verify-p80-t2-evidence.mjs
