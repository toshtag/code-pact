id: P50
name: Context Fit advisories — four opt-in, non-exit-affecting plan-lint
  advisories under --include-quality that flag likely context-size risk
  (large natural pack, unachievable recommended budget, oversized declared
  decision, over-broad reads glob) before a task runs
weight: 5
confidence: medium
risk: medium
status: planned
objective: |
  P50 ships layer (d) of Context Fit (design/decisions/context-fit-rfc.md):
  four opt-in, non-exit-affecting advisories under `plan lint
  --include-quality`. Each is `affects_exit: false`, so it never changes the
  exit code, even under `--strict` — matching the P36 advisory pattern.

    TASK_CONTEXT_PACK_LARGE         the task's natural (pre-elision) context
                                    pack size exceeds the `balanced` fallback
                                    budget (60000 bytes). Carries
                                    natural_bytes, threshold_bytes,
                                    recommended_profile.
    TASK_CONTEXT_BUDGET_UNACHIEVABLE the recommended context budget for the
                                    task cannot fit even after maximal eligible
                                    elision (minimum_achievable_bytes >
                                    budget_bytes). Carries profile,
                                    budget_bytes, minimum_achievable_bytes.
    TASK_DECLARED_DECISION_LARGE    a decision_refs entry points to a decision
                                    body larger than the `tight` budget (30000
                                    bytes), large enough to dominate a tight
                                    pack. Carries path, bytes, threshold_bytes.
    TASK_READS_MATCH_TOO_MANY       a reads glob matches more than 100 files.
                                    Carries glob, match_count, threshold_count.

  The pack-size advisories reuse the P49 shared explain metrics
  (natural_bytes, minimum_achievable_bytes) — the same shared floor helper
  CONTEXT_OVER_BUDGET uses — by building each task's context pack once per
  lint run and caching the result. The recommended budget reuses the P48
  deterministic profile mapping. The decision-size and reads-count advisories
  read files / expand globs directly, with per-run caches so a repeated path
  or glob is measured once.

  All four are deterministic byte/count thresholds (documented with the
  codes), local and offline: no network, model, tokenizer, summarization,
  compression, semantic ranking, or embeddings is introduced, and no hidden
  writes occur. The advisories are absent without `--include-quality` and run
  only when it is set; default `plan lint` is unchanged. They are a
  readiness/advisory layer, never a gate: a large pack, a large decision, or a
  broad reads glob can all be legitimate, so the advisories surface risk
  without blocking work or forcing premature micro-optimization.

  Scope is layer (d) only. P51 (deterministic structural compaction) and P52
  (external context sources) are NOT in this phase, and no context pack
  content is changed, no budget is automatically applied.

  Design recorded in design/decisions/context-fit-rfc.md § Layer (d).
non_goals:
  - Context Fit layers beyond (d) — deterministic structural compaction (P51)
    or external context sources (P52). P50 is layer (d) only.
  - Any change to context pack rendering, `task context`, `task prepare`,
    `recommend`, or any existing lifecycle behavior. P50 is an
    advisory/readiness layer that only reads existing deterministic data.
  - Any new exit-affecting behavior. Every P50 advisory sets affects_exit to
    false; `plan lint` and `plan lint --strict` exit semantics are unchanged
    for existing inputs, gaining only additional non-exit-affecting advisory
    records when `--include-quality` is present.
  - Promoting any P50 advisory to a hard validation error, or emitting any P50
    advisory without `--include-quality`.
  - Token counting, a tokenizer dependency, summarization, compression,
    semantic ranking, embeddings, a proxy, or any network access.
  - A second floor calculation — TASK_CONTEXT_BUDGET_UNACHIEVABLE derives
    minimum_achievable_bytes from the same P49 shared helper used by
    CONTEXT_OVER_BUDGET, not a separate hard-coded floor.
  - Subjective prose heuristics. Every threshold is a documented byte/count
    value sourced from the standard profile vocabulary or a fixed count.
definition_of_done:
  - A deterministic context-fit advisory helper computes the four advisories
    from existing project/task data — TASK_CONTEXT_PACK_LARGE,
    TASK_CONTEXT_BUDGET_UNACHIEVABLE, TASK_DECLARED_DECISION_LARGE, and
    TASK_READS_MATCH_TOO_MANY. Thresholds live in one runtime source of truth
    (largeContextBalancedBytes = balanced 60000, largeDecisionBytes = tight
    30000, readsMatchCount = 100), sourced from
    STANDARD_CONTEXT_BUDGET_PROFILES where applicable.
  - The pack-size advisories reuse the P49 explain metrics (natural_bytes and
    the shared minimum_achievable_bytes floor) via one context-pack build per
    task per lint run, cached; the budget recommendation reuses the P48
    deterministic mapping. No new floor path is introduced.
  - All four advisories appear only under `plan lint --include-quality`, are
    absent without it, and set affects_exit to false. `plan lint
    --include-quality --strict` still exits successfully when only P50
    advisories are present; existing hard errors still affect the exit code as
    before, and the existing P31/P36 advisories are unchanged.
  - The advisory pass makes no network calls, no model/tokenizer/summarization
    calls, and no hidden writes, and does not change any context pack content
    (tests/integration/pack-byte-identical.test.ts unchanged). Per-run caches
    avoid rebuilding a task's pack, re-reading a decision file, or re-expanding
    a reads glob more than once.
  - cli-contract.md, agent-contract.md, the glossary, and CHANGELOG record the
    shipped P50 behavior (the four codes, their deterministic thresholds, that
    they appear only under --include-quality, set affects_exit to false, never
    change --strict exit behavior, change no pack content, apply no budget
    automatically, and use no model/tokenizer/network/summarization). The
    generated CLI reference is checked/regenerated as a no-op because P50 adds
    no new flag or command (the advisories surface through the existing
    --include-quality flag). check:docs passes.
  - The phase is registered (this phase YAML plus a design/roadmap.yaml entry);
    validate --json and plan lint --include-quality --strict --json are clean.
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
