id: P36
name: ADR quality advisory — surface an accepted ADR whose body is an empty
  stub, without enforcing a template
weight: 6
confidence: high
risk: low
status: planned
objective: |
  The value of the ADR gate is that writing the ADR elicits the design decision,
  but today an ADR only needs status accepted to pass — an accepted ADR with an
  empty body slips through. This adds a single plan lint --include-quality
  advisory, ADR_ACCEPTED_BODY_THIN, that surfaces an accepted ADR whose body is
  nearly empty.

  Deliberately minimal and low-false-positive: NO heading-name / section
  sniffing (this repo's legitimate ADRs never use ## Consequences / ##
  Alternatives, and the heading set varies widely — name-matching would flag
  valid ADRs and reduce P36 to a template enforcer). Instead a structure-
  independent signal: fire only when the substantive body is below a calibrated
  threshold AND the body has zero h2 headings. Advisory only (affects_exit
  false); the task complete / verify decision gate is unchanged.

  Design recorded in design/decisions/adr-quality-advisory-rfc.md.

  Note: P35 was merged into P33; there is no P35 phase. This phase is P36.

  Scope discipline (2 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — detectAdrAcceptedBodyThin + include-quality wiring + error code +
      docs + CHANGELOG + tests (incl. a regression pin that the repo's real
      ADRs never fire).
non_goals:
  - heading/section-based ADR advisories (ADR_ACCEPTED_WITHOUT_CONSEQUENCES
    etc.) — false-positive prone; reconsider only with a canonical ADR template
  - making the advisory a hard gate (advisory only, affects_exit false)
  - changing the decision gate in task complete / verify
  - checking proposed/draft ADR bodies (only accepted carries the
    approved-but-empty contradiction)
definition_of_done:
  - plan lint --include-quality emits ADR_ACCEPTED_BODY_THIN (severity warning,
    affects_exit false) for an accepted ADR whose substantive body (frontmatter
    removed, status line + h1 stripped, normalized) is < ADR_THIN_BODY_CHARS AND
    whose raw body has zero h2 headings
  - the accepted-status-only stub fires; a 0-byte empty file does not; proposed/
    draft thin ADRs do not; the repo's real ADRs (smallest ~3610B / 3 h2) do not
  - no heading-name matching anywhere in the detector
  - the detector does not run without --include-quality; advisory never affects
    exit, even under --strict
  - ADR_ACCEPTED_BODY_THIN registered in the error-code-surface test and the
    cli-contract plan-diagnostics table
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
tasks:
  - id: P36-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: >
      RFC + phase registration (bootstrap).


      Lands design/decisions/adr-quality-advisory-rfc.md (status: accepted) and

      bootstraps the phase (phase YAML + roadmap entry, weight 6) as

      protected-path bootstrap writes NOT listed in `writes:`, per the P28-P34

      precedent (writes carries the RFC + CHANGELOG only; the phase YAML is in

      acceptance_refs and design/roadmap.yaml is excluded as a plan-lint
      --strict

      protected path). The RFC records the stub-only decision, why heading-name

      sniffing is rejected (repo ADR structure diversity), the conservative AND

      threshold (thin body AND zero h2), the no-hard-gate rule, and the future

      canonical-template escape hatch.
    decision_refs:
      - design/decisions/adr-quality-advisory-rfc.md
    reads:
      - src/core/plan/lint.ts
      - src/core/decisions/adr.ts
      - src/core/pack/front-matter.ts
    writes:
      - design/decisions/adr-quality-advisory-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P36-adr-quality-advisory.yaml
  - id: P36-T1
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: >
      detectAdrAcceptedBodyThin + wiring + error code + docs + tests.


      - lint.ts: new detectAdrAcceptedBodyThin(cwd) in the includeQuality block,
        modeled on detectAdrStatusUnrecognized. Targets acceptance === "accepted".
        Uses parseFrontMatter to get the raw body; counts h2 (^## ) on the raw
        body; measures substantive chars after stripping the status line
        (**Status:** / - Status: / Status:) and the h1 title and normalizing
        whitespace. Fires when chars < ADR_THIN_BODY_CHARS (=400, source comment
        with the calibration rationale) AND h2 count === 0. issue:
        { code: "ADR_ACCEPTED_BODY_THIN", severity: warning, affects_exit: false,
        file, details: { body_chars, heading_count } }. No heading-name matching.
      - Register ADR_ACCEPTED_BODY_THIN in error-code-surface KNOWN_CODES and
      the
        cli-contract plan-diagnostics table.
      - CHANGELOG [Unreleased] P36 feature.

      - Tests: fires (accepted-status-only stub; accepted + thin + no h2);
        non-fires (short-but-h2; long-but-no-h2; proposed thin; 0-byte empty);
        status-line stripping for all three status formats; not run without
        --include-quality; a regression test that the repo's real ADRs produce
        zero ADR_ACCEPTED_BODY_THIN.
    decision_refs:
      - design/decisions/adr-quality-advisory-rfc.md
    reads:
      - src/core/plan/lint.ts
      - src/core/decisions/adr.ts
      - src/core/pack/front-matter.ts
      - tests/unit/core/plan/lint.test.ts
      - docs/cli-contract.md
    writes:
      - src/core/plan/lint.ts
      - tests/unit/core/plan/lint.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
      - CHANGELOG.md
