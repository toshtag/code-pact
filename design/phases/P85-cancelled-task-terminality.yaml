id: P85
name: Cancelled Task Terminality
weight: 2
confidence: high
risk: medium
status: done
objective: >
  Treat an explicitly cancelled task as terminal for phase-level lifecycle
  aggregation while preserving its historical progress events.
non_goals:
  - Add task cancel or supersede commands.
  - Add a new task status.
  - Rewrite or delete progress events.
  - Infer replacement relationships.
  - Resume token-reduction work.
definition_of_done:
  - A cancelled task with failed history no longer keeps a phase in progress.
  - Phase reconcile and phase runbook report the same phase-status candidate.
  - Review bundle accepts a done reviewed task whose failed sibling is
    explicitly cancelled.
  - Cancelling a task with a derived done state remains fail-closed.
  - Non-cancelled failed tasks continue to block phase completion.
  - Strict finalize and the official review-bundle command pass.
verification:
  commands:
    - pnpm typecheck
    - pnpm build
    - pnpm test:unit
    - pnpm test:integration
    - pnpm test:integration:smoke
    - pnpm check:docs
    - pnpm test:ci
