id: P56
name: Failure-Aware Escalation
weight: 7
confidence: medium
risk: medium
status: planned
objective: >
  Route post-failure guidance by failure kind and bounded repair state instead
  of deriving escalation only from the initial model tier.
non_goals:
  - Escalate automatically after every failed verification command.
  - Persist every repair attempt as a large progress event.
  - Treat timeout, abort, unsafe write, or invalid state as ordinary code-repair failures.
definition_of_done:
  - Failure kind determines whether to repair, stop, request a decision, repair state, add context, or consider escalation.
  - Same-fingerprint recurrence stops without another repair attempt.
  - Terminal summaries are recorded only when a failure path stops.
  - Existing model-tier escalation remains available after the repair budget is exhausted.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
