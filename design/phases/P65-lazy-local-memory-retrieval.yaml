id: P65
name: Lazy Local Memory Retrieval
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Provide explicit, bounded local memory retrieval only after a current failure
  exists and an agent chooses to request prior matching details, keeping initial
  task context memory-free.
non_goals:
  - Inject memory into initial task context or recommendations.
  - Retrieve by fuzzy, semantic, natural-language, or embedding search.
  - Return raw stdout, stderr, prompts, responses, reasoning, source, or diffs.
  - Change verification results, progress, Evidence, Failure Capsule, or repairPolicy.
  - Add contributor sharing, remote sync, or a new storage backend.
definition_of_done:
  - Retrieval is explicit and fingerprint-exact.
  - Retrieval returns at most three records and less than 4 KiB total.
  - Missing local cache returns an empty successful result.
  - Retrieval output is advisory and never changes verification outcome.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
