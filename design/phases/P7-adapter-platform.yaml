id: P7
name: Adapter Platform
weight: 20
confidence: medium
risk: low
status: in_progress
objective: |
  Promote the adapter layer from "template generator" into a managed,
  inspectable, upgradeable subsystem. Add a per-agent manifest that tracks
  which files code-pact wrote and their content hashes, a two-axis file
  state model (local-modification × desired-content drift), `adapter list`
  / `install` / `upgrade --check|--write` / `doctor` subcommands, narrow
  ownership detection, and stable-adapter conformance fixtures. v0.8
  `--force = overwrite everything` is narrowed to `--force = unmanaged
  adoption only`; destructive overwrite of locally-modified files now
  requires `--accept-modified`. Generators are refactored to return pure
  desired-file lists; all disk I/O, force/skip logic, and file-state
  classification move to the command layer. No metrics / eval / cost
  measurement, no remote registry, no orchestration.
non_goals:
  - eval / metrics / cost / token measurement
  - remote adapter registry / SaaS / orchestration / MCP server
  - cursor / gemini-cli conformance (remain in EXPERIMENTAL_AGENTS)
  - capability negotiation (capabilities are descriptive only, not enforced)
  - automatic 3-way merge of managed-modified × desired-stale files
  - plugin runtime / external adapter loading
  - "AgentProfile.capabilities schema field (defer until a consumer needs it)"
  - "changes to recommend / validate / plan * / task * / phase * / pack / progress / verify (except minor instruction-template additions of `code-pact recommend` in P7-T6)"
  - semver-aware ADAPTER_GENERATOR_STALE comparison
  - ".code-pact/adapter-policy.yaml (defer to v0.10)"
definition_of_done:
  - design/phases/P7-adapter-platform.yaml exists and design/roadmap.yaml lists P7
  - AdapterDescriptor + DesiredAdapterFile types replace the ad-hoc AdapterGenerator signature
  - 5 adapters expose pure generateDesiredFiles; disk I/O and force/skip logic live in the command layer
  - AdapterManifest zod .strict() schema with per-agent .code-pact/adapters/<agent>.manifest.yaml layout
  - 2-axis classifyFileState (local × desired) + action matrix in src/core/adapters/file-state.ts
  - "adapter subcommand group: list / install / upgrade --check / upgrade --write / doctor"
  - bare-form `code-pact adapter --agent X` continues to work with a 1-line deprecation notice
  - --force narrowed to unmanaged adoption (adopt / replace_unmanaged); managed-modified overwrite requires --accept-modified
  - 9 new ADAPTER_* error codes in adapter doctor; global doctor remains v0.8 byte-identical when no manifest exists
  - conformance fixtures for claude-code / codex / generic assert file list, content invariants (code-pact recommend, task context, task complete, validate), idempotency, --json mention, manifest round-trip, path safety
  - codex / generic instruction templates mention `code-pact recommend`
  - docs/cli-contract.md updated for every new command, error code, and exit code map
  - docs/dogfood.md gains an "adapter を安全にアップグレードする" section
  - package.json bumps to 0.9.0-alpha.0 and CHANGELOG entry documents the --force narrowing behavior change
  - release prep regenerates .code-pact/adapters/claude-code.manifest.yaml so generator_version is 0.9.0-alpha.0
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js plan normalize --check --json
    - node dist/cli.js plan analyze --json
    - node dist/cli.js recommend --phase P6 --task P6-T5 --json
    - node dist/cli.js doctor --json
    - node dist/cli.js adapter list --json
    - node dist/cli.js adapter doctor --agent claude-code --json
    - node dist/cli.js adapter upgrade claude-code --check --json
tasks:
  - id: P7-T1
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: in_progress
    description: |
      Register P7 in design/ and refactor adapter generation to a
      descriptor model. Introduce AdapterDescriptor / DesiredAdapterFile /
      AdapterCapability types in src/core/adapters/types.ts. Each of the
      five adapters exposes generateDesiredFiles(input) returning a pure
      DesiredAdapterFile[] (LF-normalized UTF-8 content, project-relative
      POSIX paths). All disk write I/O, force / regenSkills / skip logic,
      and directory placeholder creation move into src/commands/adapter.ts.
      Each adapter declares ADAPTER_SCHEMA_VERSION = 1, capabilities, and
      a narrow ownedPathGlobs that lists only manifest-writeable paths
      plus a future `.claude/skills/code-pact-*.md` namespace — broad
      patterns like `.claude/skills/**` are explicitly forbidden so user
      files such as `.claude/skills/custom.md` never trigger an
      ADAPTER_UNMANAGED_FILE warning later. Observable behavior is
      byte-identical to v0.8; the existing 17-test adapter suite passes
      unchanged.
  - id: P7-T2
    type: feature
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      AdapterManifest zod .strict() schema in
      src/core/schemas/adapter-manifest.ts, atomic read/write in
      src/core/adapters/manifest.ts with sha256 hex hashes computed from
      LF-normalized UTF-8 bytes. classifyFileState pure function in
      src/core/adapters/file-state.ts implements the 2-axis (local ×
      desired) classification and action matrix returning one of
      `write` / `skip` / `adopt` / `replace_unmanaged` / `update` /
      `update_manifest` / `refuse` / `warn`. Path safety helpers
      (`assertSafeRelativePath`, `resolveWithinProject`) reject absolute
      paths, `..`, empty paths, and symlink-escape. ~45 unit tests cover
      manifest round-trip, strict-mode reject, malformed YAML, every
      file-state combination, and path traversal attempts. No CLI surface
      change in this slice.
  - id: P7-T3
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      adapter list + adapter install subcommand wiring. cmdAdapter
      becomes a subcommand router following the cmdPlan / cmdPhase
      pattern in src/cli.ts. Bare-form `code-pact adapter [--agent X]`
      stays working and emits a single-line stderr deprecation notice
      (suppressed under --json). adapter install writes per-agent
      manifest at .code-pact/adapters/<agent>.manifest.yaml. --force on
      install is narrowed: it only adopts unmanaged files (adopt /
      replace_unmanaged depending on desired-content match) and never
      overwrites managed-modified files. docs/cli-contract.md gains
      sections for list / install / bare-form. The self-dogfood manifest
      .code-pact/adapters/claude-code.manifest.yaml is committed; its
      generator_version is the value at install time (0.8.0-alpha.0) and
      will be refreshed in release prep.
  - id: P7-T4
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      adapter doctor subcommand emitting 9 new ADAPTER_* error codes
      (ADAPTER_MANIFEST_MISSING / _INVALID, ADAPTER_FILE_MISSING /
      _DRIFT, ADAPTER_DESIRED_STALE, ADAPTER_UNMANAGED_FILE,
      ADAPTER_GENERATOR_STALE (simple `generator_version !==
      currentPackageVersion` equality), ADAPTER_SCHEMA_DRIFT,
      ADAPTER_PROFILE_DRIFT). Global doctor's checkAdapterMissing and
      checkAdapterStale are refactored to consult the manifest when
      present, but output when no manifest exists is byte-identical to
      v0.8 — ADAPTER_MANIFEST_MISSING is emitted only by adapter
      doctor, never by global doctor. docs/cli-contract.md gains the
      adapter doctor section and the ADAPTER_* code table.
  - id: P7-T5
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      adapter upgrade --check / --write using the 2-axis file-state
      classifier. --check is read-only and exits 1 with action=update /
      update_manifest / refuse when drift is detected. --write applies
      changes: managed-clean × desired-stale updates without
      --accept-modified, managed-modified × desired-current updates the
      manifest only, managed-modified × desired-stale refuses unless
      --accept-modified is passed. --force on --write covers only
      unmanaged adoption (adopt for desired-current, replace_unmanaged
      for desired-stale). docs/cli-contract.md documents the upgrade
      section with the exit code map, --force narrowing, and the
      eight-value action enum (write / skip / adopt / replace_unmanaged
      / update / update_manifest / refuse / warn).
  - id: P7-T6
    type: test
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      tests/integration/adapter-conformance.test.ts covers claude-code /
      codex / generic. For each, snapshots the manifest file list
      (sorted) at tests/fixtures/adapters/<agent>/expected-files.txt;
      content assertions use toContain for `code-pact recommend`,
      `code-pact task context`, `code-pact task complete`,
