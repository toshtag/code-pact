      files desired-current); asserts --json mention in the instruction
      file; round-trips manifest through zod and confirms
      schema_version === 1. cursor / gemini-cli are explicitly excluded
      and the exclusion is commented inline citing EXPERIMENTAL_AGENTS.
      docs/dogfood.md gains the "adapter を安全にアップグレードする"
      section showing the upgrade --check → --write workflow.
  - id: P7-T7
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      Release prep. Bump package.json to 0.9.0-alpha.0, rebuild, then
      run `node dist/cli.js adapter upgrade claude-code --write` so the
      committed self-dogfood manifest's generator_version updates from
