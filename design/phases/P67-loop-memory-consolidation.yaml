id: P67
name: Loop Memory Consolidation
weight: 5
confidence: low
risk: medium
status: planned
objective: >
  Consolidate sufficiently repeated local episode facts into bounded aggregates
  without turning contradictory local history into a single unsupported rule or
  retaining raw episodes indefinitely.
non_goals:
  - Consolidate below explicit repetition thresholds.
  - Collapse contradictory evidence into one conclusion.
  - Delete raw episodes unconditionally after an aggregate is written.
  - Promote local memory into project rules, decisions, or shared guidance.
  - Repair corrupt cache entries automatically.
  - Add contributor sharing, remote sync, semantic search, embeddings, or a new backend.
definition_of_done:
  - Consolidation has explicit thresholds, such as three matching fingerprints or two same-task failure-to-success observations.
  - The ADR defines aggregate schema, aggregate storage root, TTL, count limit,
    byte limit, contradiction representation, dry-run/write command,
    raw-episode deletion conditions, partial failure behavior, and corruption handling.
  - Dry-run and explicit write modes are separate.
  - Aggregates have TTL, count, and byte limits.
  - Contradictions are preserved as bounded evidence rather than flattened.
  - Retention convergence, dry-run/write behavior, partial failure, and corrupt aggregate handling are demonstrated without changing local-only cache policy.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
