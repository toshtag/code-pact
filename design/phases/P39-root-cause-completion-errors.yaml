id: P39
name: Root-cause-first completion errors — surface the real cause (decision /
  commands) on the task complete primary error face, not just in data
weight: 6
confidence: high
risk: low
status: done
objective: |
  task complete still misdirects AI agents on the primary judgement surface. P32
  put the root cause in data (failed_checks, first_failure,
  suggested_next_command), but error.code stays VERIFICATION_FAILED and
  error.message stays generic ("Verification failed for X. progress.yaml was not
  modified."). An agent reads error.code / error.message first; on a missing-ADR
  (decision gate) failure it concludes the verification command broke and re-runs
  it pointlessly. The detail being in data is not enough — the control surface
  itself has to carry the cause.

  The fix is a horizontal port, not a new design: task record-done ALREADY emits
  error.code DECISION_REQUIRED on the identical decision-gate failure. P39 brings
  task complete to parity by adding an additive error.cause_code and an
  actionable error.message built from the existing data.first_failure.reason.

  Minimal-surface decision (recorded in the RFC): keep error.code
  VERIFICATION_FAILED (v1-stable) and exit 1; add error.cause_code +
  first-failure-derived error.message ONLY. Do NOT duplicate the P32 data fields
  into error, and do NOT add record-done's full structured DecisionRequiredData
  block to the task complete envelope — cause_code + message is sufficient.

  Scope boundary (verified in code): task finalize is NOT a target. It never runs
  the decision gate (src/commands/task-finalize.ts calls neither checkDecision
  nor runVerify) and emits no VERIFICATION_FAILED — its failures are
  TASK_NOT_FOUND / AMBIGUOUS_TASK_ID / TASK_FINALIZE_NOT_ELIGIBLE / write-refused,
  already specific. P39 changes no finalize code; it only documents that the
  decision gate lives in verify / task complete / record-done.

  Design recorded in design/decisions/root-cause-completion-errors-rfc.md.

  Scope discipline (3 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — task complete's JSON failure envelope gains error.cause_code (a
      deterministic map over its commands/decision checks) + an actionable
      error.message from the existing first_failure.reason; register the new
      cause code (COMMANDS_FAILED) and extend the error-code-surface scan to
      cover cause_code. No new structured block; no error-side duplication.
    - T2 — human (non-JSON) output parity for task complete (cause + rerun line)
      + docs: cause_code spec and the decision-gate-location note (finalize does
      not run it). No finalize code change.
non_goals:
  - Promoting error.code to DECISION_REQUIRED on task complete, or changing its
    exit code (error.code is the v1-stable contract field; consumers key on
    VERIFICATION_FAILED — cause lives in the additive cause_code sibling instead)
  - Duplicating the P32 data fields (failed_checks / first_failure /
    suggested_next_command) into error (single source of truth stays in data)
  - Adding record-done's full DecisionRequiredData block to the task complete
    envelope — cause_code + actionable message only (extracting that builder to
    de-dupe record-done is a separate, optional refactor, not wired into complete)
  - Any finalize behavioral change or decision cause_code in finalize — it does
    not run the decision gate (verified in code); P39 only documents the boundary
  - Any change to decision-gate semantics (status-aware resolution,
    all-must-be-accepted vs any-accepted-wins) — only the surfacing changes
  - task prepare lifecycle-flow work (that is P40, sequenced separately in
    design/decisions/post-1.26-agent-dx-backlog.md)
  - any new framework — extend the existing error-code-surface test only
definition_of_done:
  - task complete on a requires_decision task with no accepted ADR returns
    error.code VERIFICATION_FAILED (unchanged, exit 1) AND error.cause_code
    DECISION_REQUIRED AND an error.message that names "accepted ADR required" —
    not the generic verification string
  - error.cause_code is a deterministic map over the checks task complete runs
    (decision -> DECISION_REQUIRED, commands -> COMMANDS_FAILED)
  - the P32 data fields are unchanged and still only in data (no error-side
    duplication); data.verify.checks still includes the failed decision check;
    no full DecisionRequiredData block is added to the task complete envelope
  - COMMANDS_FAILED is registered in KNOWN_CODES + docs/cli-contract.md, and the
    error-code-surface test is extended to scan cause_code literals so every
    cause_code stays pinned to the contract
  - human (non-JSON) task complete output prints the cause and the
    rerun-after-fixing line (parity with the JSON envelope)
  - docs/cli-contract.md documents cause_code and states the decision gate runs
    in verify / task complete / record-done but NOT finalize
  - no finalize code is changed
  - progress.yaml-unchanged invariant holds on failure (including --dry-run)
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
tasks:
  - id: P39-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: >
      RFC + phase registration (bootstrap).


      Lands design/decisions/root-cause-completion-errors-rfc.md (status:
      accepted) and bootstraps the phase (phase YAML + roadmap entry, weight 6)
      as protected-path bootstrap writes NOT listed in `writes:`, per the
      P28-P38 precedent (writes carries the RFC only; the phase YAML is in
      acceptance_refs and design/roadmap.yaml is excluded as a plan-lint
      --strict protected path). The RFC records the minimal-surface decision
      (cause_code + actionable message; no error-side duplication; no new
      structured block on complete), the record-done parity rationale, the
      code-verified finalize scope boundary, and the explicit non-goals.
    decision_refs:
      - design/decisions/root-cause-completion-errors-rfc.md
    reads:
      - design/decisions/root-cause-completion-errors-rfc.md
    writes:
      - design/decisions/root-cause-completion-errors-rfc.md
    acceptance_refs:
      - design/phases/P39-root-cause-completion-errors.yaml
  - id: P39-T1
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: >
      task complete JSON failure envelope: cause_code + actionable message.


      - In the task complete VERIFICATION_FAILED handler
        (src/cli/commands/task.ts): keep error.code VERIFICATION_FAILED and
        exit 1; map the first failing check name to error.cause_code with an
        inline switch at the emission site (decision -> DECISION_REQUIRED,
        commands -> COMMANDS_FAILED) — the cause_code literals live at the
        emission site, not in a core helper, so the error-code-surface scan
        pins them. Replace the generic error.message with an actionable message
        keyed off first_failure.name and embeds first_failure.reason for both
        commands and decision causes. Leave the P32 data fields exactly where they are
        — do NOT copy them into error, and do NOT add a structured
        DecisionRequiredData block.

      - Register the new public code COMMANDS_FAILED in KNOWN_CODES and
        docs/cli-contract.md. Extend tests/unit/error-code-surface.test.ts to
        ALSO scan cause_code: literals (the \bcode: emission regex does not match
        cause_code:), so every cause_code stays pinned to the contract.


      Required tests:

      - task complete <requires_decision task> --dry-run --json, no ADR:
        non-zero; progress.yaml unchanged; error.code === "VERIFICATION_FAILED";
        error.cause_code === "DECISION_REQUIRED"; error.message mentions an
        accepted ADR; data.failed_checks includes "decision"; data.verify.checks
        includes the failed decision check; error has NO full DecisionRequiredData
        block and no copied P32 fields.

      - proposed (not accepted) ADR exists: same cause_code; message clearly says
        an ACCEPTED ADR is required (not generic verification failure).

      - command-failure case (a failing verification command, no decision gate):
        cause_code === "COMMANDS_FAILED"; data.verify.checks remains
        backward-compatible (P32 fields unchanged).


      Note: extracting buildDecisionRequiredData out of task-record-done.ts to
      de-duplicate its inline block is a welcome but OPTIONAL refactor; it is not
      wired into the task complete envelope and is not required by P39.
    decision_refs:
      - design/decisions/root-cause-completion-errors-rfc.md
    depends_on:
      - P39-T0
    reads:
      - src/cli/commands/task.ts
      - src/core/failure/failure-summary.ts
      - src/commands/verify.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - docs/cli-contract.md
      - tests/unit/error-code-surface.test.ts
    writes:
      - src/cli/commands/task.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/integration/completion-cause-code.test.ts
      - tests/integration/cli.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P39-root-cause-completion-errors.yaml
  - id: P39-T2
    type: feature
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: >
      Human output parity (task complete) + docs.


      - Human (non-JSON) task complete output: print the cause (from
        first_failure) and the rerun-after-fixing line, reaching parity with the
        JSON envelope (do not leave the plain-text path generic). Modeled on the
        existing CLI output tests.

      - docs/cli-contract.md: document error.cause_code on the task complete
        failure envelope (the cause_code values and the deterministic mapping,
        plus the explicit note that error.code stays VERIFICATION_FAILED at exit
        1 — the intentional asymmetry with record-done's DECISION_REQUIRED/exit
        2). Add a short note stating the decision gate runs in verify /
        task complete / record-done but NOT finalize.


      Required tests:

      - human output for task complete (decision failure and command failure)
        prints the cause and the rerun-after-fixing line (string assertions).


      No finalize code is changed in this task.
    decision_refs:
      - design/decisions/root-cause-completion-errors-rfc.md
    depends_on:
      - P39-T1
    reads:
      - src/cli/commands/task.ts
      - src/core/failure/failure-summary.ts
      - docs/cli-contract.md
    writes:
      - src/cli/commands/task.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/integration/completion-cause-code.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
      - docs/agent-contract.md
      - docs/troubleshooting.md
      - docs/concepts/decision-gate.md
      - design/rules/json-output.md
      - CONTRIBUTING.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P39-root-cause-completion-errors.yaml
