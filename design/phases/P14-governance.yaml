  - id: P14-T5
    type: feature
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      Advisory lock model. New module src/core/locks/write-lock.ts
      exposing `acquireWriteLock(cwd, cmd): Promise<LockHandle>`
      and `LockHandle.release(): Promise<void>`. Implementation
      uses `fs.writeFile` with `{ flag: "wx" }` for atomic
      exclusive create. Lock file content is JSON `{ pid,
      hostname, cmd, created_at }`. On EEXIST, reads the existing
      lock content and throws an Error with `.code = "LOCK_HELD"`
      and `.lock_holder` carrying the diagnostic struct.

      Integration: lock is acquired at the CLI command handler
      level, NOT inside createPhase. This gives `phase import`
      multi-phase batch transactionality: cmdPhaseImport acquires
      the lock once before calling runPhaseImport, holds it
      through the entire apply loop (every createPhase call
      inside is covered by the same single acquisition), and
      releases on exit (success or failure). The seven direct
      acquisition points are:
        - cmdInit (when --sample-phase or wizard-yes triggers
          writeSamplePhase)
        - cmdPhaseAdd
        - cmdPhaseNew (after wizard prompts finish)
        - cmdPhaseImport (single acquisition covers the whole
          multi-phase loop)
        - cmdTaskAdd (write path: both wizard and non-interactive)
        - cmdTaskFinalize (only when --write)
        - cmdPhaseReconcile (only when --write — single
          acquisition covers the whole reconcile batch)
      createPhase itself is lock-agnostic (it assumes the caller
      already holds the lock when batch mutation is in play).
      Read-only commands do NOT acquire the lock.

      Test escape: respects `CODE_PACT_DISABLE_LOCKS=1` env var
      to skip acquisition. The env var is for tests UNRELATED
      to lock behaviour (typically set globally in vitest setup
      for parallel test runs). Lock-specific unit and integration
      tests must run with the env var unset to exercise real
      acquisition / EEXIST paths — these tests explicitly delete
      the env var before running. The env var is NOT documented
      in docs/cli-contract.md or any public-facing surface;
      it's a test-only escape.

      Adds `LOCK_HELD` to KNOWN_CODES.public + docs/cli-contract.md.
      New unit tests for the helper (acquire / release / EEXIST
      → LOCK_HELD with lock_holder); these tests run with
      CODE_PACT_DISABLE_LOCKS unset. New integration test entry
      for LOCK_HELD JSON envelope (concurrent invocation
      simulated by manually creating the lock file before the
      second command runs).
    depends_on:
      - P14-T1
    decision_refs:
      - design/decisions/governance-rfc.md
    reads:
      - src/io/atomic-text.ts
      - src/core/services/createPhase.ts
      - src/commands/task-add.ts
      - src/commands/task-finalize.ts
      - src/commands/phase-reconcile.ts
      - src/commands/init.ts
      - src/commands/phase.ts
      - src/commands/phase-new.ts
      - src/commands/phase-import.ts
      - src/cli.ts
      - tests/unit/error-code-surface.test.ts
    writes:
      - src/core/locks/write-lock.ts
      - src/cli.ts
      - tests/unit/core/locks/write-lock.test.ts
      - tests/integration/json-stdout.test.ts
      - tests/unit/error-code-surface.test.ts
      - docs/cli-contract.md
    acceptance_refs:
