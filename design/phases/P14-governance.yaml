id: P14
name: Governance
weight: 25
confidence: medium
risk: low
status: done
objective: |
  Add a deterministic governance layer on top of P10–P13's schema /
  mutation / guidance / UX foundations. P14 is intentionally narrow:
  three new code surfaces (advisory write lock, reserved-id
  creation-time block, task→phase resolver core extraction) plus
  four docs-only governance decisions (protected-path strict-mode
  guidance, declared-writes-as-review-surface clarification,
  roadmap mutation policy table, phase status manual-flip
  convention). Larger governance (configurable protected paths,
  actual write enforcement against declared writes, phase status
  auto-flip implementation, --force-lock recovery, progress.yaml
  locking) is explicitly deferred to P15+. Every change is
  additive on the CLI contract: no new commands, no new schema
  fields, one new public error code (LOCK_HELD), and no
  behavioural changes to existing Stable commands beyond the new
  lock acquisition (which is a transient retryable failure mode,
  not a behavioural change to the success path).
non_goals:
  - any change to existing Stable command behaviour on the success path (task
    complete / task finalize / phase reconcile / task runbook / phase runbook /
    task add / init / phase import all unchanged on success)
  - configurable protected paths via project.yaml / env (P15+)
  - actual write enforcement against declared `writes` (P15+ — needs runner or
    VCS integration)
  - phase status auto-flip implementation (new flag or new command; P14
    documents the manual-flip convention but defers code to a future RFC)
  - "`--force-lock` flag for stale lock recovery (P15+)"
  - progress.yaml write locking (existing append-only contract makes lock-free
    safe)
  - lock TTL / automatic stale detection
  - cross-phase / multi-project locking
  - configurable reserved-id list (TUTORIAL is the only reserved id in P14)
  - "`RESERVED_ID_USAGE` advisory plan-lint diagnostic on existing TUTORIAL
    phases (P14 only blocks at creation time)"
  - new `--strict` semantics (P14 uses existing binary promotion; selective
    per-code promotion is P15+)
  - any LLM / RAG / MCP / multi-agent orchestration / scheduler / issue-tracker
    integration
  - new task or phase schema field
  - new commands (only one new public error code; everything else is additive on
    existing commands)
definition_of_done:
  - design/decisions/governance-rfc.md exists and is marked accepted
  - design/roadmap.yaml lists P14
  - design/phases/P14-governance.yaml exists with this objective and tasks list
  - "the design-mutating paths acquire `.code-pact/locks/write.lock` at the CLI
    command handler level (not inside createPhase) and release on exit:
    createPhase callers (`init` sample-phase path, `phase add`, `phase new`,
    `phase import`) — for `phase import` the lock is held once around the entire
    multi-phase apply loop (no per-`createPhase` acquisition); `task add` write
    path; `task finalize --write`; `phase reconcile --write`"
  - "`LOCK_HELD` ships in `KNOWN_CODES.public` and `docs/cli-contract.md`, with
    `data.lock_holder` carrying `{ pid, hostname, cmd, created_at }`"
  - "`phase add --id TUTORIAL` and `phase import` of a TUTORIAL phase are
    blocked with `CONFIG_ERROR` at creation time. `init --sample-phase`
    continues to create TUTORIAL via an internal-only bypass on `createPhase`"
  - "`phase import` validates the entire input for reserved-id TUTORIAL via a
    preflight scan before calling `createPhase` — if any imported phase carries
    `id: TUTORIAL`, the entire import fails with `CONFIG_ERROR` before any phase
    YAML or roadmap entry is written. Partial imports (some phases written, then
    TUTORIAL fails mid-loop) are not possible"
  - task→phase resolver is extracted into `src/core/plan/resolve-task.ts`
    exposing `resolveTaskInRoadmap` and `resolveTaskInPlanState`; the 8
    duplicated sites (7 commands + 1 manual scan in task-runbook) migrate to the
    helper; existing unit tests for those commands pass unchanged
  - docs/cli-contract.md gains (a) the Public codes table entry for `LOCK_HELD`,
    (b) a roadmap mutation policy section, (c) lock semantics notes on the five
    design-mutating commands, (d) a `--strict` semantics note, (e) the
    reserved-id block on `phase add` / `phase import`
  - docs/migration.md gains a v1.4.x → v1.5.0 section covering the four
    governance changes
  - docs/dogfood.md Troubleshooting gains a `LOCK_HELD` entry; the "Adding work"
    + release-prep sections gain guidance "do not run `plan lint --strict` in
    release prep against the dogfood corpus" (because P10-T1 / P10-T6 / P11-T1
    declare legitimate writes against `design/roadmap.yaml` and
    `design/phases/*.yaml`)
  - "`KNOWN_CODES.public` extension contains exactly one new code (`LOCK_HELD`).
    The full surface remains additive"
  - "`tests/integration/json-stdout.test.ts` continues to pass for every Stable
    command; new entries are added for LOCK_HELD and reserved-id CONFIG_ERROR
    paths"
  - "`tests/integration/pack-byte-identical.test.ts` continues to pass (no `task
    context` pack change in P14)"
  - existing wizard + non-interactive `task add` behaviour unchanged
