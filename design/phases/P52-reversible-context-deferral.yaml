id: P52
name: Reversible Context Deferral
weight: 8
confidence: medium
risk: medium
status: planned
objective: >
  Replace irreversible context section elision with content-addressed deferral
  records so an agent can retrieve the exact omitted context only when needed.
non_goals:
  - Summarize natural-language rules, constitution text, decisions, or source code.
  - Create one reference per deferred section when a single manifest can cover the pack.
  - Change the default no-budget context pack output.
definition_of_done:
  - Deferred context is stored locally under a content-addressed reference.
  - A context pack lists deferred section names, a manifest reference, and a retrieval command.
  - Retrieval returns the exact deferred section content without semantic rewriting.
  - Context pack byte metrics include deferred bytes separately from final bytes.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P52-T1
    type: architecture
    ambiguity: medium
    risk: medium
    context_size: medium
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: Specify the deferred context manifest, reference format, and retrieval contract.
    reads:
      - docs/cli-contract.md
      - docs/agent-contract.md
      - src/core/pack/index.ts
      - src/core/pack/budget.ts
    writes:
      - docs/cli-contract.md
      - docs/agent-contract.md
    acceptance_refs:
      - docs/cli-contract.md
      - docs/agent-contract.md
  - id: P52-T2
