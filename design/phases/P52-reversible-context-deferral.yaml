id: P52
name: Reversible Context Deferral
weight: 8
confidence: medium
risk: high
status: done
objective: >
  Replace irreversible context section elision with content-addressed deferral
  records so an agent can retrieve the exact omitted context only when needed.
non_goals:
  - Summarize natural-language rules, constitution text, decisions, or source
    code.
  - Create one reference per deferred section when a single manifest can cover
    the pack.
  - Change the default no-budget context pack output.
definition_of_done:
  - "`buildContextPack()` remains side-effect-free and does not write deferred
    artifacts to disk."
  - Context pack build results include deterministic deferred artifact
    references and pending artifact payloads for later materialization.
  - For the same task, agent, and resolved byte budget, `task context`, normal
    `task prepare`, and `task prepare --dry-run` produce byte-identical Markdown
    context content.
  - Runtime persistence state and runnable retrieval commands are command-result
    metadata and are never embedded in the Markdown context content.
  - "Normal `task prepare` materializes deferred artifacts before writing the
    context pack and returns `deferred_context.persisted: true` with a runnable
    `retrieve_command`."
  - "`task prepare --dry-run` does not materialize deferred artifacts and
    returns `deferred_context.persisted: false` with `retrieve_command: null`."
  - "Default `task context` remains read-only, does not materialize deferred
    artifacts, and returns `deferred_context.persisted: false` with
    `retrieve_command: null`."
  - No-budget context packs do not create deferred artifacts.
  - Each artifact and pack file is written atomically.
  - Deferred artifacts are written and verified before the context pack.
  - A written context pack must never contain a dangling deferred reference.
  - Orphaned content-addressed artifacts are allowed if a later context pack
    write fails.
  - Deferred bytes are reported as the UTF-8 bytes of original sections removed
    from the pack by budget elision and saved to deferred artifacts; projection
    reduction bytes are separate.
  - Deferred context is stored locally under a content-addressed reference.
  - The artifact store has an explicit filesystem authority and rejects symlink
    escape or traversal.
  - Deferred manifests use canonical serialization and deterministic digests.
  - Writes are atomic, partial files are cleaned up, and digest conflicts fail
    closed.
  - References are Windows-safe and corrupted artifacts are detected before
    content is returned.
  - A context pack lists deferred section names, one deterministic manifest
    reference, and static retrieval guidance.
  - A context pack does not embed runtime persistence state or a conditionally
    runnable retrieval command.
  - "`task prepare` and `task context` expose deferred materialization state
    through an additive `deferred_context` result object containing
    `manifest_ref`, `sections`, `persisted`, and nullable `retrieve_command`."
  - "`context show <ref> --list` lists sections; `--section <name>` retrieves
    only named sections; `--json` preserves the same contract for machine
    readers."
  - The no-section default returns manifest metadata, not all deferred source
    text.
  - Retrieval returns the exact deferred section content without semantic
    rewriting and round-trips byte-for-byte.
  - Context pack byte metrics include deferred bytes separately from final bytes.
  - "Context artifact failures use closed context-specific errors, not Evidence
    errors: `INVALID_CONTEXT_REF`, `CONTEXT_NOT_FOUND`, `CONTEXT_INVALID`,
    `CONTEXT_DIGEST_MISMATCH`, `CONTEXT_PATH_UNSAFE`, and
    `CONTEXT_READ_FAILED`."
  - Each context error defines its exit behavior, JSON error code, optional
    `data.system_code`, recoverability, and troubleshooting coverage.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:full
    - pnpm check:fs-authority
    - pnpm check:fs-containment
    - pnpm check:security-hardening
