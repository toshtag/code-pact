id: P52
name: Reversible Context Deferral
weight: 8
confidence: medium
risk: medium
status: planned
objective: >
  Replace irreversible context section elision with content-addressed deferral
  records so an agent can retrieve the exact omitted context only when needed.
non_goals:
  - Summarize natural-language rules, constitution text, decisions, or source code.
  - Create one reference per deferred section when a single manifest can cover the pack.
  - Change the default no-budget context pack output.
definition_of_done:
  - Deferred context is stored locally under a content-addressed reference.
  - The artifact store has an explicit filesystem authority and rejects symlink escape or traversal.
  - Deferred manifests use canonical serialization and deterministic digests.
  - Writes are atomic, partial files are cleaned up, and digest conflicts fail closed.
  - References are Windows-safe and corrupted artifacts are detected before content is returned.
  - A context pack lists deferred section names, one manifest reference, and `code-pact context show` retrieval commands.
  - "`context show <ref> --list` lists sections; `--section <name>` retrieves only named sections; `--json` preserves the same contract for machine readers."
  - The no-section default returns manifest metadata, not all deferred source text.
  - Retrieval returns the exact deferred section content without semantic rewriting and round-trips byte-for-byte.
  - Context pack byte metrics include deferred bytes separately from final bytes.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
