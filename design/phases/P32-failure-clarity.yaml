id: P32
name: Failure clarity — surface the true root cause and the deterministic next
  action on task complete / finalize failure
weight: 8
confidence: high
risk: low
status: planned
objective: |
  When `task complete` fails verification, the root cause already exists in the
  thrown error's `checks` array (each check carries a human-readable `reason`),
  but the surfaces an agent reads hide it: human output is a single generic line
  ("Verification failed for X. progress.yaml was not modified.") and JSON only
  carries `data.verify.checks` with no top-of-`data` signal of which check
  failed or what to do next. An agent must re-run the lower-level
  `code-pact verify` to decide its next action — an observed wasted round-trip.
  `task finalize` has the same gap on a different, non-`CheckResult` failure
  surface (TASK_FINALIZE_NOT_ELIGIBLE, TASK_FINALIZE_WRITE_REFUSED,
  WRITES_AUDIT_STRICT_FAILED).

  This phase adds three additive fields to both failure envelopes —
  `failed_checks`, `first_failure`, `suggested_next_command` — under `data`
  (the existing `data.verify.checks` / `data.write_audit` are untouched), plus
  richer human output, with no new error codes. `suggested_next_command` is a
  deterministic, AI-free switch on the failing check / finalize code → an exact
  "rerun after fixing" command. This is failure *clarity*, not bug detection:
  verify's checks and the decision gate are unchanged.

  Design recorded in design/decisions/failure-clarity-rfc.md.

  Scope discipline (4 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — core FailureSummary type + builders + deterministic resolver
      (pure, no i18n, no dependency on commands/).
    - T2 — wire `task complete` (JSON + human + dry-run) + shared CLI render
      helper + i18n (both locales) + cli-contract (complete).
    - T3 — wire `task finalize` (the three failure codes) + cli-contract
      (finalize) + CHANGELOG.
non_goals:
  - changing which checks verify runs or how it enforces decisions at completion
  - adding new error codes (the additions are fields only)
  - restructuring data.verify.checks / data.write_audit
  - treating acceptance_refs / depends_on as first_failure candidates (they are
    advisories on the finalize success envelope and do not fail the command)
  - any bug-detection capability
definition_of_done:
  - task complete failure envelope (JSON) carries data.failed_checks,
    data.first_failure, and data.suggested_next_command alongside the unchanged
    data.verify.checks; human output prints the first failure's reason and the
    rerun-after-fixing command below the existing generic message
  - task complete --dry-run failure carries the same fields (verification runs
    before the dry-run short-circuit)
  - task finalize failure (TASK_FINALIZE_NOT_ELIGIBLE /
    TASK_FINALIZE_WRITE_REFUSED / WRITES_AUDIT_STRICT_FAILED) carries the same
    three fields via a synthesized pseudo-check; data.write_audit is unchanged
  - suggested_next_command is produced by a deterministic finite switch with no
    free-form text; docs/cli-contract.md states it is a "rerun after fixing"
    command that does not imply an unchanged rerun will succeed
  - the core helper defines a structural FailureCheckLike and does not import
    CheckResult from src/commands/verify.ts (no core → commands dependency)
  - no new error codes; the error-code-surface test is unaffected
  - both i18n locales (en-US, ja-JP) gain the new task.failure labels
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
tasks:
  - id: P32-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      RFC + phase registration (bootstrap).

      Lands design/decisions/failure-clarity-rfc.md (status: accepted) and
      bootstraps the phase (phase YAML + roadmap entry, weight 8) as
      protected-path bootstrap writes NOT listed in `writes:`, per the
      P28/P29/P30/P31 precedent (writes carries the RFC + CHANGELOG only; the
      phase YAML is in acceptance_refs and design/roadmap.yaml is excluded as a
      plan-lint --strict protected path).
    decision_refs:
      - design/decisions/failure-clarity-rfc.md
    reads:
      - src/cli/commands/task.ts
      - src/commands/task-complete.ts
      - src/commands/task-finalize.ts
      - src/commands/verify.ts
    writes:
      - design/decisions/failure-clarity-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P32-failure-clarity.yaml
  - id: P32-T1
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Core FailureSummary helper (pure, no i18n, no dependency on commands/).

      - New src/core/failure/failure-summary.ts defining the structural type
        FailureCheckLike = { name: string; ok: boolean; reason?: string } and
        FailureSummary = { failed_checks: string[]; first_failure: { name;
        reason } | null; suggested_next_command: string | null }.
      - buildFailureSummaryFromChecks(checks: FailureCheckLike[], taskId):
        failed_checks = names of !ok checks (verify array order preserved);
        first_failure = first !ok check { name, reason: reason ?? "" } or null;
        suggested_next_command via the deterministic resolver. Does NOT import
        CheckResult from src/commands/verify.ts — CheckResult is structurally
        assignable to FailureCheckLike and passed in from the CLI layer.
      - buildFailureSummaryFromFinalizeCode(code, taskId, reason): synthesizes a
        single pseudo-check per finalize failure code.
      - Deterministic resolvers (finite switch, no free-form text):
        commands/decision/progress_event → `code-pact task complete <id>`;
        task_status → `code-pact task finalize <id> --write`;
        TASK_FINALIZE_NOT_ELIGIBLE → `code-pact task complete <id>`;
        TASK_FINALIZE_WRITE_REFUSED / WRITES_AUDIT_STRICT_FAILED → null.
      - Unit tests: empty/all-ok → null summary; single/multiple failing checks
        (first wins, order preserved); each check name → correct command; each
        finalize code → correct synthesized name + command; unknown → null.
    decision_refs:
      - design/decisions/failure-clarity-rfc.md
    reads:
      - src/commands/verify.ts
      - src/commands/task-finalize.ts
    writes:
      - src/core/failure/failure-summary.ts
      - tests/unit/core/failure/failure-summary.test.ts
  - id: P32-T2
    type: feature
    ambiguity: low
    risk: medium
    context_size: large
    write_surface: high
    verification_strength: strong
    expected_duration: long
    status: planned
    description: |
      Wire `task complete` failure clarity + shared CLI render helper + i18n.

      - New src/cli/render/failure-summary.ts: renderFailureSummaryLines(m,
        summary) returns 0–3 stderr lines (cause → also-failed when >1 →
        rerun-after-fixing), reused by complete and finalize.
      - task complete VERIFICATION_FAILED handler: build the FailureSummary once
        from err.checks; add data.failed_checks / data.first_failure /
        data.suggested_next_command (data.verify.checks unchanged); print the
        rendered lines to stderr below the existing generic message. Dry-run
        failure is automatically covered (verify runs before the short-circuit).
      - i18n: add a task.failure sub-block to BOTH en-US.ts and ja-JP.ts:
        cause(name, reason), otherChecks(names), rerunAfterFixing(cmd). Label is
        "rerun after fixing:" / "修正後に再実行:" (not "next:") so an agent does
        not read it as "just rerun".
      - docs/cli-contract.md: document the three new fields on the complete
        failure envelope and state that suggested_next_command is a rerun-after-
        fixing command (does not imply an unchanged rerun will succeed).
      - Tests: extend tests/integration/cli.test.ts VERIFICATION_FAILED case to
        assert the three fields (incl. a --dry-run --json variant) and a human
        variant asserting the new stderr lines.
    decision_refs:
      - design/decisions/failure-clarity-rfc.md
    reads:
      - src/cli/commands/task.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
    writes:
      - src/cli/commands/task.ts
      - src/cli/render/failure-summary.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - docs/cli-contract.md
      - tests/integration/cli.test.ts
  - id: P32-T3
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      Wire `task finalize` failure clarity (reuses T2's render helper + i18n).

      - task finalize handlers for TASK_FINALIZE_NOT_ELIGIBLE,
        TASK_FINALIZE_WRITE_REFUSED, and WRITES_AUDIT_STRICT_FAILED: build the
        FailureSummary via buildFailureSummaryFromFinalizeCode (synthesized
        pseudo-checks eligibility / write_safety / write_audit; reason =
        err.message), add the three fields to each failure envelope's data /
        extraData (data.write_audit unchanged), and print the rendered lines.
        Guard the human render on the finalize code (the default branch
        re-throws) so unrelated errors are untouched.
      - docs/cli-contract.md: document the three fields on the finalize failure
        envelope.
      - Tests: extend tests/integration/task-finalize-audit-strict.test.ts to
        assert first_failure.name === "write_audit" and
        suggested_next_command === null; add a NOT_ELIGIBLE assertion
        (first_failure.name === "eligibility", suggested_next_command ===
        `code-pact task complete <id>`).
      - CHANGELOG entry for the completed P32 feature.
    decision_refs:
      - design/decisions/failure-clarity-rfc.md
    reads:
      - src/cli/commands/task.ts
      - src/commands/task-finalize.ts
      - tests/integration/task-finalize-audit-strict.test.ts
    writes:
      - src/cli/commands/task.ts
      - tests/integration/task-finalize-audit-strict.test.ts
      - docs/cli-contract.md
      - CHANGELOG.md
