    description: |
      RFC acceptance. Register P13 in design/roadmap.yaml. Land the
      design/decisions/planning-ux-init-hardening-rfc.md document
      with `Status: proposed`. Flip the RFC status line to
      `accepted` in a follow-up commit on this PR before merge per
      the RFC lifecycle. No code change in this task — its purpose
      is to lock the design decisions (sample-phase TUTORIAL
      rename + tutorial tasks, task add non-interactive trigger
      semantics, no-new-status-flag decision, partial-flags
      CONFIG_ERROR semantics, suggested_next_steps additive
      fields, error-code reuse policy, P10 field validation
      responsibility, P14 deferrals) before any src/ touches.
  - id: P13-T2
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P13-T1
    decision_refs:
      - design/decisions/planning-ux-init-hardening-rfc.md
    reads:
      - src/commands/init.ts
      - src/commands/init-wizard.ts
      - src/cli.ts
      - src/core/schemas/phase.ts
      - src/core/schemas/task.ts
    writes:
      - src/cli.ts
      - src/commands/init.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/unit/commands/init.test.ts
      - tests/integration/json-stdout.test.ts
    acceptance_refs:
      - design/decisions/planning-ux-init-hardening-rfc.md
    description: |
      `init --sample-phase` flag + TUTORIAL rename. Adds the
      `--sample-phase` boolean to cli.ts parseArgs and threads it
      through to `InitCoreOptions.createSamplePhase` (already
      exists internally). Rewrites `writeSamplePhase()` in init.ts
      to create the phase as `id: TUTORIAL`, `name: Tutorial
      walkthrough`, with two tutorial tasks (TUTORIAL-T1,
      TUTORIAL-T2 with `depends_on: [TUTORIAL-T1]`) — both
      wizard mode and the new flag produce this same artifact.
      Preserves existing TTY-wizard default-yes prompt behaviour;
      `--sample-phase` is the non-interactive opt-in and the
      wizard-mode prompt-skipping override (per the RFC's
      generation-policy table). Updates i18n strings for the
      wizard prompt and console output. No new error codes;
      ALREADY_EXISTS / DUPLICATE_PHASE_ID handling is preserved
      (the existing `writeSamplePhase` swallows
      DUPLICATE_PHASE_ID; same here). Existing test fixtures
      referencing P1-T1 in unrelated tests are not touched —
      only init/wizard-specific tests are updated.
  - id: P13-T3
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P13-T1
    decision_refs:
      - design/decisions/planning-ux-init-hardening-rfc.md
    reads:
      - src/commands/task-add.ts
      - src/cli.ts
      - src/core/schemas/task.ts
    writes:
      - src/commands/task-add.ts
      - src/cli.ts
      - src/i18n/en-US.ts
      - src/i18n/ja-JP.ts
      - tests/unit/commands/task-add.test.ts
      - tests/integration/json-stdout.test.ts
      - docs/cli-contract.md
    acceptance_refs:
      - design/decisions/planning-ux-init-hardening-rfc.md
    description: |
      `task add` non-interactive flags. Adds strictParse with
      `--description`, `--type`, `--id`, plus the six readiness
      fields (`--ambiguity` / `--risk` / `--context-size` /
      `--write-surface` / `--verification-strength` /
      `--expected-duration`) and the five P10 repeatable fields
      (`--depends-on`, `--decision-ref`, `--read`, `--write`,
      `--acceptance-ref`). Newly added tasks are always written
      with `status: planned`; `--status` is intentionally NOT
      exposed in P13. Historical or already-done tasks must use
      `phase import`, preserving the P11/P12 contract that
      progress is operational fact and design `done` results
      from `task finalize` / `phase reconcile`. Presence of
      `--description` is the trigger that switches off the
      wizard; `--type` becomes required in that mode.
      Non-interactive-only flags provided WITHOUT `--description`
      raise CONFIG_ERROR (never silently fall through to the
      wizard, never silently ignore the flags). TTY behaviour
      unchanged when no `--description` and no non-interactive
      flag is provided. P10 field flags are stored after basic
      string validation only; existence checks, glob validity,
      unsafe-path detection, and protected-path advisories
      remain `plan lint`'s responsibility. Reuses the existing
      atomic-write contract in `runTaskAdd`. Reuses
      PHASE_NOT_FOUND / DUPLICATE_TASK_ID / CONFIG_ERROR; no
      new error codes. JSON envelope unchanged. Adds the command
      to tests/integration/json-stdout.test.ts with happy-path
      and CONFIG_ERROR cases (including the partial-flags
      branch). Updates docs/cli-contract.md `task add` section.
  - id: P13-T4
