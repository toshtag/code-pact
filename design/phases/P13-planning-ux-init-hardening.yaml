      - tests/unit/commands/phase-import.test.ts
      - tests/integration/json-stdout.test.ts
      - docs/cli-contract.md
    acceptance_refs:
      - design/decisions/planning-ux-init-hardening-rfc.md
    description: |
      Planning command UX guidance. Adds `suggested_next_steps:
      string[]` as a sibling field in `plan prompt`'s
      PlanPromptResult and as a top-level field in `phase
      import`'s PhaseImportResult. For `plan prompt`: emit the
      AI-assisted planning sequence (run prompt → phase import →
      plan lint → phase runbook). For `phase import`: emit the
      post-import validation sequence (plan lint → phase runbook
      <imported-phase-id> → task runbook <first-task>). Unit
      tests assert the new field's contents are stable across
      brief/constitution-present/absent matrix. Integration
      tests assert the JSON envelope still parses and the new
      field is always present (even as []). docs/cli-contract.md
      gains the additive-field notice on both command sections.
