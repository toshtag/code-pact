id: P13
name: Planning UX and init hardening
weight: 15
confidence: high
risk: low
status: planned
objective: |
  Close the planning-UX and init-bootstrap gaps that P9 and P12
  explicitly deferred. Add `init --sample-phase` as an explicit
  opt-in flag so non-interactive bootstrap can create the tutorial
  artifact. Add non-interactive flags to `task add` so scripted
  planning paths can declare tasks without a TTY. Add additive
  `suggested_next_steps` fields to `plan prompt` and `phase import`
  output so the recommended sequence is CLI-emitted rather than
  docs-only. Rename the sample phase from `P1` to `TUTORIAL` (with
  1–2 tutorial tasks added) so it no longer collides with the
  natural first user phase and so `task runbook TUTORIAL-T1` can
  be demoed end-to-end. Every change is additive on the CLI
  contract: no new error codes, no new schema fields, no new
  commands, and no mutation to existing Stable JSON envelopes.
  Larger UX changes (`plan brief` / `plan constitution`
  non-TTY paths, governance / lock / path policy, reserved-id
  hard enforcement) are explicitly deferred to P14 governance.
non_goals:
  - any change to `task runbook` / `phase runbook` semantics
  - any change to `task complete` / `task finalize` / `phase reconcile` semantics
  - any change to `progress.yaml` append-only contract
  - any new public error code (existing PHASE_NOT_FOUND / DUPLICATE_TASK_ID / CONFIG_ERROR / ALREADY_EXISTS / ALREADY_INITIALIZED are reused)
  - any new task or phase schema field
  - any new command (only additive flags + additive output fields on existing commands)
  - "`plan brief` / `plan constitution` non-TTY alternatives (docs-only mention; new code in P14 or later)"
  - reserved-id (`TUTORIAL`) hard enforcement (P14 governance candidate)
  - protected-path hard enforcement (P14)
  - advisory locks / concurrent safety (P14)
  - LLM / RAG / MCP / multi-agent orchestration / scheduler / issue-tracker integration (excluded from the v1.x window)
  - "`task next` / `phase next` sugar aliases (deferred per P12 RFC)"
  - "bundling `recommend` into `task runbook` (deferred per P12 RFC)"
  - "`task add` dry-run mode (deferred — scope creep)"
  - "`task add --status` flag (not exposed in P13; newly added tasks always status: planned; historical / done state via `phase import`)"
  - dropping P1 backward-compat from existing projects (only NEW init runs produce TUTORIAL; existing P1-welcome.yaml in old projects is untouched)
definition_of_done:
  - design/decisions/planning-ux-init-hardening-rfc.md exists and is marked accepted
  - design/roadmap.yaml lists P13
  - design/phases/P13-planning-ux-init-hardening.yaml exists with this objective and tasks list
  - "`init --sample-phase` ships as Stable (v1.4+) and works with `init --non-interactive --sample-phase --locale <l> --agent <a>` to bootstrap a tutorial artifact"
  - "`task add <phase-id> --description \"...\" --type <type> [optional flags]` works without a TTY and produces `{ ok: true, data: { phaseId, taskId, phasePath } }`, identical envelope shape to the wizard path; reuses existing PHASE_NOT_FOUND / DUPLICATE_TASK_ID / CONFIG_ERROR; ships as Stable (v1.4+); newly added tasks are always written with `status: planned` (no `--status` flag)"
  - "`task add` non-interactive flags provided without `--description` raise CONFIG_ERROR rather than silently falling through to the wizard or silently ignoring the flags"
  - "`plan prompt --json` gains an additive `data.suggested_next_steps: string[]` field"
  - "`phase import --json` gains an additive `data.suggested_next_steps: string[]` field"
  - "sample phase artifact uses `id: TUTORIAL` with 1–2 minimal tutorial tasks (`TUTORIAL-T1` always, `TUTORIAL-T2` with `depends_on: [TUTORIAL-T1]` to demo P10 / P12); both wizard mode and `--sample-phase` produce the same artifact"
  - TTY wizard mode keeps its existing default-yes behaviour for the sample-phase prompt; explicit opt-in (`--sample-phase`) applies only to non-interactive mode (and acts as a prompt-skipping override in wizard mode)
  - "`KNOWN_CODES.public` is unchanged (no new error codes)"
  - "`tests/integration/pack-byte-identical.test.ts` continues to pass (no `task context` pack change in P13)"
  - new flag invocations appear in `tests/integration/json-stdout.test.ts` so the Stable JSON-only stdout regression net covers them
  - "`docs/migration.md` gains a v1.3.x → v1.4.0 section noting the TUTORIAL rename as the sole behaviour change to wizard-generated artifacts, plus the new flag surfaces"
  - "`docs/concepts/sample-phase.md` is updated to TUTORIAL naming + tutorial-tasks shape"
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js plan normalize --check --json
    - node dist/cli.js plan analyze --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
tasks:
