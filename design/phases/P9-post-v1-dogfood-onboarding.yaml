id: P9
name: Post-v1.0 Dogfood Close & Onboarding Baseline
weight: 20
confidence: high
risk: low
status: planned
objective: |
  Close the post-v1.0 dogfood thread carried by P4 and establish an
  onboarding baseline so a first-time user can reach a working install
  in roughly ten minutes via one of three documented paths: a tutorial
  path, a manual path (plan brief/constitution + phase add + task add),
  and an AI-assisted path (plan prompt + phase import). This is a docs
  / community / corpus phase, not an init wizard rewrite — the init
  wizard TUI rework lives in P12. The Stable (v1.0) CLI surface is
  unchanged; this phase only adds documentation, GitHub templates, a
  minimal seed corpus under design/decisions/ and design/rules/, and
  the P4 status flip that formally closes the dogfood phase.
non_goals:
  - exhaustive backfill of design decisions or rules (seed corpus only)
  - full multi-language docs translation (Japanese getting-started only;
    README / migration translations are deferred)
  - replacing README with a generated site (no site generator)
  - init wizard TUI rework or question redesign (handled by P12)
  - Task Readiness Schema implementation (P10)
  - Finalization / Reconciliation commands (P11)
  - Lightweight runbook (task run / phase close) (P12)
  - Adapter contract depth / autonomy policy (P13)
  - Design governance / advisory locks / broader path safety (P14)
  - any change to Stable (v1.0) CLI flags, exit codes, or JSON envelope
    shapes
definition_of_done:
  - design/roadmap.yaml lists P9
  - design/phases/P9-post-v1-dogfood-onboarding.yaml exists
  - design/phases/P4-stabilize.yaml has status `done`
  - README.md is slim and acts as a link hub (30-second tour + pointers)
    rather than a comprehensive guide
  - docs/getting-started.md exists and documents the tutorial path,
    manual path, and AI-assisted path side by side
  - docs/workflows/greenfield.md and docs/workflows/brownfield-feature.md
    exist and link to docs/getting-started.md
  - docs/concepts/sample-phase.md explains what `sample phase` is and
    when to use it
  - docs/ja/getting-started.md exists (Japanese getting-started)
  - .github/ISSUE_TEMPLATE/ contains at least one bug-report and one
    feature-request template
  - .github/pull_request_template.md exists
  - docs/community.md exists and documents the Discussions intent plus
    the contributor entry path
  - design/decisions/ contains at least one example decision entry
  - design/rules/ contains at least one example rule entry
  - a fresh checkout walking docs/getting-started.md can complete each
    of the three documented paths (tutorial / manual / AI-assisted)
    end-to-end without consulting source code
  - no change to Stable (v1.0) CLI behavior is shipped under this phase
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js plan normalize --check --json
    - node dist/cli.js plan analyze --json
    - node dist/cli.js doctor --json
    - node dist/cli.js validate
    - node dist/cli.js adapter list --json
tasks:
  - id: P9-T1
    type: refactor
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: medium
    expected_duration: short
    status: planned
    description: |
      P9 baseline + P4 dogfood close. Flip design/phases/P4-stabilize.yaml
      status to `done` so the dogfood phase is formally closed in the
      design ledger (a corresponding `done` event in
      .code-pact/state/progress.yaml is optional and not required for
      this task — P4's tasks predate the v0.6 state machine). Ensure
      design/roadmap.yaml lists P9 (this PR added it; T1 only confirms
      and runs plan lint / plan analyze cleanly afterward). No docs
      content is created in this task; that begins at T2.
  - id: P9-T2
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: medium
    status: planned
    description: |
      README slim + docs/getting-started.md. Reduce README.md to a
      30-second tour plus a link hub (Status, Install, pointers to
      docs/getting-started.md and docs/workflows/*). Add
      docs/getting-started.md as the canonical first-30-minutes entry
      point, documenting all three paths side by side:
        - tutorial path: init → tutorial/sample phase → task context
          → task complete
        - manual path: init → plan brief/constitution → phase add
          → task add → adapter install → task context → task complete
        - AI-assisted path: init → plan brief/constitution → plan
          prompt → phase import → adapter install → task context
          → task complete
      Every CLI invocation shown must match an actual command in
      src/commands/. No CLI behavior change.
  - id: P9-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: medium
    expected_duration: medium
    status: planned
    description: |
      Workflow and concept docs. Add docs/workflows/greenfield.md
      (new project, no existing code) and
      docs/workflows/brownfield-feature.md (existing project adopting
      code-pact). Add docs/concepts/sample-phase.md explaining the
      meaning of `sample phase`, when the init wizard offers it, and
      when to keep vs delete it. All three documents link to
      docs/getting-started.md as the canonical entry and to each other
      where relevant. Do not duplicate getting-started content —
      these documents are scenario- and concept-specific.
  - id: P9-T4
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: weak
    expected_duration: short
    status: planned
    description: |
      Japanese getting-started. Add docs/ja/getting-started.md as a
      Japanese counterpart to docs/getting-started.md. Translate the
      three paths (tutorial / manual / AI-assisted) and keep the
      command examples identical (CLI text is English). Add a top-of-
      file note that this is the only Japanese onboarding doc at this
      time and link back to the English README / docs/getting-started.md
      for everything else. Do not translate README or migration.md
      in this task — that is a separate phase decision.
  - id: P9-T5
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: medium
    verification_strength: weak
    expected_duration: short
    status: planned
    description: |
      Community entry. Add .github/ISSUE_TEMPLATE/ with at least one
      bug-report template and one feature-request template. Add
      .github/pull_request_template.md with a short checklist (verify
      commands ran, no Stable (v1.0) contract change, docs updated if
      user-visible). Add docs/community.md documenting the intent to
      open GitHub Discussions, the contributor entry path
      (CONTRIBUTING.md if it exists or a stub if not), and the rule
      that re-introducing items from the meta-roadmap excluded list
      requires a new RFC and explicit scope tradeoff.
  - id: P9-T6
    type: docs
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: weak
    expected_duration: short
    status: planned
    description: |
      Seed corpus for design/decisions/ and design/rules/. The
      directories are currently empty in this repo, which means the
      context-quality gate in src/core/pack/index.ts has no content
      to surface even when a task declares context_size: large or
      write_surface: high. Add at least one realistic example file
      to each directory drawn from actual v1.0 decisions already
      documented elsewhere (e.g. the dist-tag / stability taxonomy
      decision; a coding-style or commit-style rule). Goal is to make
      the gate visible and to give P10 a non-empty corpus to test
      against — exhaustive backfill of historical decisions or rules
      is explicitly not in scope.
  - id: P9-T7
    type: test
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: |
      End-to-end onboarding verification. From a fresh checkout
      (clean working tree, no `.code-pact/` state), walk
      docs/getting-started.md and complete each of the three
      documented paths (tutorial, manual, AI-assisted) in temporary
      directories. Record any step where the documentation diverges
      from actual CLI behaviour and either fix the docs in this task
      or open a follow-up issue if the gap is a real bug. The
      acceptance bar is that no path requires reading source code or
      docs/cli-contract.md to complete. Add a short report (or update
      docs/dogfood.md) summarising what was walked and what was
      adjusted. No new tests need to land in tests/ for this task —
      verification is a documented dogfood walkthrough.
