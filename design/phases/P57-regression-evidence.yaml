id: P57
name: Regression Evidence
weight: 5
confidence: medium
risk: medium
status: done
objective: >
  Surface static advisory guidance for bugfix tasks to declare regression
  evidence such as tests, fixtures, or reproduction artifacts.
non_goals:
  - Require every documentation or refactor task to add a new test.
  - Treat a passing manual command as sufficient regression evidence for a
    bugfix.
  - Store full command output inside progress events when an evidence reference
    exists.
  - Link runtime failure fingerprints to regression artifacts.
  - Add structured completion evidence, task evidence commands, terminal repair
    summaries, or runtime regression artifacts.
definition_of_done:
  - "The advisory applies only to tasks with `type: bugfix`."
  - Static evidence exists only when `writes` names a test, fixture, or
    reproduction artifact, or when `acceptance_refs` names an existing test,
    fixture, or reproduction artifact.
  - Path classification is closed to `**/*.test.*`, `**/*.spec.*`,
    `**/*_test.*`, `**/test_*.*`, `tests/**`, `test/**`, `__tests__/**`,
    `spec/**`, `specs/**`, `fixtures/**`, `reproductions/**`, `**/tests/**`,
    `**/test/**`, `**/__tests__/**`, `**/spec/**`, `**/specs/**`,
    `**/fixtures/**`, and `**/reproductions/**`.
  - "`acceptance_refs` are for existing evidence files; new tests, fixtures, or
    reproduction artifacts belong in `writes`."
  - Bugfix completion guidance names accepted regression evidence forms.
  - The advisory checks only static acceptance declarations and does not claim
    to prove that a test prevents a runtime failure.
  - Missing regression evidence is surfaced as an advisory first, not a hard
    block.
  - Agent guidance explains how to report evidence without duplicating large
    command output.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:full
tasks:
  - id: P57-T1
    type: architecture
    ambiguity: low
    risk: medium
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: Define accepted static regression evidence declarations and
      explicitly defer runtime fingerprint linkage.
    depends_on:
