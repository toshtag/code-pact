id: P53
name: Recommended Context Budget Application
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Allow task preparation to apply the deterministic recommended context budget
  explicitly after reversible context deferral makes omitted context recoverable.
non_goals:
  - Change the default no-flag task-prepare or task-context behavior.
  - Apply a custom agent profile budget name as the recommended profile.
  - Use tokenizers, provider APIs, embeddings, ranking, or model-generated summaries.
definition_of_done:
  - "`task prepare --recommended-context-budget` uses the same recommendation returned in the response."
  - "`--budget-bytes`, `--context-budget <profile>`, and `--recommended-context-budget` are mutually exclusive; multiple budget modes are `CONFIG_ERROR`."
  - Existing custom context-budget profile names, including `auto`, keep their current meaning.
  - "Agent profile opt-in uses `context_budget.application_mode: recommended`; omitted or `manual` means no implicit budget."
  - "Agent profile schema is explicit: omitted application mode means manual; manual requires non-empty profiles; recommended may omit profiles; empty `context_budget: {}` remains invalid."
  - Existing `context_budget.default_profile` semantics do not change.
  - "`default_profile` is valid only when it names an existing profile."
  - "`task prepare --json` reports `applied_context_budget` with source, profile when applicable, and budget bytes."
  - "`applied_context_budget.source` is a closed enum: none, explicit_bytes, explicit_profile, recommended_cli, or recommended_agent_profile."
  - "`commands.context` uses the resolved byte value, for example `--budget-bytes 60000`, so it reproduces the actual pack build."
  - "`recommendation.contextFit`, the actual pack build, `applied_context_budget`, and `commands.context` agree in integration coverage."
  - Recommended mode honors an agent profile override for the recommended standard profile name; custom-only profile names are never selected by the recommendation.
  - Explicit CLI flags always override agent profile recommended mode.
  - Auto budget resolution uses the recommendation already produced in the same call and does not load the agent profile twice.
  - Done, blocked, and unmet-dependency early returns do not perform auto budget resolution or extra context I/O.
  - The commands dictionary remains explicit about the selected budget mode.
  - Agent profiles can opt into recommended budget mode without changing legacy projects.
  - Oversized packs still fail honestly when the recommended budget cannot fit.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
