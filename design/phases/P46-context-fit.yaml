id: P46
name: >
  Context Fit — named budget profiles, recommended budget, explain metrics, and
  readiness advisories layered additively on the P24 --budget-bytes mechanism
weight: 3
confidence: high
risk: low
status: done
objective: |
  Context Fit is the future RFC that P24 (context-budget-rfc.md) explicitly
  deferred: P24 §Non-goals says agent-profile-derived default budget is "a
  future RFC". This is that RFC. It makes context pack size controllable,
  explainable, deterministic, and ergonomic by building FOUR additive layers on
  top of the existing --budget-bytes enforcement — never by adding compression,
  summarization, tokenizers, a proxy, or network behavior:

    - (a) Ergonomic — named budget profiles on the agent profile plus a
      --context-budget <profile> flag that resolves to a byte budget and reuses
      the unchanged P24 elision path (P47).
    - (b) Recommendation — an optional additive contextFit field on
      RecommendResultV2, surfaced through task prepare, naming a recommended
      standard profile + its bytes + a one-line reason (P48).
    - (c) Audit — additive explain metrics (natural_bytes / final_bytes /
      saved_bytes / saved_ratio / minimum_achievable_bytes / elided_sections) on
      task context --explain --json (P49).
    - (d) Readiness — four affects_exit:false advisories under
      plan lint --include-quality that flag context-bloat risk before run (P50).

  Context Fit also records the product principle behind these layers: Code Pact
  should prefer local deterministic computation over agent reasoning whenever the
  tool can derive the same fact itself, because avoiding unnecessary agent input
  and reasoning is the safest form of token/cost reduction — it removes work, not
  task-relevant evidence. The RFC's Reduction taxonomy draws the line: safe
  deterministic avoidance is preferred (and may be default where it already is);
  loss-bearing reduction of pack evidence stays opt-in, explainable, and never
  silent. The default no-flag pack content stays byte-identical regardless.

  P46 is the BOOTSTRAP phase only: it lands the RFC, registers the phase, and
  adds the roadmap entry. It changes NO src/ and NO public docs/ behavior text —
  those land with the phases that ship the behavior (P47-P50). The default
  no-flag context pack stays byte-identical; every JSON change is additive;
  advisories never affect exit code; the P24 elision order / byte measurement /
  CONTEXT_OVER_BUDGET are read, not rewritten.

  Bootstrap write discipline follows the P28-P43 protected-path precedent: a
  task's writes carries the RFC (+ the decisions index) only; the phase YAML is
  in acceptance_refs and design/roadmap.yaml is the excluded plan-lint --strict
  protected path, so neither is listed in writes. No CHANGELOG entry — nothing
  user-facing ships in an RFC-only PR (the P43-T0 precedent).

  The RFC opens at status: proposed and flips to accepted only after a reviewer
  confirms it carries no implementation claim for unshipped behavior, no leakage
  of any non-code-pact lineage, and no over-binding "committed plan" language;
  P47-P50 are recorded as accepted DIRECTION and implementation guardrails, not
  a frozen line-level plan. P51 (deterministic structural compaction) and P52
  (external context sources) are deferred to separate future RFCs.

  Design recorded in design/decisions/context-fit-rfc.md.
non_goals:
  - Implementing any of the four layers — P46 is RFC + phase + roadmap
    registration only. P47-P50 ship the behavior in their own PRs, gated on this
    RFC being accepted.
  - Any src/ edit, any CLI flag, any schema field, any JSON-contract change, or
    any error/lint code in this phase.
  - Any public docs/ behavior-description edit (cli-contract / agent-contract /
    troubleshooting / task-readiness-fields). Public docs describe shipped
    behavior and are updated by the phase that ships each layer, not here.
  - A CHANGELOG entry — an RFC-only PR ships no user-facing behavior (the P43-T0
    bootstrap precedent does not touch CHANGELOG).
  - Any change to the P24 elision order, its P28 conditional eligibility, the
    Buffer.byteLength byte measurement, or the CONTEXT_OVER_BUDGET contract.
  - Any P51 (structural compaction) or P52 (external context) work — those are
    explicitly deferred to separate future RFCs.
definition_of_done:
  - design/decisions/context-fit-rfc.md exists, opens at Status proposed, and
    defines the three standard profile names (tight/balanced/wide) with their
    built-in fallback bytes (30000/60000/120000) as the single source of truth,
    the four additive layers mapped to P47-P50, the byte-identical /
    additive-JSON / affects_exit:false invariants, the shared-floor invariant
    for minimum_achievable_bytes, the local-only network stance, and P51/P52 as
    deferred separate RFCs
  - the RFC flips to Status accepted only after local validation passes AND a
    reviewer confirms no unshipped-behavior implementation claims, no
    non-code-pact lineage leakage, and no over-binding committed-plan language;
    P46 counts as done only after the accepted RFC has landed
  - the phase is registered (this phase YAML + a design/roadmap.yaml entry at
    weight 3) following the protected-path bootstrap precedent — T0 writes carry
    the RFC only (the decisions index row is added at T1 with acceptance); the
    phase YAML is in acceptance_refs; design/roadmap.yaml is the excluded
    protected-path bootstrap write; no task declares either protected path in
    writes
  - no src/ change and no public docs/ behavior text change land in this phase;
    node dist/cli.js validate --json and node dist/cli.js plan lint
    --include-quality --strict --json are both clean (no errors; advisories
    permitted)
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
