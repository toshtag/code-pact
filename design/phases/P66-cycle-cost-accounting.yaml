id: P66
name: Closed-Harness Token Reduction Evidence
weight: 3
confidence: high
risk: low
status: planned
requires_decision: true
objective: >
  Measure Code Pact stdout bytes and retry counts in deterministic closed
  scenarios without adding production cycle telemetry, then decide whether
  aggregation, retrieval, consolidation, or backend work should proceed.
non_goals:
  - Add production cycle metrics storage.
  - Add `--track-cycle`, `--cycle-ref`, `memory cost`, cycle metrics status,
    cycle metrics prune, or doctor integration.
  - Instrument production CLI stdout.
  - Convert bytes to provider tokens or prices.
  - Call model APIs or external telemetry services.
  - Store source, logs, prompts, responses, reasoning, or raw stdout in tracked
    design artifacts.
  - Change verification, progress, Evidence, Failure Capsule, repairPolicy, or
    context packs.
definition_of_done:
  - P69-P72 remain historical design records; production cycle metrics runtime
    is not part of the current implementation target.
  - The harness executes the built CLI as child processes with fixed fixtures,
    fixed command sequences, no network, and no model or Agent runtime.
  - The harness measures stdout bytes with
    `Buffer.byteLength(stdout, "utf8")` for each invocation.
  - Scenarios cover first-pass success, verification failure then repair then
    success, repeated same-fingerprint failure then success, deferred context
    retrieval, Evidence retrieval, exact-match signal absent, and exact-match
    signal present.
  - The tracked evidence records total_code_pact_stdout_bytes, command_count,
    verification_count, failure_count, same_fingerprint_repeat_count,
    context_retrieval_count, evidence_retrieval_count, and prior_signal_count.
  - P66-T2 records one ADR with summarized evidence and go/no-go decisions for
    P64, P65, P67, and P68.
  - P64 proceeds only when exact-match evidence shows enough retained hits or
    repeated same-fingerprint failures and the prior-local signal bytes are
    smaller than repeated failure-envelope bytes.
  - P65 proceeds only when exact-match signal alone fails in enough cases,
    bounded detail would have changed the decision, and expected retry-byte
    savings exceed retrieval bytes.
  - >-
    P67 proceeds only with measured store pressure: repeated 80% cap pressure
    or retention churn above 25% across at least 100 writes.
  - P68 proceeds only after P67 is accepted and actual storage pressure is
    measured.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P66-T1
    type: feature
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    depends_on:
      - P63-T3
    description: Implement deterministic closed-loop measurement harness.
    reads:
      - tests/helpers/cli.ts
      - tests/integration/json-stdout.test.ts
      - tests/fixtures/**
      - package.json
    writes:
      - tests/harness/token-efficiency/**
      - tests/fixtures/token-efficiency/**
    acceptance_refs:
      - tests/integration/json-stdout.test.ts
  - id: P66-T2
    type: architecture
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: planned
    depends_on:
      - P66-T1
    description: Record closed-harness evidence and decide follow-up phases.
    reads:
      - design/decisions/P63-T1-token-reduction-memory-roadmap-rfc.md
      - design/phases/P63-exact-match-local-failure-recall.yaml
      - tests/helpers/cli.ts
      - tests/integration/json-stdout.test.ts
    writes:
      - design/decisions/P66-T2-token-reduction-evidence-rfc.md
    acceptance_refs:
      - design/decisions/P63-T1-token-reduction-memory-roadmap-rfc.md
