id: P66
name: Closed-Harness Token Reduction Evidence
weight: 3
confidence: high
risk: low
status: done
objective: >
  Measure Code Pact stdout bytes and retry counts in deterministic closed
  scenarios without adding production cycle telemetry, then decide whether
  aggregation, retrieval, consolidation, or backend work should proceed.
non_goals:
  - Add production cycle metrics storage.
  - Add `--track-cycle`, `--cycle-ref`, `memory cost`, cycle metrics status,
    cycle metrics prune, or doctor integration.
  - Instrument production CLI stdout.
  - Convert bytes to provider tokens or prices.
  - Call model APIs or external telemetry services.
  - Store source, logs, prompts, responses, reasoning, or raw stdout in tracked
    design artifacts.
  - Change verification, progress, Evidence, Failure Capsule, repairPolicy, or
    context packs.
definition_of_done:
  - P69-P72 remain historical design records; production cycle metrics runtime
    is not part of the current implementation target.
  - The harness executes the built CLI as child processes with fixed fixtures,
    fixed command sequences, no network, and no model or Agent runtime.
  - The harness measures stdout bytes with `Buffer.byteLength(stdout, "utf8")`
    for each invocation.
  - Scenarios cover first-pass success, verification failure then repair then
    success, repeated same-fingerprint failure then success, deferred context
    retrieval, Evidence retrieval, exact-match signal absent, and exact-match
    signal present.
  - The tracked evidence records signal_field_incremental_bytes,
    repeated_failure_envelope_bytes, default-output compatibility, first-failure
    signal omission, repeat-failure signal presence, and
    break_even_avoided_repeat_count.
  - Fixture exact-match hit count, fixture repeat rate, and fixture success
    count are scenario-design outputs, not evidence of real-world frequency.
  - P66-T2 records one ADR with summarized evidence and go/no-go decisions for
    P64, P65, P67, and P68.
  - P66-T2 computes break_even_avoided_repeat_count as ceil(signal bytes
    accumulated / one repeated failure envelope bytes) and does not claim that
    any repeat was actually avoided.
  - Without actual usage evidence from a non-synthetic concrete case or
    reproducible issue, P64, P65, P67, and P68 remain deferred.
  - P64 does not proceed from closed-harness hit count or fixture repeat rate.
  - P65 does not proceed from closed-harness hit count or fixture repeat rate.
  - P67 does not proceed from synthetic fixture frequency; it requires actual
    usage evidence of store pressure.
  - P68 proceeds only after P67 is accepted and actual storage pressure is
    measured from non-synthetic evidence.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
