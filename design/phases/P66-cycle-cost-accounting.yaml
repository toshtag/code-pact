id: P66
name: Cycle Cost Accounting
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Measure task-level total input bytes across context, deferred retrieval,
  evidence retrieval, memory retrieval, and repeated failure capsules so token
  reduction decisions use whole-cycle evidence rather than prompt-size slices.
non_goals:
  - Convert bytes to provider tokens or prices.
  - Call model APIs or external telemetry services.
  - Store source, logs, prompts, responses, or reasoning.
  - Track metrics in Git or share them between contributors.
  - Increase agent output size just to report the measurement.
  - Change verification, progress, Evidence, Failure Capsule, or repairPolicy.
definition_of_done:
  - The metric contract defines context_pack_bytes, deferred_context_retrieval_bytes, evidence_retrieval_bytes, memory_retrieval_bytes, verification_run_count, repair_attempt_count, first_pass_success, success_after_repair, same_failure_repeated, and stopped_without_success.
  - task_total_input_bytes is defined as context_pack_bytes plus deferred_context_retrieval_bytes plus evidence_retrieval_bytes plus memory_retrieval_bytes plus repeated_failure_capsule_bytes.
  - Metrics are local, bounded, disposable, and not Git-tracked.
  - P55 can consume task-level cycle evidence before deciding whether split context output is justified.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
