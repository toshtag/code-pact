id: P66
name: Cycle Cost Accounting
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Measure task-level total input bytes across context, deferred retrieval,
  evidence retrieval, memory retrieval, and repeated failure capsules so token
  reduction decisions use whole-cycle evidence rather than prompt-size slices.
non_goals:
  - Convert bytes to provider tokens or prices.
  - Call model APIs or external telemetry services.
  - Store source, logs, prompts, responses, or reasoning.
  - Track metrics in Git or share them between contributors.
  - Increase agent output size just to report the measurement.
  - Change verification, progress, Evidence, Failure Capsule, or repairPolicy.
definition_of_done:
  - The metric contract defines verification_run_count, repair_attempt_count, first_pass_success, success_after_repair, same_failure_repeated, stopped_without_success, and agent-visible emission events.
  - Tracking is opt-in; default command output remains byte-identical, includes no added fields, emits no added suggested flags, and writes no metrics.
  - task_total_agent_input_bytes is defined as the sum of returned_bytes for tracked agent-visible emission events.
  - The contract defines cycle start, cycle id, cycle continuation, cycle close,
    abandoned cycle, new attempt, retry, and task-already-done behavior; the
    cycle id is not only the task id and distinguishes multiple attempts for
    the same task.
  - Metrics distinguish bytes referenced, bytes emitted, bytes explicitly
    retrieved, and bytes actually returned by the CLI; only bytes actually
    returned to the agent are added to total input.
  - Re-running the same retrieval command counts the returned bytes again.
  - Metrics are local, bounded, disposable, and not Git-tracked.
  - Metrics are stored under `.code-pact/cache/cycle-metrics/v1/`.
  - Cycle metrics hard limits are MAX_CYCLES=256, MAX_TOTAL_BYTES=2 MiB,
    MAX_CYCLE_BYTES=32 KiB, MAX_EVENTS_PER_CYCLE=64, MAX_CYCLES_PER_TASK=8,
    and MAX_AGE_DAYS=90, with retention in age, per-task, per-cycle-event,
    global-count, then global-byte order.
  - Cycle reports distinguish complete, incomplete, and abandoned; only complete
    cycles without unobserved_external_read report task_total_agent_input_bytes.
  - P66-T3 exposes a production report surface that P55 can consume before deciding whether split context output is justified.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
