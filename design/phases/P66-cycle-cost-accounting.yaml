id: P66
name: Cycle Cost Accounting
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Measure observed Code Pact CLI stdout bytes across context, deferred
  retrieval, evidence retrieval, memory retrieval, and repeated failure
  capsules so token reduction decisions use observable whole-cycle evidence
  rather than prompt-size slices.
non_goals:
  - Convert bytes to provider tokens or prices.
  - Call model APIs or external telemetry services.
  - Store source, logs, prompts, responses, or reasoning.
  - Track metrics in Git or share them between contributors.
  - Increase agent output size just to report the measurement.
  - Change verification, progress, Evidence, Failure Capsule, or repairPolicy.
definition_of_done:
  - The metric contract defines verification_run_count, repair_attempt_count, first_pass_success, success_after_repair, same_failure_repeated, stopped_without_success, and agent-visible emission events.
  - Tracking is opt-in; default command output remains byte-identical, includes no added fields, emits no added suggested flags, and writes no metrics.
  - observed_code_pact_stdout_bytes is defined as the sum of emitted_bytes for
    tracked Code Pact CLI stdout emission events, with measurement_scope
    `code_pact_cli_stdout` and external_input_unobserved true in normal runtime.
  - Summable emission categories are task_prepare, task_context,
    context_retrieval, evidence_retrieval, memory_retrieval,
    task_complete_success, task_complete_failure, and cycle_report; control
    metadata and component breakdowns are diagnostic only and never re-added.
  - The contract defines cycle start, cycle id, cycle continuation, cycle close,
    abandoned cycle, new attempt, retry, and task-already-done behavior; the
    cycle id is not only the task id and distinguishes multiple attempts for
    the same task.
  - >-
    `--track-cycle` requires `--json`, rejects dry-run, creates a cycle only
    for runnable `task prepare` results, and reports store failure or unknown
    cycle refs as non-exit-affecting tracking warnings.
  - Metrics distinguish bytes referenced, bytes emitted by the CLI, and bytes
    explicitly retrieved; only exact serialized stdout bytes are added to
    observed_code_pact_stdout_bytes.
  - Re-running the same retrieval command counts the emitted bytes again.
  - Metrics are local, bounded, disposable, and not Git-tracked.
  - Metrics are stored under `.code-pact/cache/cycle-metrics/v1/`.
  - Cycle metrics hard limits are MAX_CYCLES=256, MAX_TOTAL_BYTES=2 MiB,
    MAX_CYCLE_BYTES=32 KiB, MAX_RETAINED_EVENT_DETAILS=64,
    MAX_CYCLES_PER_TASK=8, and MAX_AGE_DAYS=90; active cycles are not exempt
    from per-cycle limits and compact detail before losing cumulative totals.
  - Cycle reports distinguish complete, incomplete, and abandoned; only complete
    cycles without measurement_incomplete can report a complete
    observed_code_pact_stdout_bytes value, and normal runtime never claims
    external input was fully observed.
  - A single-cycle report uses `code-pact memory cost <cycle-ref>`, while
    `code-pact memory cost --task <task-id>` returns retained cycle summaries
    without latest-cycle selection or implicit cross-cycle aggregation.
  - P66-T3 exposes a production report surface that P55 can consume before deciding whether split context output is justified.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
