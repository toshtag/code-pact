id: P58
name: Local Bounded Loop Memory
weight: 6
confidence: medium
risk: medium
status: planned
objective: >
  Record bounded, local task-loop episodes under the ignored cache so later
  phases can reduce repeated failure investigation without changing context
  packs, verification gates, or correctness sources.
non_goals:
  - Inject local memory into task prepare, task context, recommend, or Failure
    Capsule output.
  - Add semantic search, embeddings, model-generated reflections, SQLite, JSONL,
    or remote sync.
  - Share loop-memory records through Git, CI, contributors, or project rules.
  - Change verification, decision gates, write audits, Evidence artifacts,
    Context artifacts, or Failure Capsule semantics.
  - Rework Stable Core and Task Delta in this phase.
definition_of_done:
  - Local loop-memory episodes are written only under
    `.code-pact/cache/loop-memory/v1/episodes/`.
  - Episodes are one-record JSON files with a strict schema and no prompt,
    response, reasoning, source, diff, stdout, stderr, or conversation content.
  - Retention is hard-bounded by age, total count, total bytes, per-task count,
    and per-fingerprint count.
  - Memory write and prune failures never change the source-of-truth task
    completion result or exit code.
  - The normal successful `task complete` JSON shape does not grow memory
    metadata.
  - Context pack bytes, recommendation output, Evidence refs, Failure Capsule
    bytes, repair policy, and adapter content remain unchanged.
  - "`memory status` and dry-run-by-default `memory prune` exist."
  - Doctor detects tracked local loop-memory files and unsafe memory roots
    without deleting them.
  - P58-T1 through P58-T4 are complete and finalized.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
