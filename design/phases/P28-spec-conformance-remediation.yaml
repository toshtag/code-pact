id: P28
name: Spec-conformance remediation — align P24/P26 implementations with their
  accepted RFCs and pin the load-bearing clauses with tests
weight: 12
confidence: high
risk: medium
status: done
objective: |
  Remediation phase, not new feature work. An external static
  review of v1.13.3 found three divergences between accepted
  RFCs and their implementations; each was re-verified against
  source before this phase opened.

  P28 brings the implementations into compliance and closes the
  structural gap that let the drift through — for a tool whose
  purpose is preventing design/implementation drift, an
  undetected self-drift is the most important finding.

  Honest priority (reflects current blast radius):

    1. T1 — P24 conditional elision. The ONLY currently
       observable behavioural divergence: `--budget-bytes` can
       drop `related_decisions` / `rules` that the RFC marks
       unelidable. Spec-critical, highest priority.
    2. T2 — P26 byte counting + per-agent denominator. Latent
       today (single enabled agent, ASCII corpus) but corrupts
       evidence fidelity the moment a non-ASCII pack or a second
       agent appears. Hygiene for an evidence tool.
    3. T3 — design-document consistency: nonexistent `writes`
       in P21/P24 phase YAML, a stale `task prepare --explain`
       smoke command in P27, overstated doctor/conformance
       wording, and P25/P27 roadmap honesty.

  No RFC is amended: `context-budget-rfc.md` and
  `evidence-harness-v2-rfc.md` are correct; the code drifted
  from them. No new public CLI surface, flag, or error code; no
  error-code rename. The no-`--budget-bytes` default path stays
  byte-identical (pack-byte-identical.test.ts unmodified).
non_goals:
  - amending context-budget-rfc.md or evidence-harness-v2-rfc.md (they are
    correct; P28 changes code/tests to match them)
  - new CLI commands, new flags, new error codes, envelope changes, or renaming
    CONTEXT_OVER_BUDGET
  - new feature work — P25 (Spec Kit Bridge v2) stays unstarted; it is a roadmap
    item, not a P28 defect
  - P27's deferred full CLI split — P27 shipped its committed
    task/adapter-cluster scope; T3 records the remaining split as roadmap
    honesty, not a bug
  - section-level truncation, token budgets, or any deferred item from the P24
    RFC
  - changing the elision PRIORITY order (ELISION_ORDER) — only the
    per-invocation elision ELIGIBILITY becomes conditional
definition_of_done:
  - "design/decisions/spec-conformance-rfc.md exists with this scope and
    `Status: accepted` (P28-T0)"
  - design/phases/P28-spec-conformance-remediation.yaml + design/roadmap.yaml
    list P28 (P28-T0, bootstrap writes)
  - "`applyBudgetElision` excludes `related_decisions` unless context_size:
    large and `rules` unless write_surface: high; `completed_tasks` /
    `constitution` / `reads` stay unconditionally elidable (P28-T1)"
  - tests/unit/core/pack/budget.test.ts pins each conditional-eligibility clause
    with a test whose name quotes the RFC clause, and the previous overbroad
    test is corrected (not deleted) to assert only RFC-permitted elisions
    (P28-T1)
  - scripts/harness/metrics.ts computes `pack_bytes` with
    `Buffer.byteLength(..., "utf8")` (P28-T2)
  - scripts/harness/run.ts derives the enabled-agent set from
    .code-pact/project.yaml (enabled != false) so every enabled agent gets
    exactly one adapter-drift row (P28-T2)
  - scripts/harness/index.ts re-exports the P26 builders for surface parity
    (P28-T2)
  - design/measurements/ baseline artifacts regenerated from the corrected
    harness; any non-trivial delta noted in CHANGELOG (P28-T2)
  - P21/P24 phase YAML `writes` reference only files that exist; P27 smoke
    command drops the invalid `task prepare --explain`; doctor/conformance docs
    no longer overstate a shared required-surface contract; P25/P27 roadmap
    status is stated honestly in docs (P28-T3)
  - the existing unit + integration suites pass without modification except the
    deliberately-corrected budget test (verified at the end of T1 and T2)
  - CHANGELOG.md gains entries under `[Unreleased]` covering each P28 task
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
tasks:
  - id: P28-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      RFC acceptance + phase registration.

      Lands design/decisions/spec-conformance-rfc.md with
      `Status: proposed` in this PR; the status flips to
      `accepted` in a small follow-up commit before T1..T3
      implementation, per the P21 / P24 / P26 / P27 precedent.

      Bootstraps the P28 phase itself:
      - design/phases/P28-spec-conformance-remediation.yaml (this file)
      - design/roadmap.yaml gains a P28 entry (weight 12)
      - CHANGELOG.md gains a P28-T0 entry under [Unreleased]

      The phase YAML and roadmap.yaml updates are bootstrap
      writes — protected paths under `plan lint --strict`, NOT
      listed in this task's `writes:` block. Same precedent as
      P21-T0 / P24-T0 / P26-T0 / P27-T0.
    decision_refs:
      - design/decisions/spec-conformance-rfc.md
    reads:
      - design/decisions/context-budget-rfc.md
      - design/decisions/evidence-harness-v2-rfc.md
    writes:
      - design/decisions/spec-conformance-rfc.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P28-spec-conformance-remediation.yaml
  - id: P28-T1
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      P24 conditional elision + RFC-conformance tests.

      The single currently-observable RFC divergence. RFC
      (context-budget-rfc.md) locks a CONDITIONAL elision policy:
        - related_decisions elidable ONLY via the context_size:
          large "all decisions" expansion; task-id-matched
          decisions stay.
        - rules elidable ONLY via the write_surface: high "all
          rules" expansion; the default applies_to-matched
          subset never elides.

      Implementation:
      - `applyBudgetElision` (src/core/pack/index.ts) receives
        the readiness flags (isLarge, isLargeWriteSurface) and
        excludes related_decisions from the elidable set unless
        isLarge, and rules unless isLargeWriteSurface.
        completed_tasks / constitution / reads stay
        unconditionally elidable. ELISION_ORDER (the priority)
        is unchanged — only eligibility becomes conditional.
      - When a non-elidable section keeps the pack over budget,
        CONTEXT_OVER_BUDGET fires with that section in
        unelidable_sections (the RFC-intended outcome).
      - The markdown.ts ELISION_ORDER comment is updated to note
        the conditional eligibility.

      Tests (names quote the RFC clause — the durable convention
      this phase establishes):
        - "does not elide default applies-to-matched rules under
          budget pressure (write_surface != high)"
        - "does not elide task-related decisions under budget
          pressure unless context_size: large"
        - "elides expanded all-rules under budget pressure when
          write_surface: high"
        - "elides expanded all-decisions under budget pressure
          when context_size: large"
      The pre-existing overbroad budget test is CORRECTED (not
      deleted) to assert only RFC-permitted elisions + the byte
      invariant.

      Safety nets:
      - pnpm typecheck clean.
      - Full suite passes; the only modified test is the
        deliberately-corrected budget test.
      - pack-byte-identical.test.ts passes unmodified (default
        path untouched).
    depends_on:
      - P28-T0
    decision_refs:
      - design/decisions/spec-conformance-rfc.md
      - design/decisions/context-budget-rfc.md
    reads:
      - src/core/pack/index.ts
      - src/core/pack/formatters/markdown.ts
      - tests/unit/core/pack/budget.test.ts
      - design/decisions/context-budget-rfc.md
    writes:
      - src/core/pack/index.ts
      - src/core/pack/formatters/markdown.ts
      - tests/unit/core/pack/budget.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P28-spec-conformance-remediation.yaml
  - id: P28-T2
    type: feature
    ambiguity: low
    risk: medium
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: done
    description: |
      P26 byte counting + per-agent denominator + baseline
      regeneration.

      Latent today (single enabled agent, ASCII corpus) but
      corrupts evidence fidelity the moment a non-ASCII pack or a
      second agent appears. Fixed because evidence fidelity is
      the tool's value proposition.

      Implementation:
      - scripts/harness/metrics.ts: `pack_bytes` uses
        `Buffer.byteLength(packContent, "utf8")` (was
        `packContent.length`).
      - scripts/harness/run.ts: build the enabled-agent set from
        .code-pact/project.yaml `agents[]` (enabled !== false);
        bucket doctor issues onto that set so every enabled agent
        gets exactly one adapter-drift row even with zero issues
        and zero progress events.
      - scripts/harness/index.ts: re-export the P26 builders
        (buildLifecycleAdherenceRow, buildAdapterDriftRow,
        buildSummary, lowerPercentile, ratePercent) for surface
        parity with the v1 builders.
      - Regenerate design/measurements/ artifacts from the
        corrected harness; note any non-trivial delta in
        CHANGELOG (expected ~0 with the current corpus).

      Tests:
      - metrics.test.ts gains a byte-count assertion using
        non-ASCII content (char count != byte count) and a
        denominator assertion that an enabled agent with no
        issues/events still produces a row.

      Safety nets:
      - pnpm typecheck clean; full suite passes.
    depends_on:
      - P28-T1
    decision_refs:
      - design/decisions/spec-conformance-rfc.md
      - design/decisions/evidence-harness-v2-rfc.md
    reads:
      - scripts/harness/metrics.ts
      - scripts/harness/run.ts
      - scripts/harness/index.ts
      - design/decisions/evidence-harness-v2-rfc.md
    writes:
      - scripts/harness/metrics.ts
      - scripts/harness/run.ts
      - scripts/harness/index.ts
      - tests/unit/scripts/harness/metrics.test.ts
      - design/measurements/summary.json
      - design/measurements/adapter-drift-by-agent.csv
      - design/measurements/pack-size-by-task.csv
      - design/measurements/lifecycle-adherence-by-task.csv
      - design/measurements/task-event-density.csv
      - design/measurements/verify-success-rate.csv
      - design/measurements/lint-issue-histogram.csv
      - design/measurements/measurements.manifest.json
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P28-spec-conformance-remediation.yaml
  - id: P28-T3
    type: docs
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: done
    description: |
      Design-document consistency.

      Corrects design/doc drift surfaced by the same review:
      - P21 phase YAML: replace nonexistent `writes`
        (docs/cli/*.md, tests/integration/task-context-explain.test.ts)
        with the files the work actually produced.
      - P24 phase YAML: replace nonexistent `writes`
        (src/core/error-codes.ts,
        tests/integration/task-context-budget.test.ts) with the
        actual surfaces.
      - P27 phase YAML: drop the invalid `task prepare --explain`
        from the T1 manual smoke (`--explain` is a `task context`
        flag; `task prepare` rejects it).
      - docs/cli-contract.md (and agent-contract docs if needed):
        stop implying doctor and conformance share a
        required-surface contract — doctor checks heading drift;
        conformance checks the CLI surface / failure guidance.
      - State P25/P27 roadmap status honestly: P25 unstarted;
        P27 = task/adapter-cluster split shipped, full CLI split
        still deferred.

      The P21/P24/P27 phase YAML are protected paths. Per the
      P27-T0 bootstrap-write precedent they are edited but NOT
      listed in `writes:`; this task runs WITHOUT `--audit-strict`
      and the protected-path deviation is recorded in CHANGELOG.

      Also flips the P28 phase status to `done` via
      `code-pact phase reconcile P28 --write` in a follow-up
      commit (mirrors P27-T3 close).
    depends_on:
      - P28-T2
    decision_refs:
      - design/decisions/spec-conformance-rfc.md
    reads:
      - design/phases/P21-agent-contract-v2.yaml
      - design/phases/P24-context-budget.yaml
      - design/phases/P27-cli-maintainability.yaml
      - docs/cli-contract.md
    writes:
      - docs/cli-contract.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P28-spec-conformance-remediation.yaml
