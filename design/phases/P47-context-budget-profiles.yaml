id: P47
name: Context budget profiles — named, ergonomic context budgets that resolve to
  a byte budget and reuse the unchanged P24 enforcement path
weight: 4
confidence: medium
risk: medium
status: done
objective: |
  P47 ships layer (a) of Context Fit (design/decisions/context-fit-rfc.md):
  named context budget profiles on the agent profile plus a
  --context-budget <profile> flag on `task context` and `task prepare`.

  A profile name resolves to a byte budget, which then drives the UNCHANGED
  P24 --budget-bytes enforcement path (same locked elision order, same
  CONTEXT_OVER_BUDGET on an unachievable budget). It is a NAME for a NUMBER —
  it introduces no tokenizer, no summarization, no compression, no semantic
  ranking, no embeddings, no network behavior, and no default-on context
  reduction.

  Three standard profile names ship with built-in fallback byte values, the
  single source of truth defined in the RFC and mirrored once in code
  (src/core/context-fit/budget-profiles.ts): tight (30000), balanced (60000),
  wide (120000). The standard names resolve even with no agent profile in play
  ("agent-less resolution"). An agent profile may declare an optional
  context_budget block that OVERRIDES a standard byte value or names custom
  profiles; default_profile is validated but NOT auto-applied in P47.

  Invariants held: the no-flag context pack stays byte-identical; --budget-bytes
  behavior is unchanged; --budget-bytes and --context-budget are mutually
  exclusive (CONFIG_ERROR, exit 2); an unknown profile is CONFIG_ERROR; the
  task prepare `commands` dictionary does not echo --context-budget (per-
  invocation policy, like --budget-bytes); wide is deliberately not `full`.

  Scope is layer (a) only. P48 (recommended budget on recommend / task prepare),
  P49 (explain metrics), and P50 (readiness advisories) are NOT in this phase.

  Design recorded in design/decisions/context-fit-rfc.md § Layer (a).
non_goals:
  - Any of Context Fit layers (b)/(c)/(d) — recommend.contextFit, explain
    metrics, or plan-lint context-fit advisories. P47 is layer (a) only.
  - Token counting, a tokenizer dependency, summarization, compression, semantic
    ranking, embeddings, or any network access.
  - Default-on context reduction — no flag means the current byte-identical
    behavior, with no hidden reduction.
  - Any change to the P24 elision order / eligibility, the Buffer.byteLength
    byte measurement, or the CONTEXT_OVER_BUDGET contract.
  - Auto-applying context_budget.default_profile to any command (validated for
    future ergonomics only).
  - A `full` profile name (rejected in P46 — it reads as a no-elision guarantee).
definition_of_done:
  - The agent profile schema accepts and validates an optional context_budget
    block (profiles non-empty, max_bytes a positive integer, profile names safe
    CLI identifiers, default_profile must reference a declared profile); a
    missing block stays valid and is never auto-applied.
  - A single code-level source of truth for the standard profiles
    (src/core/context-fit/budget-profiles.ts) carries tight=30000,
    balanced=60000, wide=120000, with no second runtime source of truth in CLI
    code or schemas; docs and tests may repeat the values as contract
    assertions.
  - A pure resolver (src/core/context-fit/resolve-budget-profile.ts) resolves a
    profile name to bytes via agent-profile override, then standard fallback,
    then CONFIG_ERROR; standard names resolve agent-less.
  - task context and task prepare accept --context-budget <profile>, resolve it
    to a byte budget, and reuse the existing budgetBytes path; --context-budget
    and --budget-bytes are mutually exclusive (CONFIG_ERROR, exit 2); an unknown
    profile is CONFIG_ERROR; the task prepare commands dictionary does not echo
    --context-budget.
  - The no-flag content is byte-identical and --budget-bytes behavior is
    unchanged; tests prove --context-budget standard equals --budget-bytes
    fallback for the same task, and a custom or overriding agent profile
    resolves correctly.
  - The generated CLI reference, cli-contract.md, and CHANGELOG record the new
    shipped behavior, and check:docs passes.
  - The phase is registered (this phase YAML plus a design/roadmap.yaml entry);
    validate --json and plan lint --include-quality --strict --json are clean.
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - pnpm check:docs
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
