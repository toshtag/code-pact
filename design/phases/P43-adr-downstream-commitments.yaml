id: P43
name: ADR downstream commitments — surface an accepted ADR's implementation
  commitments on task prepare, advise when an accepted ADR commits to nothing
weight: 5
confidence: high
risk: low
status: planned
objective: |
  code-pact's differentiating effect is the ADR->downstream link: a
  requires_decision task cannot complete until an accepted ADR resolves its
  decision gate (P21/P39). That makes the DECISION first-class, but the ADR's
  downstream CONSEQUENCES — "given this decision, these concrete things must be
  done" — live only as free prose nothing surfaces or checks. An agent accepts
  the gating ADR and proceeds; the implementation commitments buried in the ADR
  body are never re-read.

  P43 makes those commitments first-class, deterministically surfaced and
  advisory-only — never an LLM free-summary (explicitly rejected per the
  enforcement philosophy). Three pieces, all additive:

    - Authoring: an ADR may carry a "## Implementation commitments" section, a
      GFM checkbox list under that exact h2. Unchecked items are downstream work
      still to implement; a checked item is already-satisfied work or an explicit
      non-work statement.
    - Surfacing: task prepare adds an additive decision_commitments envelope
      field — the parsed commitment items (text + done + has_section) for the
      accepted ADR(s) resolving the task's gate, in considered[] order.
      Deterministic parse, no summarization.
    - Advisory: plan lint gains ADR_COMMITMENTS_EMPTY (affects_exit false, even
      under --strict) — an ACCEPTED ADR that resolves a requires_decision task's
      gate has no commitments section, or one with zero checkbox items. Scoped to
      accepted ADRs referenced by a gated task, so historical ADRs never warn.

  This reuses existing machinery: ADR status/acceptance parsing and the shared
  decision resolver in src/core/decisions/adr.ts, the task prepare envelope, and
  the plan-lint advisory pattern that already hosts ADR_STATUS_UNRECOGNIZED (P31)
  and the P36 empty-stub advisory.

  Two RFC-draft premises were corrected after code exploration: task prepare does
  NOT currently resolve the decision gate (T1 adds a resolveDecisionGate call),
  and DecisionResolution.considered[] carries no ADR content (commitments are
  parsed by re-reading the accepted ADR file by its path).

  decision_commitments is an additive envelope field; the JSON-output-shape
  section already states envelopes may carry additive fields (P39 / the
  check-doc-invariants rule 8), so only per-command docs change.

  Docs-drift-first discipline (the P39 lesson): the full docs update set is
  enumerated up front and baked into each task writes plus a Documentation
  contract checklist in the RFC. The commitments concept folds into the existing
  docs/concepts/decision-gate.md (no new concept page).

  Design recorded in design/decisions/adr-downstream-commitments-rfc.md.

  Scope discipline (3 tasks):

    - T0 — RFC + phase registration (bootstrap).
    - T1 — parseAdrCommitments in adr.ts (pure, char-tested) + decision_commitments
      on task prepare (additive, integration-tested) + task prepare / ADR docs.
    - T2 — ADR_COMMITMENTS_EMPTY plan-lint advisory (accepted-ADR + gated-task
      scoped, affects_exit false), registered in the error-code surface + plan
      diagnostic table, unit-tested across present/absent/empty/proposed/
      unreferenced cases.
non_goals:
  - Any new gate — commitments never block task complete / verify / record-done.
    The decision gate is unchanged (an accepted ADR resolves it); commitments are
    surfaced and advised only.
  - Any decision-error surface on task prepare — for a gated task with no accepted
    ADR it returns an empty decision_commitments, never fails, and does not
    duplicate verify / task complete gate enforcement.
  - Echoing commitments in task context — surfacing is task-prepare-only this
    phase; a context echo duplicates the surface for no decided benefit.
  - Completion tracking or checkbox mutation — code-pact parses checkbox state to
    surface it; it never edits the ADR to tick boxes.
  - LLM summarization of "what this decision implies" — non-deterministic and
    contrary to the enforcement philosophy. The parse is a literal checkbox
    extraction under a fixed heading; no Markdown AST.
  - Any change to decision-gate semantics (status-aware resolution,
    all-must-be-accepted vs any-accepted-wins) — only new surfacing/advisory.
  - A task-schema commitments field — the commitment belongs with the decision
    (the ADR), not duplicated onto every gated task.
  - A new concept doc page — the concept folds into docs/concepts/decision-gate.md.
  - Any new framework — extend the existing error-code-surface test and the
    existing plan-lint advisory machinery only.
definition_of_done:
  - parseAdrCommitments(content) deterministically extracts GFM checkbox items
    under the first "## Implementation commitments" h2, returns hasSection false
    with empty items when the section is absent, hasSection true with empty items
    when the section is present but has zero checkbox items, and ignores
    non-checkbox prose; covered by characterization tests
  - task prepare on a requires_decision task whose gate is resolved by an
    accepted ADR includes an additive decision_commitments array (per-ADR entries
    with adr + has_section + items, in considered[] order); for a gated task with
    no accepted ADR it is an empty array; the field is omitted for non-gated
    tasks; existing prepare fields are unchanged and task prepare never fails on
    an unresolved gate
  - plan lint emits ADR_COMMITMENTS_EMPTY (severity warning, affects_exit false)
    for an ACCEPTED ADR that resolves a requires_decision task and has no
    commitments section or an empty one; a proposed/draft ADR never triggers it;
    an accepted ADR no gated task references never triggers it; the advisory never
    changes the exit code, even under --strict
  - ADR_COMMITMENTS_EMPTY sets file to the ADR path and omits path (matching the
    existing ADR-centric advisories — the subject is ADR content, not a plan-YAML
    field); details carries has_section and item_count
  - ADR_COMMITMENTS_EMPTY is registered in KNOWN_CODES + the plan diagnostic
    codes table in docs/cli-contract.md, pinned by error-code-surface.test.ts
  - the docs in the RFC Documentation contract checklist are updated (cli-contract,
    agent-contract, decision-gate for T1; cli-contract, troubleshooting,
    decision-gate for T2), including the done-checkbox semantics, the no-work
    anti-abuse note, and the considered[] order note
  - no decision-gate behavioral change; task complete / verify / record-done /
    finalize are untouched
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js validate --json
    - node dist/cli.js plan lint --include-quality --strict --json
tasks:
  - id: P43-T0
    type: architecture
    ambiguity: low
    risk: low
    context_size: small
    write_surface: low
    verification_strength: medium
    expected_duration: short
    status: planned
    description: >
      RFC + phase registration (bootstrap).


      Lands design/decisions/adr-downstream-commitments-rfc.md (status: accepted)
      and bootstraps the phase (phase YAML + roadmap entry, weight 5) as
      protected-path bootstrap writes NOT listed in writes, per the P28-P39
      precedent (writes carries the RFC only; the phase YAML is in acceptance_refs
      and design/roadmap.yaml is excluded as a plan-lint --strict protected path).
      The RFC records the three-piece additive design, the two corrected premises
      (task prepare does not resolve the gate today; considered[] has no content),
      the has_section surface field, the unresolved-gate behavior, the done
      checkbox semantics and the no-work anti-abuse note, the advisory scope and
      its path-omission decision, the considered[] order note, the deliberate
      non-goals, the alternatives considered, and a Documentation contract
      checklist enumerating every doc each task must update.
    decision_refs:
      - design/decisions/adr-downstream-commitments-rfc.md
    reads:
      - design/decisions/adr-downstream-commitments-rfc.md
    writes:
      - design/decisions/adr-downstream-commitments-rfc.md
    acceptance_refs:
      - design/phases/P43-adr-downstream-commitments.yaml
  - id: P43-T1
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: >
      Parse + surface: parseAdrCommitments + task prepare decision_commitments.


      - In src/core/decisions/adr.ts: add parseAdrCommitments(content) — a pure,
        deterministic function (normalizeNewlines, parseFrontMatter to strip
        frontmatter, regex on body, no I/O) that locates the first
        "## Implementation commitments" h2 (exact ## level, case-insensitive
        title), reads to the next h2 or EOF, and extracts GFM task-list items as
        text + done. Returns hasSection false / empty items when the section is
        absent; hasSection true / empty items when present but with no checkbox
        items. classifyAdr is left untouched.

      - In src/commands/task-prepare.ts: for a gated task
        (isDecisionRequiredForTask), call resolveDecisionGate and for each
        accepted considered[] entry re-read the ADR by path and parseAdrCommitments
        it; attach an additive decision_commitments array (adr + has_section +
        items) in considered[] order. Present as empty for a gated task with no
        accepted ADR; omitted for non-gated tasks. Kept off the early-return paths
        so the progress-read-only invariant holds. task prepare never fails on an
        unresolved gate.

      - Update docs per the RFC checklist: docs/cli-contract.md (the task prepare
        envelope + decision_commitments shape, gated-only presence, empty-array
        unresolved case, done semantics, considered[] order note),
        docs/agent-contract.md (task prepare reads decision_commitments as advisory
        context, not a gate), docs/concepts/decision-gate.md (the
        "## Implementation commitments" section in the ADR shape, done semantics,
        the no-work anti-abuse note).


      Required tests:

      - characterization (unit) for parseAdrCommitments: no section; section with
        zero checkboxes; mixed checked/unchecked and * bullets; CRLF; bounded by a
        following h2; case-insensitive title; ### does not match; frontmatter
        status not mistaken for body.

      - integration (task prepare): gated task + accepted ADR with commitments ->
        decision_commitments with items and has_section true; accepted ADR with no
        section -> has_section false, empty items; accepted ADR with empty section
        -> has_section true, empty items; gated task with no accepted ADR -> empty
        array; non-gated task -> field omitted; explicit decision_refs with two
        accepted ADRs -> both surfaced in considered[] order.
    decision_refs:
      - design/decisions/adr-downstream-commitments-rfc.md
    depends_on:
      - P43-T0
    reads:
      - src/core/decisions/adr.ts
      - src/commands/task-prepare.ts
      - docs/cli-contract.md
    writes:
      - src/core/decisions/adr.ts
      - src/commands/task-prepare.ts
      - docs/cli-contract.md
      - docs/agent-contract.md
      - docs/concepts/decision-gate.md
      - tests/unit/core/decisions/adr.test.ts
      - tests/integration/task-prepare-commands-contract.test.ts
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P43-adr-downstream-commitments.yaml
  - id: P43-T2
    type: feature
    ambiguity: low
    risk: low
    context_size: medium
    write_surface: medium
    verification_strength: strong
    expected_duration: medium
    status: planned
    description: >
      Advisory: ADR_COMMITMENTS_EMPTY in plan lint.


      - In src/core/plan/lint.ts: add detectAdrCommitmentsEmpty(cwd, phases) beside
        the P31/P36 ADR advisories, wired into the runLint quality block under
        includeQuality only. Using makeDecisionResolver, for each requires_decision
        task (task- or phase-level) resolve and collect accepted considered[].path
        into a map keyed by ADR path (first referencing task wins -> one issue per
        ADR). For each unique accepted+referenced ADR, read it, parseAdrCommitments,
        and if not hasSection or zero items push ADR_COMMITMENTS_EMPTY (severity
        warning, affects_exit false, file = ADR path, task_id, phase_id, details
        has_section + item_count; path omitted, matching the existing ADR-centric
        advisories). Only accepted ADRs; only those referenced by a gated task.

      - Register ADR_COMMITMENTS_EMPTY in KNOWN_CODES (category plan) and the plan
        diagnostic codes table in docs/cli-contract.md so the error-code-surface
        scan pins it.

      - Update docs per the RFC checklist: docs/cli-contract.md (the advisory row:
        advisory-only incl. under --strict, file = ADR, no path,
        details.has_section/item_count), docs/troubleshooting.md (warning not
        blocker; fix; the no-work anti-abuse note), docs/concepts/decision-gate.md
        (advisory scope: accepted + gated-task-referenced only).


      Required tests (unit):

      - referenced accepted ADR WITH items -> no advisory.

      - referenced accepted ADR with NO section -> advisory, affects_exit false,
        details.has_section false.

      - referenced accepted ADR with an EMPTY section -> advisory,
        details.has_section true, item_count 0.

      - referenced PROPOSED ADR -> no advisory (only accepted is in scope).

      - accepted ADR NOT referenced by any gated task -> no advisory (scope guard).

      - silent without --include-quality.

      - accepted ADR whose only item is a checked no-work statement -> no advisory.

      - one ADR referenced by two gated tasks -> exactly one advisory.

      - phase-level requires_decision -> advisory fires for a task under it.
    decision_refs:
      - design/decisions/adr-downstream-commitments-rfc.md
    depends_on:
      - P43-T1
    reads:
      - src/core/plan/lint.ts
      - src/core/decisions/adr.ts
      - tests/unit/error-code-surface.test.ts
    writes:
      - src/core/plan/lint.ts
      - tests/unit/error-code-surface.test.ts
      - tests/unit/core/plan/lint.test.ts
      - docs/cli-contract.md
      - docs/troubleshooting.md
      - docs/concepts/decision-gate.md
      - CHANGELOG.md
    acceptance_refs:
      - design/phases/P43-adr-downstream-commitments.yaml
