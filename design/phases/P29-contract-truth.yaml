    description: |
      Clean P25 references.

      RFC / P28 YAML / CHANGELOG describe "P25 (Spec Kit Bridge
      v2)" as a roadmap item, but design/roadmap.yaml enumerates no
      P25 — a source-of-truth inconsistency for a tool whose thesis
