id: P70
name: Token Reduction Runtime Boundary Completion
weight: 3
confidence: high
risk: low
status: planned
objective: >
  Complete the runtime responsibility, cycle-correlation, byte-accounting,
  retention, and benchmark contracts required before P63 exact-match recall
  implementation begins.
non_goals:
  - Implement exact-match runtime, aggregation runtime, retrieval CLI, cycle
    metrics, consolidation, or SQLite.
  - Change context packs, Evidence, Failure Capsules, repairPolicy, adapters,
    CI, package version, release, or phase archives.
  - Modify production source or test code.
definition_of_done:
  - P63 automatic signal returns only exact-match facts, with no resolution
    aggregation fields.
  - P65 reserves optional cycle correlation before retrieval runtime is
    implemented.
  - P66 defines total task input as tracked agent-visible emission bytes and
    hard retention for cycle metrics.
  - P66 and P67 future implementation scopes are narrowed to concrete files.
  - P68 benchmark methodology is reproducible enough to decide accepted,
    rejected, or deferred.
verification:
  commands:
    - pnpm check:docs
    - pnpm typecheck
    - pnpm test:unit
    - pnpm test:integration:smoke
tasks:
  - id: P70-T1
    type: architecture
    ambiguity: medium
    risk: low
    context_size: medium
    write_surface: low
    verification_strength: strong
    expected_duration: short
    status: done
    description: Separate exact-match recall from resolution aggregation.
    depends_on:
      - P69-T1
    reads:
      - design/decisions/P63-T1-token-reduction-memory-roadmap-rfc.md
      - design/phases/P63-exact-match-local-failure-recall.yaml
      - design/phases/P64-deterministic-resolution-aggregation.yaml
      - design/phases/P65-lazy-local-memory-retrieval.yaml
    writes:
