      - design/decisions/P70-T1-recall-aggregation-boundary-rfc.md
      - design/phases/P63-exact-match-local-failure-recall.yaml
      - design/phases/P64-deterministic-resolution-aggregation.yaml
      - design/phases/P65-lazy-local-memory-retrieval.yaml
      - design/phases/P70-token-reduction-runtime-boundary-completion.yaml
      - design/roadmap.yaml
    acceptance_refs:
