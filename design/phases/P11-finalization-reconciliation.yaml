id: P11
name: Finalization & Reconciliation
weight: 20
confidence: medium
risk: medium
status: planned
objective: |
  Add explicit, safe, deterministic commands that flip task design
  YAML statuses to match the append-only progress log, and report
  phase status candidates without writing them. The v1.0 contract
  that `task complete` records progress only and never mutates
  design YAML is preserved unchanged. P11 ships `task finalize
  <task-id>` and `phase reconcile <phase-id>` as Stable (v1.2+)
  commands with dry-run defaults, explicit `--write` opt-in, and
  path-safety guarantees borrowed from src/core/path-safety.ts (P10).
  Writes are restricted to design/phases/*.yaml at the task-status
  level; `phase reconcile` never auto-flips the phase's own status
  in v1.2 — it reports a `phase_status_candidate` suggestion only.
  design/roadmap.yaml remains untouched in v1.2 and is a P14
  governance candidate.
non_goals:
  - any change to `task complete` or the progress.yaml append-only contract
  - any change to existing STATUS_DRIFT kinds, severity, or hidden_by_default values
  - automatic phase status flip (P11 reports a candidate; explicit phase-level write requires future work)
  - multi-phase reconcile (`--all` / `--every`) (future extension)
  - design/roadmap.yaml mutation (release prep continues to handle that manually until P14)
  - semantic validation of acceptance_refs contents (path existence + display only)
  - actual write detection against declared writes (no git diff; declared surface display only)
  - protected-section enforcement / configurable governance policy (P14)
  - advisory locks / concurrent reconcile (P14)
  - runbook integration (task run / phase close) (P12)
  - introducing `human_gate` (P12 RFC owns it)
  - LLM / RAG / MCP / issue-tracker integration (excluded from the v1.x window)
definition_of_done:
  - design/decisions/finalization-reconciliation-rfc.md exists and is marked accepted
  - design/roadmap.yaml lists P11
  - design/phases/P11-finalization-reconciliation.yaml exists with this objective and tasks list
  - "`task finalize <task-id>` ships as Stable (v1.2+) with default dry-run, explicit `--write` opt-in, and JSON envelope kinds `would_finalize` / `finalized` / `already_finalized`"
  - "`phase reconcile <phase-id>` ships as Stable (v1.2+) with default dry-run, explicit `--write` opt-in, JSON envelope kinds `would_reconcile` / `reconciled` / `no_eligible_tasks`, and per-task `applied_writes` / `skipped_writes`"
  - "new public error codes (`TASK_FINALIZE_NOT_ELIGIBLE`, `TASK_FINALIZE_WRITE_REFUSED`, `PHASE_RECONCILE_WRITE_REFUSED`) ship in `KNOWN_CODES.public` and `docs/cli-contract.md`; `no_eligible_tasks` is intentionally NOT an error code — it is represented as `data.kind: \"no_eligible_tasks\"` with exit 0"
  - "`plan analyze` `done-but-design-not-done` STATUS_DRIFT issues gain an additive `details.remediation` hint pointing at `task finalize <task-id>`; no kind, severity, or hidden_by_default value changes"
  - new commands are added to `tests/integration/json-stdout.test.ts` so the Stable (v1.2+) JSON-only stdout regression net covers them
  - "`docs/migration.md` gains a v1.1.x → v1.2.0 section explaining when to reach for finalize vs reconcile and the recommended adoption pattern"
  - "`task context` pack output for v1.1 tasks remains byte-identical against the existing golden fixture (no pack change in P11)"
verification:
  commands:
    - pnpm typecheck
    - pnpm test
    - pnpm build
    - node dist/cli.js plan lint --json
    - node dist/cli.js plan normalize --check --json
    - node dist/cli.js plan analyze --json
    - node dist/cli.js validate --json
    - node dist/cli.js doctor --json
