      raises `TASK_FINALIZE_NOT_ELIGIBLE` (`ok: false`, exit 2) in
      both dry-run and `--write` modes. Reuses the helpers from T2
      so the safe-write contract is implemented once. Extends
      `KNOWN_CODES.public` with `TASK_FINALIZE_NOT_ELIGIBLE` and
      `TASK_FINALIZE_WRITE_REFUSED`. Adds the command to
      `tests/integration/json-stdout.test.ts`. Updates
      `docs/cli-contract.md` § `task` with the new command section
      annotated `Stable (v1.2+)`.
