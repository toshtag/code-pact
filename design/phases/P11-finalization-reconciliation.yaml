    description: |
      `phase reconcile` design and implementation. Single PR landing
      dry-run + `--write`. JSON envelope kinds: `would_reconcile`,
      `reconciled`, `no_eligible_tasks` (exit 0 — NOT an error;
      simply nothing to flip). Reports `phase_status_candidate` as
      advisory but never writes phase status. Partial-success
