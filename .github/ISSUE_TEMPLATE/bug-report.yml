name: Bug report
description: Something `code-pact` does or returns is wrong.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.

        Before submitting, please check whether the behaviour you are reporting is documented as intentional in [`docs/cli-contract.md`](../../docs/cli-contract.md) (e.g. `STATUS_DRIFT` warnings, `LOCAL_NOT_GITIGNORED`, the `task complete` design-vs-progress separation). If you are upgrading, [`docs/upgrading.md`](../../docs/upgrading.md) covers the path (pre-v1.0 alpha notes are archived in [`docs/migration.md`](../../docs/migration.md)).

  - type: input
    id: version
    attributes:
      label: code-pact version
      description: Output of `code-pact --version`.
      placeholder: "1.0.1"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v22.x.x"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / shell
      placeholder: "macOS 15.x, zsh"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        The exact commands that trigger the bug. A `--json` invocation is ideal because the JSON envelope (`{ ok, data, error? }`) is the stable contract — pasting human stderr alone makes it harder to confirm which error code fired.
      placeholder: |
        ```sh
        code-pact init --non-interactive --agent claude-code --locale en-US
        code-pact phase add --id P1 --name "X" --weight 5 --objective "Y" --verify-command "pnpm test"
        code-pact task add P1
        # ... at this step, the command exits 2 with CONFIG_ERROR
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: |
        Include the relevant stderr lines and, if `--json` was used, the JSON envelope. The exit code matters — `0` success / `1` verification failed / `2` usage or config error / `3` internal.
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Output of `code-pact doctor --json`
      description: Optional but very helpful. The doctor output usually identifies whether the cause is project state vs. a real CLI bug.
      render: shell
