name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  classify:
    name: Classify change scope
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.classify.outputs.docs }}
      standard: ${{ steps.classify.outputs.standard }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Determine base ref
        id: base
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Classify changed files
        id: classify
        run: node scripts/verification-scope.mjs --base ${{ steps.base.outputs.ref }} --format github

  docs:
    name: Docs checks
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:docs

  standard:
    name: Standard gate (Node 22)
    runs-on: ubuntu-latest
    needs: [classify]
    if: needs.classify.outputs.standard == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:ci

  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: [classify, docs, standard]
    if: ${{ always() }}
    steps:
      - name: Verify CI results
        run: |
          if [ "${{ needs.classify.result }}" != "success" ]; then
            echo "classify job did not succeed: ${{ needs.classify.result }}"
            exit 1
          fi
          if [ "${{ needs.classify.outputs.docs }}" = "true" ] && [ "${{ needs.docs.result }}" != "success" ]; then
            echo "docs job did not succeed: docs=${{ needs.docs.result }}"
            exit 1
          fi
          if [ "${{ needs.classify.outputs.standard }}" = "true" ] && [ "${{ needs.standard.result }}" != "success" ]; then
            echo "standard job did not succeed: standard=${{ needs.standard.result }}"
            exit 1
          fi
