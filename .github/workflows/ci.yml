name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 22
            profile: full
          - node-version: 24
            profile: smoke
    name: ${{ matrix.profile }} (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Doc checks are Node-version-independent (markdown + tsx codegen), so run
      # them once in the full profile — not duplicated across the Node matrix.
      - run: pnpm check:docs
        if: matrix.profile == 'full'

      # Lexical filesystem-containment guard: flags raw readFile(join(cwd, ...))
      # reads that bypass the owned/contained path seams. A structural backstop
      # for the path-containment work; the SEMANTIC invariants (decision_refs
      # namespace, forged-manifest ownership) are pinned by the security
      # regression tests in test:unit, which this does NOT replace.
      - run: pnpm check:fs-containment
        if: matrix.profile == 'full'

      # AST-based filesystem-authority gate: flags fs operations on paths
      # not sourced from an authority resolver (resolveSymlinkFreeProjectPath,
      # resolveOwnedReadPath, etc.). A structural backstop complementing the
      # lexical containment guard above.
      - run: pnpm check:fs-authority
        if: matrix.profile == 'full'

      # Security hardening invariants: verifies raw fs exports removed,
      # owned-read.ts deprecated, allowlist structured with line numbers,
      # decision-ref validator unified, O_NOFOLLOW read, exclusive create,
      # docs synced.
      - run: pnpm check:security-hardening
        if: matrix.profile == 'full'

      - run: pnpm check:supply-chain
        if: matrix.profile == 'full'

      - run: pnpm typecheck

      - run: pnpm test:unit

      - run: pnpm build

      - run: pnpm exec vitest run --config vitest.integration.config.ts
        if: matrix.profile == 'full'

      - run: node dist/cli.js plan lint --include-quality --strict --json
        if: matrix.profile == 'full'

      - run: node dist/cli.js plan analyze --strict --json
        if: matrix.profile == 'full'

      - name: Smoke validate and doctor on an initialized project
        if: matrix.profile == 'full'
        run: |
          tmp="$(mktemp -d)"
          cd "$tmp"
          node "$GITHUB_WORKSPACE/dist/cli.js" init --non-interactive --locale en-US --agent claude-code --json
          node "$GITHUB_WORKSPACE/dist/cli.js" validate --json
          node "$GITHUB_WORKSPACE/dist/cli.js" doctor --json

      - run: node dist/cli.js --version

      - run: node dist/cli.js --json --version

  ci-status:
    name: CI status
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}
    steps:
      - name: Verify all matrix builds succeeded
        if: ${{ needs.build.result != 'success' }}
        run: |
          echo "build matrix did not succeed: ${{ needs.build.result }}"
          exit 1
