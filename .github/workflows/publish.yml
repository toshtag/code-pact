name: Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify and publish
    runs-on: ubuntu-latest
    environment: npm-publish

    permissions:
      contents: read
      id-token: write

    outputs:
      version: ${{ steps.meta.outputs.version }}
      shasum: ${{ steps.integrity.outputs.shasum }}
      integrity: ${{ steps.integrity.outputs.integrity }}
      local_sha256: ${{ steps.integrity.outputs.local_sha256 }}

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify npm Trusted Publishing prerequisites
        run: |
          node --version
          npm --version
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const [major, minor, patch] =
            process.argv[2]
              .split(".")
              .map(Number);

          if (
            major < 11 ||
            (
              major === 11 &&
              (
                minor < 5 ||
                (
                  minor === 5 &&
                  patch < 1
                )
              )
            )
          ) {
            console.error(
              "npm >= 11.5.1 is required for Trusted Publishing",
            );
            process.exit(1);
          }
          NODE

      - name: Verify signed release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-release-tag.mjs

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete release gate
        run: pnpm release:check

      - name: Build and inspect exact package tarball
        id: pack
        run: |
          npm pack --json > pack.json
          node scripts/check-package-tarball.mjs \
            --pack-json pack.json

          tarball="$(
            node -e '
              const p =
                JSON.parse(
                  require("fs")
                    .readFileSync(
                      "pack.json",
                      "utf8",
                    ),
                );

              process.stdout.write(
                p[0].filename,
              );
            '
          )"

          version="$(
            node -p \
              'require("./package.json").version'
          )"

          echo "tarball=$tarball" \
            >> "$GITHUB_OUTPUT"

          echo "version=$version" \
            >> "$GITHUB_OUTPUT"

      - name: Publish exact inspected tarball
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          package_name="$(
            node -p \
              'require("./package.json").name'
          )"

          version="${{ steps.pack.outputs.version }}"
          tarball="${{ steps.pack.outputs.tarball }}"

          if npm view \
            "${package_name}@${version}" \
            version \
            >/dev/null 2>&1
          then
            echo \
              "Version already exists; verifying idempotent rerun."
          else
            npm publish "$tarball"
          fi

      - name: Verify registry tarball
        id: integrity
        run: |
          package_name="$(
            node -p \
              'require("./package.json").name'
          )"

          version="${{ steps.pack.outputs.version }}"
          tarball="${{ steps.pack.outputs.tarball }}"

          node \
            scripts/verify-published-tarball.mjs \
            --package "$package_name" \
            --version "$version" \
            --local "$tarball" \
            --output release-integrity.json

          node - <<'NODE'
          const fs = require("fs");
          const data =
            JSON.parse(
              fs.readFileSync(
                "release-integrity.json",
                "utf8",
              ),
            );

          const out =
            process.env.GITHUB_OUTPUT;

          fs.appendFileSync(
            out,
            `shasum=${data.shasum}\n`,
          );

          fs.appendFileSync(
            out,
            `integrity=${data.integrity}\n`,
          );

          fs.appendFileSync(
            out,
            `local_sha256=${data.local_sha256}\n`,
          );
          NODE

      - name: Export version
        id: meta
        run: |
          echo \
            "version=${{ steps.pack.outputs.version }}" \
            >> "$GITHUB_OUTPUT"

  github-release:
    name: Create verified GitHub Release
    runs-on: ubuntu-latest
    needs: publish

    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build release notes
        env:
          VERSION: ${{ needs.publish.outputs.version }}
          SHASUM: ${{ needs.publish.outputs.shasum }}
          INTEGRITY: ${{ needs.publish.outputs.integrity }}
          LOCAL_SHA256: ${{ needs.publish.outputs.local_sha256 }}
        run: |
          node \
            scripts/release-notes.mjs \
            "$VERSION" \
            > release-notes.md

          cat >> release-notes.md <<EOF

          ## Integrity

          - npm shasum: \`$SHASUM\`
          - npm integrity: \`$INTEGRITY\`
          - local tarball SHA-256: \`$LOCAL_SHA256\`
          - npm provenance: generated through Trusted Publishing
          EOF

      - name: Create or reconcile GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1
          then
            gh release edit \
              "$TAG" \
              --notes-file release-notes.md \
              --verify-tag
          else
            gh release create \
              "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              --verify-tag
          fi
