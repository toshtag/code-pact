name: Publish

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Build and inspect release artifact
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tarball_sha256: ${{ steps.meta.outputs.tarball_sha256 }}

    steps:
      - name: Checkout signed tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Verify npm Trusted Publishing prerequisites
        run: |
          node --version
          npm --version
          npm_version="$(npm --version)"
          node - "$npm_version" <<'NODE'
          const [major, minor, patch] =
            process.argv[2]
              .split(".")
              .map(Number);

          if (
            major < 11 ||
            (
              major === 11 &&
              (
                minor < 5 ||
                (
                  minor === 5 &&
                  patch < 1
                )
              )
            )
          ) {
            console.error(
              "npm >= 11.5.1 is required for Trusted Publishing",
            );
            process.exit(1);
          }
          NODE

      - name: Verify signed release tag
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/check-release-tag.mjs

      - name: Install exact dependencies
        run: pnpm install --frozen-lockfile

      - name: Run complete release gate
        run: pnpm release:check

      - name: Assert package metadata
        run: node scripts/assert-package-metadata.mjs

      - name: Build and inspect exact package tarball
        id: pack
        run: |
          npm pack --json > pack.json
          node scripts/check-package-tarball.mjs \
            --pack-json pack.json

          tarball="$(
            node -e '
              const p =
                JSON.parse(
                  require("fs")
                    .readFileSync(
                      "pack.json",
                      "utf8",
                    ),
                );

              process.stdout.write(
                p[0].filename,
              );
            '
          )"

          mkdir -p release-artifact
          mv "$tarball" release-artifact/package.tgz

          version="$(
            node -p \
              'require("./package.json").version'
          )"

          sha256="$(sha256sum release-artifact/package.tgz | cut -d' ' -f1)"

          node -e '
            const fs = require("fs");
            const manifest = {
              package: "code-pact",
              version: process.argv[2],
              tag: "v" + process.argv[2],
              commit: process.argv[3],
              tarball_sha256: process.argv[4],
            };

            const expected = {
              package: "code-pact",
              version: require("./package.json").version,
              tag: "v" + require("./package.json").version,
              commit: process.env.GITHUB_SHA,
              tarball_sha256: process.argv[4],
            };

            for (const key of Object.keys(manifest)) {
              if (manifest[key] !== expected[key]) {
                console.error(
                  `manifest mismatch: ${key} is "${manifest[key]}", expected "${expected[key]}"`,
                );
                process.exit(1);
              }
            }

            if (!/^[0-9a-f]{64}$/.test(manifest.tarball_sha256)) {
              console.error("tarball_sha256 is not 64 lowercase hex");
              process.exit(1);
            }

            fs.writeFileSync(
              "release-artifact/release-manifest.json",
              JSON.stringify(manifest, null, 2) + "\n",
            );
          ' "$version" "$GITHUB_SHA" "$sha256"

          node scripts/release-notes.mjs "$version" \
            > release-artifact/release-notes.md

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tarball_sha256=$sha256" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-artifact
          path: release-artifact/
          if-no-files-found: error

  publish:
    name: Publish to npm via Trusted Publishing
    runs-on: ubuntu-latest
    needs: prepare
    environment: npm-publish

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: release-artifact
          path: release-artifact

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify manifest and publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          manifest="release-artifact/release-manifest.json"
          tarball="release-artifact/package.tgz"

          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync(process.argv[2], "utf8"));

            if (m.package !== "code-pact") {
              console.error(`manifest package is "${m.package}", expected "code-pact"`);
              process.exit(1);
            }
            if (!/^\d+\.\d+\.\d+/.test(m.version)) {
              console.error(`manifest version "${m.version}" is not a valid semver`);
              process.exit(1);
            }
            if (m.tag !== "v" + m.version) {
              console.error(`manifest tag "${m.tag}" != "v${m.version}"`);
              process.exit(1);
            }
            if (!/^[0-9a-f]{40}$/.test(m.commit)) {
              console.error("manifest commit is not a 40-char SHA");
              process.exit(1);
            }
            if (!/^[0-9a-f]{64}$/.test(m.tarball_sha256)) {
              console.error("manifest tarball_sha256 is not 64 lowercase hex");
              process.exit(1);
            }

            const crypto = require("crypto");
            const bytes = fs.readFileSync(process.argv[3]);
            const sha256 = crypto.createHash("sha256").update(bytes).digest("hex");
            if (sha256 !== m.tarball_sha256) {
              console.error(`tarball SHA-256 "${sha256}" != manifest "${m.tarball_sha256}"`);
              process.exit(1);
            }

            fs.writeFileSync(process.env.GITHUB_OUTPUT, `version=${m.version}\n`, { flag: "a" });
          ' "$manifest" "$tarball"

          version="$(node -p 'require("./release-artifact/release-manifest.json").version')"

          if npm view "code-pact@${version}" version >/dev/null 2>&1
          then
            echo "Version already exists; verifying idempotent rerun."
          else
            npm publish "$tarball" --ignore-scripts
          fi

      - name: Export version
        id: meta
        run: |
          version="$(node -p 'require("./release-artifact/release-manifest.json").version')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify registry tarball
    runs-on: ubuntu-latest
    needs: [publish, prepare]

    permissions:
      contents: read

    outputs:
      shasum: ${{ steps.integrity.outputs.shasum }}
      integrity: ${{ steps.integrity.outputs.integrity }}
      local_sha256: ${{ steps.integrity.outputs.local_sha256 }}

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: release-artifact
          path: release-artifact

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Verify registry tarball
        id: integrity
        run: |
          version="$(node -p 'require("./release-artifact/release-manifest.json").version')"

          node \
            scripts/verify-published-tarball.mjs \
            --package code-pact \
            --version "$version" \
            --local release-artifact/package.tgz \
            --output release-integrity.json

          node - <<'NODE'
          const fs = require("fs");
          const data =
            JSON.parse(
              fs.readFileSync(
                "release-integrity.json",
                "utf8",
              ),
            );

          const out =
            process.env.GITHUB_OUTPUT;

          fs.appendFileSync(
            out,
            `shasum=${data.shasum}\n`,
          );

          fs.appendFileSync(
            out,
            `integrity=${data.integrity}\n`,
          );

          fs.appendFileSync(
            out,
            `local_sha256=${data.local_sha256}\n`,
          );
          NODE

      - name: Upload integrity artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-integrity
          path: release-integrity.json
          if-no-files-found: error

  github-release:
    name: Create verified GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, prepare]

    permissions:
      contents: write

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: release-artifact
          path: release-artifact

      - name: Download integrity artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: release-integrity
          path: release-integrity

      - name: Create or reconcile GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          version="$(node -p 'require("./release-artifact/release-manifest.json").version')"
          shasum="$(node -p 'require("./release-integrity/release-integrity.json").shasum')"
          integrity="$(node -p 'require("./release-integrity/release-integrity.json").integrity')"
          local_sha256="$(node -p 'require("./release-integrity/release-integrity.json").local_sha256')"

          cat release-artifact/release-notes.md > final-notes.md
          cat >> final-notes.md <<EOF

          ## Integrity

          - npm shasum: \`$shasum\`
          - npm integrity: \`$integrity\`
          - local tarball SHA-256: \`$local_sha256\`
          - npm provenance: generated through Trusted Publishing
          EOF

          if gh release view "$TAG" >/dev/null 2>&1
          then
            gh release edit \
              "$TAG" \
              --notes-file final-notes.md \
              --verify-tag
          else
            gh release create \
              "$TAG" \
              --title "$TAG" \
              --notes-file final-notes.md \
              --verify-tag
          fi
