  definition_of_done:
    - Cancellation preserves progress events, contract locks, and task specs.
    - Cancelled tasks cannot be locked, started, blocked, resumed, completed,
      record-done, finalized, or executed.
    - P83-T5 is cancelled through the new command and P83 reconciles to done.
    - Strict finalize and the official review bundle pass.
    - Tasks with non-cancelled direct dependents cannot be cancelled.
    - task cancel changes only the task design status to cancelled.
    - task prepare and task runbook return terminal no-op guidance.
